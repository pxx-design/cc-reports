<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --amber:#ff5a1f; --amber-br:#ff9052; --amber-dim:#a4400f;
    --amber-faint:rgba(255,90,30,0.12);
    --green:#4ec36a;
    --case-hi:#383838; --case-lo:#1d1d1d; --silk:#585858;
    --screen:#0b0908;
    --sans:-apple-system,"Inter","Helvetica Neue",sans-serif;
    --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:transparent}
  body{font-family:var(--mono);-webkit-font-smoothing:antialiased;user-select:none;cursor:default;overflow:hidden}

  /* ── 设备机身 ── */
  .device{
    width:100vw;height:calc(100vh - 80px);margin-top:80px;position:relative;
    background:linear-gradient(157deg,var(--case-hi) 0%,#2b2b2b 45%,var(--case-lo) 100%);
    border-radius:24px;padding:19px;display:grid;grid-template-columns:1fr 96px;gap:15px;
    box-shadow:inset 0 1.5px 0 rgba(255,255,255,.11),inset 0 -2px 3px rgba(0,0,0,.55),inset 0 0 0 1px rgba(0,0,0,.35);
    -webkit-app-region:drag;
    opacity:0;transform:scale(.985);
    transition:opacity .38s ease,transform .38s cubic-bezier(.2,.7,.2,1);
  }
  .device.in{opacity:1;transform:scale(1)}
  button{-webkit-app-region:no-drag}

  /* 丝印:在机身边距带内垂直居中 */
  .silk{position:absolute;height:19px;display:flex;align-items:center;
        font-family:var(--mono);font-weight:600;font-size:8px;letter-spacing:.22em;
        color:var(--silk);text-shadow:0 -1px 0 rgba(0,0,0,.55),0 1px 0 rgba(255,255,255,.06);
        text-transform:uppercase;pointer-events:none}
  .silk.tl{top:0;left:24px}.silk.tr{top:0;right:44px}
  .silk.bm{bottom:0;left:0;right:0;justify-content:center;color:#454545;letter-spacing:.28em}

  /* 呼吸灯:扁平 LED,垂直居中于顶部边距带 */
  .led{position:absolute;top:5px;right:20px;width:9px;height:9px;border-radius:50%;
    background:var(--amber);
    box-shadow:0 0 6px var(--amber),0 0 14px rgba(255,90,30,.55);
    animation:br 3.2s ease-in-out infinite;
    -webkit-app-region:no-drag;cursor:pointer}
  .led.blink{animation:blink .4s ease-in-out 3}
  /* 收起态:按键列消失,机身只剩屏幕;右缘留一个竖向卡扣用于展开 */
  body.collapsed .device{grid-template-columns:1fr}
  body.collapsed .kcol{display:none}
  /* 抽屉把手(收纳/拉出共用材质):竖向卡扣 */
  .latch{position:absolute;width:13px;height:48px;border-radius:7px;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(180deg,#333,#282828);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.08),inset 0 -1px 2px rgba(0,0,0,.4),0 1px 3px rgba(0,0,0,.4);
    color:#8a8a8a;cursor:pointer;-webkit-app-region:no-drag;transition:color .15s}
  .latch:hover{color:#d0d0d0}
  .latch svg{width:9px;height:9px}
  /* 展开态把手:嵌在屏幕与按键列的缝里,贴按键板左缘 */
  #kFold{left:-15px;top:50%;transform:translateY(-50%)}
  /* 收起态把手:机身右缘 */
  #kEdge{display:none;right:3px;top:50%;transform:translateY(-50%)}
  body.collapsed #kEdge{display:flex}
  @keyframes br{0%,100%{opacity:.45;box-shadow:0 0 4px var(--amber),0 0 8px rgba(255,90,30,.35)}50%{opacity:1;box-shadow:0 0 6px var(--amber),0 0 14px rgba(255,90,30,.65)}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

  /* ── CRT 屏 ── */
  .bezel{border-radius:13px;padding:3px;background:linear-gradient(#191919,#0e0e0e);
    box-shadow:inset 0 2px 6px rgba(0,0,0,.9),0 1px 0 rgba(255,255,255,.05)}
  .screen{position:relative;overflow:hidden;height:100%;
    background:radial-gradient(125% 130% at 50% 28%,#131110 0%,var(--screen) 68%,#050403 100%);
    border-radius:11px;padding:16px 18px 14px;display:flex;flex-direction:column;
    color:var(--amber);text-shadow:0 0 4px rgba(255,90,30,.5),0 0 12px rgba(255,90,30,.32);
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.9),inset 0 0 46px rgba(0,0,0,.75)}
  .screen::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;
    background-image:repeating-linear-gradient(0deg,var(--amber-faint) 0 1px,transparent 1px 23px),
                     repeating-linear-gradient(90deg,var(--amber-faint) 0 1px,transparent 1px 23px)}
  .screen::after{content:"";position:absolute;inset:0;pointer-events:none;mix-blend-mode:multiply;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.20) 0 1px,transparent 1px 3px)}
  .screen>*{position:relative;z-index:1}

  .top{display:flex;justify-content:space-between;align-items:baseline;font-size:10px;letter-spacing:.12em;color:var(--amber-dim);text-shadow:none}
  .top .live{color:var(--green);text-shadow:0 0 6px rgba(78,195,106,.6)}
  .top .live b{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);
    box-shadow:0 0 5px var(--green);vertical-align:1px;margin-right:4px;animation:br 2.4s ease-in-out infinite}

  .hero{display:flex;align-items:flex-end;gap:9px;margin:10px 0 6px;min-height:34px}
  .hero .n{font-size:38px;font-weight:700;line-height:.82;letter-spacing:-.02em}
  .hero .n i{font-style:normal;font-size:17px;font-weight:600;color:var(--amber-dim);letter-spacing:.02em;margin:0 1px}
  .hero .u{font-size:10px;color:var(--amber-dim);padding-bottom:1px;letter-spacing:.1em;text-shadow:none;white-space:nowrap}
  .hero .trend{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:3px;padding-bottom:0}
  .trend svg{width:112px;height:28px}
  .trend path{fill:none;stroke:var(--amber);stroke-width:1.4;vector-effect:non-scaling-stroke;filter:drop-shadow(0 0 3px rgba(255,90,30,.8))}
  .trend .tcap{font-size:8px;color:var(--amber-dim);letter-spacing:.14em;text-shadow:none}

  .viz{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0}

  /* 分类警示条:兜底桶占大头时亮起(P0-b),把"分错了"喊出来而非默默调暗 */
  .warnbar{display:none;align-items:center;gap:5px;margin:0 0 8px;padding:4px 8px;border-radius:5px;
    font-size:9px;letter-spacing:.05em;color:#ffb27a;text-shadow:none;
    background:rgba(255,90,30,.14);box-shadow:inset 0 0 0 1px rgba(255,90,30,.42)}
  .screen.warn .warnbar{display:flex}
  .warnbar b{color:var(--amber-br);font-weight:700}

  /* WORK:分段 LED */
  .plist{display:flex;flex-direction:column;gap:12px}
  .prow{display:grid;grid-template-columns:108px 1fr 48px;align-items:center;gap:10px;font-size:10px;letter-spacing:.04em}
  .prow.fb{opacity:.4}
  .pname{text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pval{text-align:right;color:var(--amber-br);font-variant-numeric:tabular-nums}
  .segs{display:flex;gap:3px}
  .seg{flex:1;height:9px;border-radius:1.5px;background:rgba(255,90,30,.10)}
  .seg.on{background:var(--amber);box-shadow:0 0 5px rgba(255,90,30,.8)}
  .prow.fb .seg.on{background:var(--amber-dim);box-shadow:none}
  /* 警示态:兜底桶反而是最大产出时,不压暗,改高亮+⚠,提示"看这里"而非"忽略" */
  .prow.fb.lit{opacity:1}
  .prow.fb.lit .seg.on{background:var(--amber);box-shadow:0 0 5px rgba(255,90,30,.8)}
  .prow.fb.lit .pname::before{content:"⚠ ";color:#ffb27a}

  /* TIME:频谱堆叠 */
  .alloc{display:flex;flex-direction:column;gap:14px}
  .alloc-bar{display:flex;height:26px;border-radius:5px;overflow:hidden;
    box-shadow:inset 0 0 0 1px rgba(255,90,30,.28),inset 0 0 10px rgba(0,0,0,.4)}
  .alloc-seg{border-right:1.5px solid var(--screen)}
  .alloc-seg:last-child{border-right:none}
  .alloc-legend{display:flex;flex-direction:column;gap:9px}
  .lg{display:grid;grid-template-columns:14px 1fr 60px;align-items:center;gap:8px;font-size:10px;text-transform:uppercase}
  .lg .sw{width:9px;height:9px;border-radius:2px}
  .lg .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lg .lv{text-align:right;color:var(--amber-br);font-variant-numeric:tabular-nums}
  .lg.fb{opacity:.45}

  /* 24H:雷达节奏 */
  .rhythm{display:flex;align-items:center;gap:18px}
  .rb-grid{fill:none;stroke:rgba(255,90,30,.22);stroke-width:1}
  .rb-wave{fill:rgba(255,90,30,.13);stroke:var(--amber);stroke-width:1.4;filter:drop-shadow(0 0 3px rgba(255,90,30,.7))}
  .rb-sweep{animation:spin 3.4s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .blip{fill:var(--amber-br);filter:drop-shadow(0 0 4px var(--amber))}
  .rb-lab{font-size:8.5px;fill:var(--amber-dim);font-family:var(--mono);letter-spacing:.08em}
  .r-stats{flex:1;display:flex;flex-direction:column;gap:10px;font-size:10px;letter-spacing:.06em}
  .r-peak{font-size:11px}.r-peak b{color:var(--amber-br);font-weight:400}
  .r-line{display:grid;grid-template-columns:44px 1fr 34px;align-items:center;gap:8px}
  .r-line .rl{color:var(--amber-dim);text-shadow:none;text-transform:uppercase}
  .r-line .rt{height:5px;border-radius:2px;background:rgba(255,90,30,.10);overflow:hidden}
  .r-line .rt>i{display:block;height:100%;background:var(--amber);box-shadow:0 0 4px rgba(255,90,30,.7)}
  .r-line .rv{text-align:right;color:var(--amber-br)}

  /* NO DATA 空态(vizWork/Time/Rhythm 复用) */
  .scanning{display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--amber-dim)}
  .scanning .cap{font-size:11px;letter-spacing:.3em;animation:br 1.6s ease-in-out infinite}
  /* loading:采集信号态(刷新/初始)——hero 让位,专设雷达居中,非 24H 视图搬运 */
  .screen.scan .hero{display:none}
  .scanwrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
  .sr-grid{fill:none;stroke:rgba(255,90,30,.18);stroke-width:1}
  .sr-cross{stroke:rgba(255,90,30,.12);stroke-width:1}
  .sr-sweep{animation:spin 2.6s linear infinite}
  .sr-sweep path{fill:rgba(255,90,30,.16)}
  .sr-ping{fill:none;stroke:var(--amber);stroke-width:1.4;animation:ping 2.6s ease-out infinite}
  .sr-core{fill:var(--amber-br);filter:drop-shadow(0 0 4px var(--amber));animation:br 2s ease-in-out infinite}
  @keyframes ping{0%{r:8;opacity:.85}70%{opacity:.12}100%{r:62;opacity:0}}
  .scancap{font-size:13px;font-weight:700;letter-spacing:.4em;padding:5px 11px 5px calc(11px + .4em);
    color:var(--screen);background:var(--amber);border-radius:3px;
    box-shadow:0 0 12px rgba(255,90,30,.5),inset 0 0 0 1px rgba(255,180,140,.3);
    animation:cap-pulse 1.1s ease-in-out infinite}
  @keyframes cap-pulse{0%,100%{opacity:1;box-shadow:0 0 9px rgba(255,90,30,.4)}50%{opacity:.5;box-shadow:0 0 18px rgba(255,90,30,.75)}}

  /* 按钮:切换组 + 动作组 */
  .kcol{align-self:center;width:100%;display:flex;flex-direction:column;gap:13px}
  .keys{width:100%;display:flex;flex-direction:column;gap:8px;
    padding:7px;border-radius:13px;
    background:linear-gradient(#1e1e1e,#171717);
    box-shadow:inset 0 2px 6px rgba(0,0,0,.72),inset 0 0 0 1px rgba(255,255,255,.03),0 1px 0 rgba(255,255,255,.05)}
  .key{height:40px;width:100%;border-radius:8px;border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:6px;
    font-family:var(--sans);font-weight:700;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;
    color:#9c9c9c;background:linear-gradient(180deg,#333,#2a2a2a);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.09),inset 0 -1px 2px rgba(0,0,0,.4),0 2px 4px rgba(0,0,0,.4);
    transition:transform .08s ease,color .12s}
  .key:hover{color:#c0c0c0}
  .key:active{transform:translateY(1px)}
  .key.on{color:var(--amber);background:linear-gradient(180deg,#191919,#131313);
    text-shadow:0 0 10px rgba(255,90,30,.65);box-shadow:inset 0 2px 6px rgba(0,0,0,.85),inset 0 0 0 1px rgba(255,255,255,.07)}
  .key svg{width:13px;height:13px;flex:none}
  .kcol{position:relative}
  /* 动作组:一排二正方形 icon 键 */
  .krow{flex-direction:row}
  .krow .key{width:auto;flex:1;aspect-ratio:1/1;height:auto;padding:0;position:relative}
  .krow .key svg{width:15px;height:15px}
  .key.busy{pointer-events:none}
  .key.busy svg{opacity:0}
  .key.busy::after{content:"";position:absolute;left:50%;top:50%;width:15px;height:15px;margin:-7.5px 0 0 -7.5px;
    border-radius:50%;border:1.6px solid rgba(255,90,30,.25);border-top-color:var(--amber);animation:spin .7s linear infinite}
  .key.err{color:#ff4d4d}.key.err svg{opacity:1}
  /* ── 桌宠层:小人坐在框顶沿;真机上桌宠带被原生 PetBar 接管(拖窗+双击续杯) ── */
  #petcv{position:absolute;left:0;top:0;width:100vw;height:100vh;z-index:40;pointer-events:none;
    -webkit-user-select:none;user-select:none}
  #petHit{position:absolute;z-index:41;cursor:grab;-webkit-app-region:no-drag;
    -webkit-user-select:none;user-select:none;outline:none;-webkit-tap-highlight-color:transparent}
</style>
</head>
<body>
  <canvas id="petcv"></canvas>
  <div id="petHit"></div>
  <div class="device" id="device">
    <div class="silk tl">CLAUDE·CODE / USAGE</div>
    <div class="silk tr">MOD-CC</div>
    <div class="silk bm">LOCAL DATA LINK · NO NETWORK</div>
    <div class="led" id="led" title="隐藏浮窗(⌥⇧R 唤回)"></div>
    <div class="latch" id="kEdge" title="展开按键区">
      <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6.5 1.5 3 5l3.5 3.5"/>
      </svg>
    </div>

    <div class="bezel"><div class="screen">
      <div class="top">
        <span id="topLeft">TODAY</span>
        <span class="live"><b></b><span id="stamp">刷新 —</span></span>
      </div>
      <div class="hero" id="hero"><span class="n">––</span></div>
      <div class="warnbar" id="warnbar"></div>
      <div class="viz" id="viz"></div>
    </div></div>

    <div class="kcol">
      <div class="keys">
        <button class="key on" id="kWork">WORK</button>
        <button class="key" id="kTime">TIME</button>
        <button class="key" id="k24h">24H</button>
      </div>
      <div class="keys krow">
        <button class="key" id="kSync" title="刷新数据">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12.5 2.5v3.2h-3.2"/><path d="M1.5 11.5V8.3h3.2"/>
            <path d="M2.6 5.4a4.9 4.9 0 0 1 8.1-1.9l1.8 1.7M1.5 8.8l1.8 1.7a4.9 4.9 0 0 0 8.1-1.9"/>
          </svg>
        </button>
        <button class="key" id="kOpen" title="打开完整报告">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11.5 7.6v3.4a1.5 1.5 0 0 1-1.5 1.5H3a1.5 1.5 0 0 1-1.5-1.5V4A1.5 1.5 0 0 1 3 2.5h3.4"/>
            <path d="M9 1.5h3.5V5"/><path d="M12.3 1.7 6.8 7.2"/>
          </svg>
        </button>
      </div>
      <div class="latch" id="kFold" title="收起按键区">
        <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3.5 1.5 7 5 3.5 8.5"/>
        </svg>
      </div>
    </div>
  </div>

<script>
  const $=id=>document.getElementById(id);
  let CUR=null, MODE="work";
  let openTimer=0, syncTimer=0, scanning=false;

  const ft=n=>n>=1e6?(n/1e6).toFixed(1)+"M":n>=1e3?Math.round(n/1e3)+"K":String(n|0);
  const fm=m=>m>=60?(m/60|0)+"H"+(m%60)+"M":m+"M";
  const heroHM=m=>m>=60?`${m/60|0}<i>h</i>${String(m%60).padStart(2,"0")}<i>m</i>`:`${m}<i>m</i>`;
  const esc=s=>String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
  const relTime=iso=>{
    const d=iso&&new Date(iso); if(!d||isNaN(d)) return "刷新 —";
    const s=Math.max(0,(Date.now()-d.getTime())/1000);
    if(s<45) return "刚刷新";
    if(s<3600) return `${Math.round(s/60)}分钟前`;
    if(s<86400) return `${Math.round(s/3600)}小时前`;
    return `${Math.round(s/86400)}天前`;
  };

  function trendSVG(vals,cap){
    if(!vals||!vals.length) return "";
    const w=100,h=24,mx=Math.max(1,...vals);
    const p=vals.map((v,i)=>[(i/(vals.length-1))*w,h-(v/mx)*(h-4)-2]);
    const l=p.map((q,i)=>(i?"L":"M")+q[0].toFixed(1)+" "+q[1].toFixed(1)).join(" ");
    return `<div class="trend"><svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><path d="${l}"/></svg><span class="tcap">${cap}</span></div>`;
  }

  function radarSVG(hourly,size,withWave){
    const vb=170,cx=85,cy=85,r0=12,R=62,hm=Math.max(1,...hourly);
    let wave="",blips="";
    if(withWave){
      const pts=hourly.map((v,i)=>{const a=(-90+i*15)*Math.PI/180;const r=r0+(v/hm)*(R-r0);return [cx+Math.cos(a)*r,cy+Math.sin(a)*r];});
      wave=`<path class="rb-wave" d="${pts.map((q,i)=>(i?"L":"M")+q[0].toFixed(1)+" "+q[1].toFixed(1)).join(" ")} Z"/>`;
      const top3=hourly.map((v,i)=>[v,i]).sort((a,b)=>b[0]-a[0]).slice(0,3).filter(x=>x[0]>0);
      blips=top3.map(([v,i])=>{const a=(-90+i*15)*Math.PI/180;const r=r0+(v/hm)*(R-r0);
        return `<circle class="blip" cx="${(cx+Math.cos(a)*r).toFixed(1)}" cy="${(cy+Math.sin(a)*r).toFixed(1)}" r="3"/>`;}).join("");
    }
    const labs=[[0,"00"],[6,"06"],[12,"12"],[18,"18"]].map(([h,t])=>{
      const a=(-90+h*15)*Math.PI/180,lr=R+13;
      return `<text class="rb-lab" x="${(cx+Math.cos(a)*lr).toFixed(1)}" y="${(cy+Math.sin(a)*lr).toFixed(1)}" text-anchor="middle" dominant-baseline="central">${t}</text>`;
    }).join("");
    return `<svg viewBox="0 0 ${vb} ${vb}" style="width:${size}px;height:${size}px;flex:none">
      <circle class="rb-grid" cx="${cx}" cy="${cy}" r="${R}"/><circle class="rb-grid" cx="${cx}" cy="${cy}" r="37"/>
      <line class="rb-grid" x1="${cx-R}" y1="${cy}" x2="${cx+R}" y2="${cy}"/><line class="rb-grid" x1="${cx}" y1="${cy-R}" x2="${cx}" y2="${cy+R}"/>
      ${wave}
      <g class="rb-sweep" style="transform-origin:${cx}px ${cy}px"><path d="M${cx} ${cy} L${cx} ${cy-R} A${R} ${R} 0 0 1 ${(cx+R*0.87).toFixed(1)} ${(cy-R*0.5).toFixed(1)} Z" fill="rgba(255,90,30,.12)"/></g>
      ${blips}${labs}</svg>`;
  }

  const shades=["#ff8a4f","#e8571f","#bf4517","#7e3311","#5e2c10"];

  function projList(){
    return (CUR.projects||[]).filter(p=>(p.work||0)>0).slice(0,5);
  }

  function vizWork(){
    const projs=projList();
    if(!projs.length) return `<div class="scanning"><span class="cap">NO DATA</span></div>`;
    const maxV=Math.max(...projs.map(p=>p.work)),N=14;
    const warn=!!(CUR.classify&&CUR.classify.warn);
    return `<div class="plist">`+projs.map(p=>{
      const on=Math.max(1,Math.round(p.work/maxV*N));
      const segs=Array.from({length:N},(_,i)=>`<span class="seg ${i<on?'on':''}"></span>`).join("");
      const cls=(p.fallback?"fb":"")+(p.fallback&&warn?" lit":"");
      return `<div class="prow ${cls}"><span class="pname">${esc(p.name)}</span><div class="segs">${segs}</div><span class="pval">${ft(p.work)}</span></div>`;
    }).join("")+`</div>`;
  }

  function vizTime(){
    const projs=projList().filter(p=>(p.active_min||0)>0);
    if(!projs.length) return `<div class="scanning"><span class="cap">NO DATA</span></div>`;
    const tot=projs.reduce((s,p)=>s+p.active_min,0);
    const color=(p,i)=>p.fallback?"#5e2c10":shades[i%4];
    const bar=projs.map((p,i)=>`<div class="alloc-seg" style="width:${(p.active_min/tot*100).toFixed(1)}%;background:${color(p,i)}"></div>`).join("");
    const lg=projs.map((p,i)=>`<div class="lg ${p.fallback?'fb':''}"><span class="sw" style="background:${color(p,i)}"></span><span class="nm">${esc(p.name)}</span><span class="lv">${fm(p.active_min)}</span></div>`).join("");
    return `<div class="alloc"><div class="alloc-bar">${bar}</div><div class="alloc-legend">${lg}</div></div>`;
  }

  function vizRhythm(){
    const H=CUR.hourly||Array(24).fill(0);
    const tot=Math.max(1,H.reduce((s,v)=>s+v,0));
    const sum=(a,b)=>H.slice(a,b).reduce((s,v)=>s+v,0);
    const periods=[["上午",sum(6,12)],["下午",sum(12,18)],["晚间",sum(18,24)],["深夜",sum(0,6)]];
    const pk=H.indexOf(Math.max(...H));
    const rows=periods.map(([l,v])=>{const pct=Math.round(v/tot*100);
      return `<div class="r-line"><span class="rl">${l}</span><span class="rt"><i style="width:${pct}%"></i></span><span class="rv">${pct}%</span></div>`;}).join("");
    return `<div class="rhythm">${radarSVG(H,158,true)}<div class="r-stats">
      <div class="r-peak">峰值 <b>${String(pk).padStart(2,"0")}:00 · ${ft(Math.max(...H))}</b></div>${rows}</div></div>`;
  }

  function heroHTML(){
    if(MODE==="work") return `<span class="n">${ft(CUR.tokens.work||0)}</span><span class="u">产出<br>WORK</span>`;
    if(MODE==="time") return `<span class="n">${heroHM(CUR.active_min||0)}</span><span class="u">活跃<br>TIME</span>${trendSVG(CUR.active7,"近7天 活跃")}`;
    const H=CUR.hourly||[];
    const pk=H.length?H.indexOf(Math.max(...H)):0;
    return `<span class="n">${String(pk).padStart(2,"0")}:00</span><span class="u">峰值<br>PEAK</span>`;
  }

  function render(){
    if(!CUR){ showScanning(); return; }
    const sc=document.querySelector(".screen");
    sc.classList.remove("scan");
    $("topLeft").textContent="TODAY"+(CUR.sessions?` · ${CUR.sessions} SESS`:"");
    $("stamp").textContent=relTime(CUR.generated_at);
    $("hero").innerHTML=heroHTML();
    // 分类警示:兜底桶占大头时亮条(仅 WORK 视图,那才是分桶叙事)
    const cl=CUR.classify||{}, warn=!!cl.warn&&MODE==="work";
    sc.classList.toggle("warn",warn);
    $("warnbar").innerHTML=warn?`⚠ <b>${Math.round((cl.fallback_share||0)*100)}%</b> 产出未归类 · 终端跑 <b>doctor</b> 归类`:"";
    $("viz").innerHTML=MODE==="work"?vizWork():MODE==="time"?vizTime():vizRhythm();
  }

  // loading:专设「采集信号」态——干净雷达(无 24H 时刻标签)+ ping 扩散环 + 扫掠 + 脉动核心
  function scanRadar(size){
    const cx=85,cy=85,R=62;
    return `<svg viewBox="0 0 170 170" style="width:${size}px;height:${size}px;flex:none">
      <circle class="sr-grid" cx="${cx}" cy="${cy}" r="${R}"/><circle class="sr-grid" cx="${cx}" cy="${cy}" r="37"/>
      <line class="sr-cross" x1="${cx-R}" y1="${cy}" x2="${cx+R}" y2="${cy}"/><line class="sr-cross" x1="${cx}" y1="${cy-R}" x2="${cx}" y2="${cy+R}"/>
      <circle class="sr-ping" cx="${cx}" cy="${cy}" r="8"/>
      <g class="sr-sweep" style="transform-origin:${cx}px ${cy}px"><path d="M${cx} ${cy} L${cx} ${cy-R} A${R} ${R} 0 0 1 ${(cx+R*0.87).toFixed(1)} ${(cy-R*0.5).toFixed(1)} Z"/></g>
      <circle class="sr-core" cx="${cx}" cy="${cy}" r="2.6"/></svg>`;
  }
  function showScanning(){
    const sc=document.querySelector(".screen");
    sc.classList.add("scan"); sc.classList.remove("warn");  // 采集态清掉旧警示,免残留在雷达上方
    $("stamp").textContent="读取中";
    $("viz").innerHTML=`<div class="scanwrap">${scanRadar(184)}<div class="scancap">SCANNING…</div></div>`;
  }
  window.__setData=function(json){
    scanning=false; clearTimeout(syncTimer);
    try{CUR=typeof json==="string"?JSON.parse(json):json;render();}
    catch(e){document.querySelector(".screen").classList.remove("scan");  // 别卡在采集态(hero 永久隐藏)
      $("viz").innerHTML=`<div class="scanning"><span class="cap">DATA ERR</span></div>`;}
  };

  function post(name){if(window.webkit?.messageHandlers?.ccg)window.webkit.messageHandlers.ccg.postMessage(name)}
  function setMode(m){MODE=m;
    $("kWork").classList.toggle("on",m==="work");
    $("kTime").classList.toggle("on",m==="time");
    $("k24h").classList.toggle("on",m==="24h");
    if(CUR&&!scanning)render();}
  $("kWork").addEventListener("click",()=>setMode("work"));
  $("kTime").addEventListener("click",()=>setMode("time"));
  $("k24h").addEventListener("click",()=>setMode("24h"));
  $("kOpen").addEventListener("click",()=>{
    if($("kOpen").classList.contains("busy"))return;
    $("kOpen").classList.remove("err"); $("kOpen").classList.add("busy");
    post("openFull");
    clearTimeout(openTimer); openTimer=setTimeout(()=>$("kOpen").classList.remove("busy"),20000);
  });
  window.__openDone=function(ok){
    clearTimeout(openTimer); $("kOpen").classList.remove("busy");
    if(!ok){$("kOpen").classList.add("err");setTimeout(()=>$("kOpen").classList.remove("err"),1600);}
  };
  const doSync=()=>{
    if(scanning)return;
    scanning=true; showScanning(); post("refresh");
    clearTimeout(syncTimer); syncTimer=setTimeout(()=>{scanning=false; if(CUR)render();},10000);
  };
  $("kSync").addEventListener("click",doSync);
  // LED = 电源:点击隐藏浮窗(⌥⇧R 唤回)
  $("led").addEventListener("click",()=>post("hide"));

  // 折叠:按键列收起(icon 键)/ 展开(右缘卡扣)。Swift 同步收放窗宽并记住状态
  function applyFold(f){ document.body.classList.toggle("collapsed",f); }
  window.__setFold=applyFold;   // Swift 启动时恢复状态用
  $("kFold").addEventListener("click",()=>{ applyFold(true);  post("fold"); });
  $("kEdge").addEventListener("click",()=>{ applyFold(false); post("unfold"); });

  render();  // 初始 SCANNING 态
  setInterval(()=>{ if(CUR&&!scanning) $("stamp").textContent=relTime(CUR.generated_at); },30000);  // 相对时间随钟走
  requestAnimationFrame(()=>$("device").classList.add("in"));
</script>

    return d.palette[PCH.indexOf(ch)]||null;
  };
  const LAPSET=new Set();
  for(const[,d]of all){
    const off=d.ground-G0;
    for(let y=0;y<d.rows.length;y++)for(let x=0;x<Math.min(LAPW,d.rows[y].length);x++)
      if(LAPG.has(colAt(d,x,y)))LAPSET.add(x+","+(y-off));
  }
  {
    const d=raw.p1;
    const warm=(x,y)=>{const c=colAt(d,x,y);return !!c&&c!=="#100e10"&&!LAPG.has(c);};
    const adjWarm=(x,y)=>{
      for(let a=-1;a<=1;a++)for(let b=-1;b<=1;b++)
        if((a||b)&&warm(x+b,y+a))return true;
      return false;
    };
    for(let y=0;y<d.rows.length;y++)for(let x=0;x<Math.min(LAPW,d.rows[y].length);x++)
      if(colAt(d,x,y)==="#100e10"&&!adjWarm(x,y))LAPSET.add(x+","+y);
  }
  PROPH=raw.p1.rows.length;
  PROP=document.createElement("canvas"); PROP.width=158; PROP.height=PROPH;
  const pg=PROP.getContext("2d");
  {
    const filled=new Set();
    for(const k of["p1","p4","p3","p2"]){
      const d=raw[k], off=d.ground-G0;
      for(let y=0;y<d.rows.length;y++)for(let x=0;x<Math.min(LAPW,d.rows[y].length);x++){
        const col=colAt(d,x,y); if(!col)continue;
        if(!(LAPG.has(col)||col==="#100e10"))continue;
        const key=x+","+(y-off);
        if(!LAPSET.has(key)||filled.has(key))continue;
        filled.add(key); pg.fillStyle=col; pg.fillRect(x,y-off,1,1);
      }
    }
  }
  for(const[k,d]of all){
    const gw=Math.max(...d.rows.map(r=>r.length)), gh=d.rows.length;
    const off=d.ground-G0;
    const pal=d.palette, img=document.createElement("canvas");
    img.width=gw; img.height=gh;
    const g=img.getContext("2d"), fill=[];
    const zone=CUPZONE[k];
    for(let y=0;y<gh;y++){const row=d.rows[y];
      for(let x=0;x<row.length;x++){const ch=row[x]; if(ch===".")continue;
        const col=pal[PCH.indexOf(ch)]; if(!col)continue;
        const isLap = x<LAPW && (LAPG.has(col)||col==="#100e10") && LAPSET.has(x+","+(y-off));
        if(isLap)continue;
        g.fillStyle=col; g.fillRect(x,y,1,1);
        if(zone&&x>=zone.x0&&x<=zone.x1&&y>=zone.y0&&y<=zone.y1){
          const r=parseInt(col.slice(1,3),16),gg=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16);
          if(isFill(r,gg,b,zone.mode))fill.push([x,y]);
        }}}
    fill.sort((a,b_)=>a[1]-b_[1]);
    const floats=(FLOATS[k]||[]).map(fr=>{
      const fc=document.createElement("canvas"); fc.width=fr.w; fc.height=fr.h;
      const fg=fc.getContext("2d");
      const id=g.getImageData(fr.x,fr.y,fr.w,fr.h), od=fg.createImageData(fr.w,fr.h);
      for(let i=0;i<id.data.length;i+=4){
        if(!id.data[i+3])continue;
        const lum=.299*id.data[i]+.587*id.data[i+1]+.114*id.data[i+2];
        if(lum>150){for(let j=0;j<4;j++)od.data[i+j]=id.data[i+j]; id.data[i+3]=0;}
      }
      fg.putImageData(od,0,0); g.putImageData(id,fr.x,fr.y);
      return {img:fc,x:fr.x,y:fr.y};
    });
    P[k]={img,gw,gh,ground:d.ground||gh-1,fill,floats};
  }
}

/* ── 状态机 ── */
let PMODE="idle", CHEER=0, blinkT=0, blinkAt=2.4, boba=1, JOY=0;
const TT={dip:.10,hop:.16,land:.13,settle:.12};
let TR=null, flT=99;
function trSample(t){
  const ei=u=>u*u, eo=u=>1-(1-u)*(1-u);
  if(t<TT.dip)   return {dy: Math.round(2*eo(t/TT.dip)),        mix:0, ph:0};
  t-=TT.dip;
  if(t<TT.hop)   return {dy: Math.round(2-8*eo(t/TT.hop)),      mix:Math.min(1,t/TT.hop*1.4), ph:1};
  t-=TT.hop;
  if(t<TT.land)  return {dy: Math.round(-6+7*ei(t/TT.land)),    mix:1, ph:2};
  t-=TT.land;
  if(t<TT.settle)return {dy: Math.round(1-eo(t/TT.settle)),     mix:1, ph:3};
  return {dy:0, mix:1, ph:4};
}
function poseNow(){return CHEER>0?"p4":MODES[PMODE].pose;}

const art=document.createElement("canvas"); const ga=art.getContext("2d");
const artB=document.createElement("canvas"); const gb=artB.getContext("2d");
let lastKey="", prevPose=null;
function compose(key,blink){
  const p=P[key];
  art.width=p.gw; art.height=p.gh;
  ga.clearRect(0,0,p.gw,p.gh);
  ga.drawImage(p.img,0,0);
  if(p.fill.length){
    const ys=p.fill.map(c=>c[1]), y0=Math.min(...ys), y1=Math.max(...ys);
    const cut=y0+(1-boba)*(y1-y0+1);
    ga.fillStyle=EMPTY;
    for(const[x,y]of p.fill) if(y<cut) ga.fillRect(x,y,1,1);
  }
  const B=BLINKS[key];
  if(blink&&B){
    ga.fillStyle=PSKIN;
    for(const[x,y,w,h]of B.cover) ga.fillRect(x,y,w,h);
    ga.fillStyle=PDARK;
    for(const[x,y,w,h]of B.line) ga.fillRect(x,y,w,h);
  }
  return p;
}

/* ── 画布 ── */
const pcv=document.getElementById("petcv"), pctx=pcv.getContext("2d");
let PW=0,PH=0,PDPR=Math.min(2,window.devicePixelRatio||1);
let embers=[];
function pfit(){const r=pcv.getBoundingClientRect();PW=r.width;PH=r.height;
  pcv.width=PW*PDPR;pcv.height=PH*PDPR;pctx.setTransform(PDPR,0,0,PDPR,0,0);pctx.imageSmoothingEnabled=false;}
new ResizeObserver(pfit).observe(pcv);
function spriteY(p){return PET_TOP+2-(p.ground+1);}
function pscr(){return {x0:42,x1:PW-132,y0:PET_TOP+46,y1:PH-26};}

function placeHit(){                 // 热区=整条桌宠带(罩住小人+电脑+杯,shona 点名再加大)
  const p=P[poseNow()]; if(!p)return;
  const hit=document.getElementById("petHit");
  hit.style.left="0px"; hit.style.top="0px";
  hit.style.width=(PET_SX+p.gw+28)+"px"; hit.style.height=(PET_TOP+8)+"px";
}
document.getElementById("petHit").addEventListener("mousedown",e=>e.preventDefault());
function petRefill(){                 // 双击续杯(真机由原生 PetBar 识别双击转调;浏览器走 DOM dblclick)
  boba=1; JOY=.28; saveBoba();
  const p=P[poseNow()], z=CUPZONE[poseNow()];
  for(let i=0;i<7;i++) embers.push({x:PET_SX+(z.x0+4+Math.random()*(z.x1-z.x0-8)),
    y:spriteY(p)+z.y0+6, vy:-8-Math.random()*10, vx:(Math.random()-.5)*5,
    life:.7+Math.random()*.3, sz:1, ph:Math.random()*6.3, sw:.6});
  for(let i=0;i<2;i++) embers.push({heart:1,
    x:PET_SX+(z.x0+(z.x1-z.x0)*(.2+.5*i)+Math.random()*3),
    y:spriteY(p)+(z.y0-4)-i*7, vy:-15-Math.random()*6, vx:(Math.random()-.5)*3,
    life:.85+i*.15, sz:1, ph:Math.random()*6.3, sw:1.4});
}
document.getElementById("petHit").addEventListener("dblclick",petRefill);

function switchState(){
  const key=poseNow(), p=P[key]; if(!p)return;
  if(key===lastPos)return;
  artB.width=art.width; artB.height=art.height;
  gb.clearRect(0,0,artB.width,artB.height);
  gb.drawImage(art,0,0);
  prevPose=lastPos; TR={t:0,landed:false};
  flT=-1; placeHit();
}
function dust(p){
  const cx=PET_SX+p.gw/2;
  for(let i=0;i<6;i++) embers.push({x:cx+(Math.random()-.5)*p.gw*.55,
    y:PET_TOP+3, vy:-3-Math.random()*7, vx:(Math.random()<.5?-1:1)*(4+Math.random()*9),
    life:.32+Math.random()*.14, sz:1, ph:Math.random()*6.3, sw:.2, dust:1});
}
function milestone(){
  CHEER=1; switchState();
  const p=P.p4, px=PET_SX+p.gw/2;
  for(let i=0;i<46;i++) embers.push({x:px+(Math.random()-.5)*p.gw*.9,
    y:spriteY(p)+8+Math.random()*10, vy:12+Math.random()*22, vx:(Math.random()-.5)*8,
    life:.9+Math.random()*.5, sz:Math.random()<.28?2:1, ph:Math.random()*6.3, sw:Math.random()*1.1});
  placeHit();
}

let last=0, lastPos=null;
function petLoop(ts){
  const dt=Math.max(0,Math.min(.05,(ts-last)/1000||0)); last=ts;
  boba=Math.max(0,boba-dt/DRAIN_S*(PMODE==="calm"?2:1));
  if(blinkT>0)blinkT-=dt;
  blinkAt-=dt;
  if(blinkAt<=0){blinkT=.13;blinkAt=2.4+Math.random()*3.2;}
  if(CHEER>0){CHEER-=dt/2.4; if(CHEER<=0){CHEER=0;switchState();}}
  if(flT>=0)flT+=dt;

  const key=poseNow(), p=P[key]; if(!p){requestAnimationFrame(petLoop);return;}
  const bms=CHEER>0?400:MODES[PMODE].breathMs;
  const bob=(ts%bms)<bms/2?0:-1;
  let dy=bob, mix=1;
  if(TR){TR.t+=dt;
    const s=trSample(TR.t);
    dy=s.dy; mix=s.mix;
    if(s.ph>=3&&!TR.landed){TR.landed=true; flT=0; dust(p);}
    if(s.ph>=4){TR=null; dy=bob; flT=Math.max(flT,0);}
  }
  if(JOY>0){JOY=Math.max(0,JOY-dt);
    if(!TR) dy-=Math.round(Math.sin((1-JOY/.28)*Math.PI)*2);}
  const ck=key+"|"+(blinkT>0?1:0)+"|"+Math.round(boba*40);
  if(ck!==lastKey){compose(key,blinkT>0);lastKey=ck;}
  lastPos=key;

  pctx.clearRect(0,0,PW,PH);
  const sy=spriteY(p)+dy;
  pctx.imageSmoothingEnabled=false;
  if(PROP)pctx.drawImage(PROP,PET_SX,spriteY(P.p1),PROP.width,PROPH);
  if(mix<1&&prevPose&&P[prevPose]){
    pctx.globalAlpha=1-mix;
    pctx.drawImage(artB,PET_SX,spriteY(P[prevPose])+dy,P[prevPose].gw,P[prevPose].gh);
  }
  pctx.globalAlpha=Math.max(mix,.05);
  pctx.drawImage(art,PET_SX,sy,p.gw,p.gh);
  pctx.globalAlpha=1;
  if(p.floats&&p.floats.length&&flT>=0){
    p.floats.forEach((f,i)=>{
      const u=Math.max(0,Math.min(1,(flT-.06-i*.14)/.30));
      if(u<=0)return;
      const e=1-(1-u)*(1-u);
      let a=e, fy=Math.round((1-e)*3);
      if(u>=1){
        const an=FLOATANIM[key];
        if(an==="bob")     fy=Math.round(Math.sin(ts/950+i*2.1)*1.3);
        else if(an==="twinkle") a=.55+.45*Math.sin(ts/260+i*2.6);
      }
      pctx.globalAlpha=a;
      pctx.drawImage(f.img,PET_SX+f.x,sy+f.y+fy,f.img.width,f.img.height);
    });
    pctx.globalAlpha=1;
  }
  const se=pscr();
  for(const e of embers){
    e.x+=(e.vx+Math.sin(e.ph)*e.sw)*dt; e.y+=e.vy*dt; e.vy+=11*dt;
    e.life-=dt*(e.dust?1.2:e.heart?.8:.4); e.ph+=dt*9;
    if(e.life<=0)continue;
    if(e.y>=0&&e.x>=se.x0&&e.x<=se.x1&&e.y<=se.y1){
      if(e.heart){
        pctx.shadowBlur=0;
        pctx.globalAlpha=Math.max(0,Math.min(1,e.life));
        pctx.drawImage(HEART,Math.round(e.x),Math.round(e.y),10,8);
        pctx.globalAlpha=1;
      }else if(e.dust){
        pctx.shadowBlur=0;
        pctx.fillStyle=`rgba(196,186,170,${Math.min(.8,Math.max(0,e.life)*2)})`;
        pctx.fillRect(e.x,e.y,1,1);
      }else{
        const fl=.55+.45*Math.sin(e.ph);
        pctx.fillStyle=`rgba(255,${(150+Math.random()*50)|0},95,${Math.max(0,e.life)*fl})`;
        pctx.shadowColor="rgba(255,120,50,.85)";pctx.shadowBlur=7;
        pctx.fillRect(e.x,e.y,e.sz,e.sz+1);}}}
  pctx.shadowBlur=0;
  embers=embers.filter(e=>e.life>0&&e.y<se.y1+4);
  requestAnimationFrame(petLoop);
}

/* ── 真实数据 → 状态(接 __setData)── */
const LS=(k,v)=>{try{
  if(v===undefined){const s=localStorage.getItem(k);return s?JSON.parse(s):null;}
  localStorage.setItem(k,JSON.stringify(v));
}catch(e){return null;}};
let HIST=LS("ccg.pet.hist")||[];     // [{t,w}] work 采样(Swift 每 5min 注一次)
let lastBusyAt=LS("ccg.pet.busyAt")||0;
let lastGen="";
function saveBoba(){LS("ccg.pet.boba",{v:boba,t:Date.now()});}
{const bs=LS("ccg.pet.boba");
 if(bs&&bs.v!=null)boba=Math.max(0,bs.v-(Date.now()-bs.t)/1000/DRAIN_S);}
setInterval(saveBoba,60000);

function petOnData(cur){
  if(!cur||!cur.tokens)return;
  if(cur.generated_at&&cur.generated_at===lastGen)return;
  lastGen=cur.generated_at||"";
  const w=cur.tokens.work||0, t=Date.now();
  if(HIST.length&&w<HIST[HIST.length-1].w-1000)HIST=[];   // 跨天归零→清史
  if(!HIST.length||t-HIST[HIST.length-1].t>60000)HIST.push({t,w});
  HIST=HIST.filter(s=>t-s.t<3*3600000).slice(-60);
  LS("ccg.pet.hist",HIST);
  evalMode();
  checkMilestone(w);
}
function rateNow(){                   // work token/h,取 4.5-20min 前的参考点
  if(HIST.length<2)return null;
  const t=Date.now(), nw=HIST[HIST.length-1];
  let ref=null;
  for(let i=HIST.length-2;i>=0;i--){
    const ago=t-HIST[i].t;
    if(ago>=4.5*60000){ref=HIST[i]; if(ago>20*60000)break; else break;}
  }
  if(!ref)return null;
  const dh=(nw.t-ref.t)/3600000;
  return dh>0?(nw.w-ref.w)/dh:null;
}
function lastActiveAgoMin(){
  for(let i=HIST.length-1;i>0;i--)
    if(HIST[i].w>HIST[i-1].w) return (Date.now()-HIST[i].t)/60000;
  return Infinity;
}
function evalMode(){
  let m;
  const r=rateNow();
  if(r===null){                       // 无史兜底:本/上小时有量→回血,否则闲
    const h=(typeof CUR!=="undefined"&&CUR&&CUR.hourly)||[];
    const hh=new Date().getHours();
    m=(h[hh]||h[(hh+23)%24])?"calm":"idle";
  }else if(r>=BUSY_TPH){
    m="busy"; lastBusyAt=Date.now(); LS("ccg.pet.busyAt",lastBusyAt);
  }else if(lastActiveAgoMin()>=IDLE_MIN){
    m="idle";
  }else m="calm";
  if(m==="idle"&&(Date.now()-lastBusyAt)/60000<CALM_AFTER_BUSY_MIN)m="calm";
  if(m!==PMODE){PMODE=m;switchState();}
}
setInterval(evalMode,60000);
function checkMilestone(w){
  const day=new Date().toISOString().slice(0,10);
  let st=LS("ccg.pet.mile")||{};
  if(st.date!==day)st={date:day,claimed:[]};
  for(const th of MILESTONES){
    if(w>=th&&!st.claimed.includes(th)){
      st.claimed.push(th);
      if(CHEER<=0)milestone();
      break;
    }
  }
  LS("ccg.pet.mile",st);
}
/* 钩进 __setData(原函数先跑,CUR 就绪后驱动小人) */
{const orig=window.__setData;
 window.__setData=function(j){orig(j);try{petOnData(CUR);}catch(e){}};}
/* 调试钩子 */
window.__pet={mode:m=>{if(MODES[m]){PMODE=m;switchState();}},milestone,refill:petRefill,
  boba:v=>{boba=v;lastKey="";saveBoba();},state:()=>({PMODE,boba,CHEER,HIST:HIST.length})};

pfit(); placeHit(); requestAnimationFrame(petLoop);
</script>
</body>
