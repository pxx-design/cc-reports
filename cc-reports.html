    // Uses non-scaling-stroke for the line so it doesn't get thicker when stretched,
    // and renders dots as absolutely-positioned divs OUTSIDE the SVG so they stay
    // perfectly circular regardless of container width.
    const W = 360, H = 56, pad = 4;
    const max = Math.max(1, ...values);
    const step = (W - pad * 2) / Math.max(1, values.length - 1);
    const pts = values.map((v, i) => {
      const x = pad + i * step;
      const y = H - pad - (v / max) * (H - pad * 2);
      return [x, y];
    });
    const path = pts.map((p, i) => (i === 0 ? "M" : "L") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
    const area = path + ` L ${pts[pts.length - 1][0]} ${H - pad} L ${pts[0][0]} ${H - pad} Z`;
    const safeId = "sparkfill-" + label.replace(/[^a-zA-Z0-9]/g, "");

    // Dots as HTML divs (immune to viewBox stretching)
    const dotsHTML = pts.map(([x, y], i) => {
      const last = i === pts.length - 1;
      const xPct = (x / W) * 100;
      const yPct = (y / H) * 100;
      const day = days?.[i];
      const cls = ["spark-dot"];
      if (last) cls.push("is-last");
      if (day) cls.push("is-clickable");
      const dateAttr = day ? `data-date="${day.date}"` : "";
      return `<div class="${cls.join(" ")}" style="left:${xPct}%; top:${yPct}%;" ${dateAttr}></div>`;
    }).join("");

    return `
      <div class="spark">
        <div class="spark-row">
          <span class="spark-name">${label}</span>
          <span class="spark-val">${valLabel}</span>
        </div>
        <div class="spark-container">
          <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
            <defs>
              <linearGradient id="${safeId}" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="rgba(23,23,23,0.12)"/>
                <stop offset="100%" stop-color="rgba(23,23,23,0)"/>
              </linearGradient>
            </defs>
            <path d="${area}" fill="url(#${safeId})"/>
            <path d="${path}" fill="none" stroke="var(--g5)" stroke-width="1.5"
              stroke-linejoin="round" stroke-linecap="round"
              vector-effect="non-scaling-stroke"/>
          </svg>
          <div class="spark-dots">${dotsHTML}</div>
        </div>
        <div class="spark-axis">
          <span>${axisLabels[0]}</span>
          <span>${axisLabels[1]}</span>
        </div>
      </div>
    `;
  }

  function buildTrendInsight(days) {
    const tokens = days.map(d => d.tokens.total);
    const sessions = days.map(d => d.sessions);
    const totalTokens = tokens.reduce((a, b) => a + b, 0);
    const totalSessions = sessions.reduce((a, b) => a + b, 0);
    if (totalSessions === 0) return "";

    const peakIdx = sessions.indexOf(Math.max(...sessions));
    const peakDay = days[peakIdx];
    const dryDays = days.filter(d => d.sessions === 0).length;
    const peakHours = Math.round(peakDay.sessions_list.reduce((a, s) => a + s.active_min, 0) / 60);
    const peakProj = (peakDay.projects[0] || {}).label || "";
    const peakTokensShare = totalTokens > 0
      ? Math.round((peakDay.tokens.total / totalTokens) * 100) : 0;
    const half = Math.floor(days.length / 2);
    const firstHalfSes = sessions.slice(0, half).reduce((a, v) => a + v, 0);
    const secondHalfSes = sessions.slice(half).reduce((a, v) => a + v, 0);

    const lines = [];
    let line1 = `高潮在 <b>${peakDay.weekday} ${peakDay.date.slice(5)}</b>，${peakDay.sessions} 个 session 共 ${peakHours}h`;
    if (peakProj) line1 += `，主线是 <b>${escapeHTML(peakProj)}</b>`;
    line1 += `，约占${days.length === 7 ? "本周" : "本月"} ${peakTokensShare}% 的 token 用量。`;
    lines.push(line1);

    const trendBits = [];
    if (dryDays > 0) trendBits.push(`其中 <b>${dryDays} 天</b>完全空白`);
    if (firstHalfSes > 0 && secondHalfSes > 0) {
      if (secondHalfSes > firstHalfSes * 1.4) trendBits.push(`整体呈<b>上升</b>趋势（前半段 ${firstHalfSes} → 后半段 ${secondHalfSes} session）`);
      else if (firstHalfSes > secondHalfSes * 1.4) trendBits.push(`整体呈<b>回落</b>趋势（前半段 ${firstHalfSes} → 后半段 ${secondHalfSes} session）`);
    }
    if (trendBits.length) lines.push(trendBits.join("，") + "。");

    return lines.map(l => `<p>${l}</p>`).join("");
  }

  function renderTrend(days, title) {
    const tokens = days.map(d => d.tokens.total);
    const sessions = days.map(d => d.sessions);
    const prompts = days.map(d => d.user_msgs);
    const totalTokens = tokens.reduce((a, b) => a + b, 0);
    const totalSessions = sessions.reduce((a, b) => a + b, 0);
    const totalPrompts = prompts.reduce((a, b) => a + b, 0);
    const axisFirst = days[0].weekday + " " + days[0].date.slice(5);
    const axisLast = days[days.length - 1].weekday + " " + days[days.length - 1].date.slice(5);

    return `
      <div class="card reveal">
        <div class="card-head">
          <h2>${title}</h2>
          <span class="meta">${axisFirst} → ${axisLast}</span>
        </div>
        ${renderSparkline(tokens, "Tokens", "总计 " + fmtTok(totalTokens), [axisFirst, axisLast], days)}
        ${renderSparkline(sessions, "Sessions", "总计 " + fmtInt(totalSessions), [axisFirst, axisLast], days)}
        ${renderSparkline(prompts, "Prompts", "总计 " + fmtInt(totalPrompts), [axisFirst, axisLast], days)}
      </div>
    `;
  }

  function renderTokenMix(tk, sideInsightHTML) {
    const segs = [
      { key: "output",         name: "Output",      val: tk.output || 0,         color: "var(--g5)" },
      { key: "cache_creation", name: "Cache write", val: tk.cache_creation || 0, color: "var(--g3)" },
      { key: "input",          name: "Input",       val: tk.input || 0,          color: "var(--g4)" },
    ];
    const computeTotal = segs.reduce((a, s) => a + s.val, 0);
    const safeTotal = computeTotal || 1;
    const bar = segs.map(s => {
      const pct = (s.val / safeTotal) * 100;
      const wide = pct > 12;
      return `<div class="mix-seg" style="width:${pct}%; background:${s.color}; color:#fff;"
              title="${s.name}: ${fmtTok(s.val)} (${pct.toFixed(1)}%)">
              ${wide ? s.name : ""}</div>`;
    }).join("");
    const legend = segs.map(s => {
      const pct = (s.val / safeTotal) * 100;
      return `
        <div class="mix-legend-item">
          <span class="sw" style="background:${s.color}"></span>
          <span class="name">${s.name}</span>
          <span class="val">${fmtTok(s.val)} <span style="color:var(--text-tertiary);">${pct.toFixed(0)}%</span></span>
        </div>
      `;
    }).join("");

    // One-line insight selected from data
    const insight = buildTokenInsight(tk, segs, computeTotal);

    const sideBlock = sideInsightHTML ? `
      <div class="mix-side-insight">
        <div class="msi-label">← 近 N 日趋势</div>
        ${sideInsightHTML}
      </div>
    `.replace("近 N 日趋势", "近期趋势") : "";

    return `
      <div class="card reveal">
        <div class="card-head">
          <h2>Token 用量构成</h2>
          <span class="meta">总计 · ${fmtTok(computeTotal)} · 不含 cache_read</span>
        </div>
        <div class="mix">
          <div class="mix-bar">${bar}</div>
          <div class="mix-legend">${legend}</div>
          ${insight ? `<div class="mix-insight">${insight}</div>` : ""}
        </div>
        ${sideBlock}
      </div>
    `;
  }

  function buildTokenInsight(tk, segs, computeTotal) {
    if (computeTotal < 1) return "";
    const output = tk.output || 0;
    const cacheW = tk.cache_creation || 0;
    const cacheR = tk.cache_read || 0;
    const input = tk.input || 0;
    const promptTotal = input + cacheR + cacheW;
    const hit = promptTotal > 0 ? cacheR / promptTotal : 0;
    const outputPct = output / computeTotal;
    const cacheWPct = cacheW / computeTotal;

    // Priority: highest-signal observation first
    if (hit >= 0.9 && cacheR > 50_000_000) {
      return `<b>Cache hit ${Math.round(hit * 100)}%</b> · ${fmtTok(cacheR)} 命中缓存，没重读相当于<b>省了 ${fmtTok(cacheR * 0.9 / 1000)}k 次重新解析</b>。`;
    }
    if (cacheWPct > 0.6) {
      return `<b>${Math.round(cacheWPct * 100)}% 在写 cache</b> · 今天主要在加载新上下文（读文件、装载 skills、扫历史），真正 output 仅 ${Math.round(outputPct * 100)}%。`;
    }
    if (outputPct > 0.4) {
      return `<b>Output 占 ${Math.round(outputPct * 100)}%</b> · 今天产出密度高，对话/工具调用都在生成内容。`;
    }
    if (outputPct < 0.05 && cacheWPct < 0.2) {
      return `<b>${Math.round((input / computeTotal) * 100)}% 是 input</b> · 今天主要在大量重读旧上下文，建议看看哪些 prompt 没命中 cache。`;
    }
    return `Output ${fmtTok(output)} · Cache write ${fmtTok(cacheW)} · Input ${fmtTok(input)}。`;
  }

  function renderProjects(projects, range) {
    if (!projects.length) return "";
    const isDaily = range === "daily";
    const showStamps = !isDaily;

    const renderCard = (p, globalIdx) => {
      const latestTitle = p._latest_title || "";
      const isRanked = showStamps && globalIdx < 3 && !p.fallback;
      const rankClass = isRanked ? `is-rank-${globalIdx + 1}` : "";
      const stampHTML = isRanked ? `
        <div class="folder-stamp rank-${globalIdx + 1}" aria-hidden="true">
          <span class="folder-stamp-rank">${globalIdx + 1}</span>
          <span class="folder-stamp-label">Top</span>
        </div>
      ` : "";
      return `
        <div class="folder-card ${rankClass} ${p.fallback ? "is-fallback" : ""}" data-project="${escapeAttr(p.name || p.label)}">
          <div class="folder-thumb">
            <div class="folder-thumb-text">${escapeHTML(latestTitle || "—")}</div>
          </div>
          <div class="folder-name">${escapeHTML(p.label)}</div>
          <div class="folder-duration">${fmtTok(p.tokens)} <span class="folder-unit">tokens</span></div>
          <div class="folder-meta">${p.sessions} 个 session · 活跃 ${fmtMin(p.active_min || 0)}</div>
          <div class="folder-corner"></div>
          ${stampHTML}
          <div class="folder-details" data-loaded="0"></div>
        </div>
      `;
    };

    const buildRow = (items, perRow, rowClass, startIdx) => {
      let cards = items.map((p, i) => renderCard(p, startIdx + i)).join("");
      const empties = (perRow - items.length) % perRow;
      for (let k = 0; k < empties; k++) {
        cards += `<div class="folder-slot-empty" aria-hidden="true"></div>`;
      }
      return `<div class="shelf-row ${rowClass}">${cards}</div>`;
    };

    let rowsHTML = "";

    if (isDaily) {
      // daily: one rhythm — 4 per row
      for (let i = 0; i < projects.length; i += 4) {
        rowsHTML += buildRow(projects.slice(i, i + 4), 4, "row-daily", i);
      }
    } else {
      // weekly / monthly: top-3 highlight row + rest 4-per-row
      const top3 = projects.slice(0, 3);
      const rest = projects.slice(3);
      if (top3.length) {
        rowsHTML += buildRow(top3, 3, "row-top3", 0);
      }
      for (let i = 0; i < rest.length; i += 4) {
        rowsHTML += buildRow(rest.slice(i, i + 4), 4, "row-normal", 3 + i);
      }
    }

    // Top-3 share insight (only for weekly/monthly where top-3 has meaning)
    let metaInsight = "按 token 用量排序";
    const realProjects = projects.filter(p => !p.fallback);
    const totalTok = realProjects.reduce((a, p) => a + (p.tokens || 0), 0);
    if (!isDaily && realProjects.length >= 4) {
      const top3Tok = realProjects.slice(0, 3).reduce((a, p) => a + (p.tokens || 0), 0);
      const share = totalTok > 0 ? Math.round((top3Tok / totalTok) * 100) : 0;
      metaInsight += ` · <strong style="color:var(--text-primary)">Top 3 占 ${share}%</strong>`;
    }

    // Project-distribution narrative (2-3 lines, depending on focus/dispersion)
    const projectInsight = buildProjectsNarrative(projects, range);

    return `
      <div class="card section reveal projects-section">
        <div class="card-head">
          <h2>Projects today</h2>
          <span class="meta">${metaInsight}</span>
        </div>
        ${projectInsight}
        <div class="proj-list">${rowsHTML}</div>
      </div>
    `;
  }

  function buildProjectsNarrative(projects, range) {
    const real = projects.filter(p => !p.fallback);
    const buckets = projects.filter(p => p.fallback);
    const totalTok = projects.reduce((a, p) => a + (p.tokens || 0), 0);
    const realTok = real.reduce((a, p) => a + (p.tokens || 0), 0);
    if (!real.length || realTok <= 0) return "";
    const periodWord = range === "daily" ? "今天" : (range === "weekly" ? "本周" : "本月");
    const top1 = real[0];
    const top1Share = top1.tokens / realTok;
    const top1Pct = Math.round(top1Share * 100);

    const sentences = [];

    // sentence 1: dominance / dispersion of top-1 real project (按 token 用量 — 主指标, 兜底桶不参与)
    if (top1Share >= 0.55) {
      sentences.push(`${periodWord}主线明确——<b>${escapeHTML(top1.label)}</b> 一项就占了 <b>${top1Pct}%</b> 用量（${fmtTok(top1.tokens)} tokens），其余项目都是配角。`);
    } else if (top1Share >= 0.30) {
      const top2 = real[1];
      if (top2 && top2.tokens > 0) {
        const gapPct = Math.round((1 - top2.tokens / top1.tokens) * 100);
        sentences.push(`主线 <b>${escapeHTML(top1.label)}</b>（${fmtTok(top1.tokens)} tokens, ${top1Pct}%），跟次线 <b>${escapeHTML(top2.label)}</b>（${fmtTok(top2.tokens)} tokens）拉开 ${gapPct}% 差距。`);
      } else {
        sentences.push(`${periodWord}主线 <b>${escapeHTML(top1.label)}</b>（${top1Pct}%）。`);
      }
    } else {
      sentences.push(`${periodWord}用量分散在 <b>${real.length}</b> 个项目，Top 1（${escapeHTML(top1.label)}）仅占 <b>${top1Pct}%</b>，没有强势主线。`);
    }

    // sentence 2: 活跃时长 head/tail split (≥ 3 real projects) — 跟 token 用量互补的一条
    if (real.length >= 3) {
      const totalActive = real.reduce((a, p) => a + (p.active_min || 0), 0);
      const bigProjects = real.filter(p => p.active_min >= 60);
      const smallProjects = real.filter(p => p.active_min < 60 && p.active_min > 0);
      if (bigProjects.length > 0 && smallProjects.length > 0 && totalActive > 0) {
        const bigActive = bigProjects.reduce((a, p) => a + p.active_min, 0);
        const bigShare = Math.round((bigActive / totalActive) * 100);
        sentences.push(`<b>${bigProjects.length}</b> 个项目活跃 ≥ 1h（共占 ${bigShare}% 活跃时长），其余 <b>${smallProjects.length}</b> 个是零碎触碰（< 1h）。`);
      }
    }

    // sentence 3: 诚实披露未归类占比 (兜底桶不进主线, 但要说清楚跑哪了)
    if (buckets.length && totalTok > 0) {
      const bucketTok = buckets.reduce((a, p) => a + (p.tokens || 0), 0);
      const bucketPct = Math.round((bucketTok / totalTok) * 100);
      if (bucketPct >= 5) {
        const names = buckets.slice(0, 3).map(b => escapeHTML(b.label)).join(" / ");
        sentences.push(`<span class="insight-muted">另有 <b>${bucketPct}%</b> 用量落在未归类（${names}${buckets.length > 3 ? " 等" : ""}），不计入主线。</span>`);
      }
    }

    if (!sentences.length) return "";
    return `<div class="projects-insight">${sentences.map(s => `<p>${s}</p>`).join("")}</div>`;
  }

  function renderSessions(sessions_list, opts) {
    // opts: { title, emptyText, limit, showDate }
    const limit = opts.limit || sessions_list.length;
    const sliced = sessions_list.slice(0, limit);
    if (!sliced.length) {
      return `<div class="card section reveal">
        <div class="card-head"><h2>${opts.title}</h2><span class="meta">0</span></div>
        <div class="loading">${opts.emptyText}</div>
      </div>`;
    }
    const max = Math.max(...sliced.map(s => s.tokens), 1);
    const rows = sliced.map(s => {
      const pct = (s.tokens / max) * 100;
      const branchTag = s.branch ? `<span class="tag">${escapeHTML(s.branch)}</span>` : "";
      const timeCell = opts.showDate
        ? fmtMonthDay(s.start)
        : fmtTimeHHMM(s.start);
      const timeSub = opts.showDate
        ? `<span class="sub">${fmtTimeHHMM(s.start)}</span>`
        : "";
      return `
        <div class="session-row is-drill" data-sid="${escapeHTML(s.id)}" data-date="${(s.start || '').slice(0, 10)}">
          <div class="session-time">${timeCell}${timeSub}</div>
          <div class="session-main">
            <div class="session-title">${escapeHTML(s.title)}</div>
            <div class="session-meta">
              <span>${escapeHTML(s.cwd_label)}</span>
              ${branchTag}
              <span>${fmtMin(s.active_min)}</span>
            </div>
          </div>
          <div class="session-bar-wrap">
            <div class="session-bar" style="width:${pct.toFixed(1)}%"></div>
          </div>
          <div class="session-tokens">
            ${fmtTok(s.tokens)}
            <span class="sub">tokens</span>
          </div>
        </div>
      `;
    }).join("");
    const metaCount = limit < sessions_list.length
      ? `前 ${limit} / 共 ${sessions_list.length}`
      : `${sliced.length} 个 session`;
    return `
      <div class="card section reveal">
        <div class="card-head">
          <h2>${opts.title}</h2>
          <span class="meta">${metaCount}</span>
        </div>
        ${rows}
      </div>
    `;
  }

  function escapeHTML(s) {
    return String(s || "").replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  // ─── Session drill-down: 点 session 行 → 逐轮解剖 ───
  function fmtTurnTok(v) {
    if (v >= 1e6) return (v / 1e6).toFixed(2) + "M";
    if (v >= 1e3) return Math.round(v / 1e3) + "K";
    return String(v);
  }
  function renderTurns(data) {
    const turns = data.turns || [];
    if (!turns.length) return `<div class="drill-empty">这天该 session 没有可解析的轮次</div>`;
    const max = Math.max(...turns.map(t => t.tokens), 1);
    const tier = (tk) => {
      if (!tk) return "t-faint";
      const r = tk / max;
      if (r >= 0.6) return "t-spike";
      if (r >= 0.25) return "t-mid";
      if (r >= 0.08) return "t-low";
      return "t-faint";
    };
    const rows = turns.map(t => {
      const zero = !t.tokens;
      const allTools = Object.entries(t.tools || {}).sort((a, b) => b[1] - a[1]);
      const tools = allTools.slice(0, 5).map(([k, v]) => `${escapeHTML(k)}${v > 1 ? "×" + v : ""}`).join(" ");
      const allFiles = t.files || [];
      const fileChips = allFiles.slice(0, 4).map(f => `<span class="dl-file">${escapeHTML(f)}</span>`).join("");
      const moreFiles = allFiles.length > 4 ? `<span class="dl-more">+${allFiles.length - 4}</span>` : "";
      const sub =
        (fileChips ? `<span class="dl-files">${fileChips}</span>${moreFiles}` : "")
        + (tools ? `<span class="dl-tools">${tools}</span>` : "")
        + `<span class="dl-time">${escapeHTML(t.time)}</span>`;
      return `<div class="turn${zero ? " is-quiet" : ""}">
        <div class="turn-prompt">${escapeHTML(t.prompt)}</div>
        <div class="turn-cost ${tier(t.tokens)}">${zero ? "·" : fmtTurnTok(t.tokens)}</div>
        <div class="turn-sub">${sub}</div>
      </div>`;
    }).join("");
    const cap = `${turns.length} 轮 · 当天合计 ${fmtTurnTok(data.total_tokens || 0)} · 含 cache`;
    return `<div class="drill-cap">${cap}</div>${rows}`;
  }
  async function loadDrill(row) {
    const next = row.nextElementSibling;
    if (next && next.classList.contains("session-drill")) {  // 已展开 → 收起
      next.remove();
      row.classList.remove("open");
      return;
    }
    row.classList.add("open");
    const drawer = document.createElement("div");
    drawer.className = "session-drill";
    drawer.innerHTML = `<div class="drill-loading">读取 session…</div>`;
    row.insertAdjacentElement("afterend", drawer);
    const sid = row.getAttribute("data-sid");
    const date = row.getAttribute("data-date") || "";
    try {
      const res = await fetch(`/api/session?sid=${encodeURIComponent(sid)}&date=${encodeURIComponent(date)}`);
      if (!res.ok) throw new Error("http " + res.status);
      drawer.innerHTML = renderTurns(await res.json());
    } catch (e) {
      drawer.innerHTML = `<div class="drill-empty">下钻需要 live server（<code>python3 cc-reports.py serve</code>）。当前是静态快照，点不动。</div>`;
    }
  }
  document.addEventListener("click", (e) => {
    const row = e.target.closest(".session-row.is-drill");
    if (row) loadDrill(row);
  });

  function renderHeadline(agg) {

    `;
  }

  function buildFolderDetails(projectName) {
    if (!DATA) return "";
    const agg = aggregateRange(DATA, RANGE);
    const sessions = (agg.sessions_list || [])
      .filter(s => s.project === projectName);
    if (!sessions.length) {
      return `<div class="folder-empty">这个范围内没有 session 归到此项目</div>`;
    }

    // story-style summary
    const total = sessions.reduce((sum, s) => sum + s.active_min, 0);
    const longest = [...sessions].sort((a, b) => b.active_min - a.active_min)[0];
    const dateLabels = [...new Set(sessions.map(s => s.start ? s.start.slice(0, 10) : ""))]
      .filter(Boolean);
    const days = dateLabels.length;
    const summary = `<b>${sessions.length}</b> 个 session 跨 <b>${days}</b> 天，共 <b>${fmtMin(total)}</b>，最长一次「${escapeHTML(truncate(longest.title, 32))}」用了 <b>${fmtMin(longest.active_min)}</b>。`;

    // per-project daily bar chart ("in the folder")
    const chart = renderFolderChart(projectName, agg);

    // sessions list, oldest first
    const sorted = [...sessions].sort((a, b) => (a.start || "").localeCompare(b.start || ""));
    const rows = sorted.map(s => `
      <div class="folder-session">
        <span class="fs-time">${fmtMonthDay(s.start)}</span>
        <span class="fs-title">${escapeHTML(s.title)}</span>
        <span class="fs-meta">${fmtMin(s.active_min)} · ${fmtTok(s.tokens)}</span>
      </div>
    `).join("");

    return `<div class="folder-summary">${summary}</div>${chart}${rows}`;
  }

  function renderFolderChart(projectName, agg) {
    // Aggregate per-day active_min for THIS project across the current range's days.
    // Source: agg.trend_days (already in range) — each day has a projects[] array.
    const days = agg.trend_days || [];
    if (!days.length) return "";
    const series = days.map(d => {
      const found = (d.projects || []).find(p => p.name === projectName);
      return found ? (found.active_min || 0) : 0;
    });
    const maxV = Math.max(...series, 1);
    const totalMins = series.reduce((a, b) => a + b, 0);

    const W = 320, H = 56, padX = 4, padTop = 4, padBot = 4;
    const plotH = H - padTop - padBot;
    const n = series.length;
    const slotW = (W - padX * 2) / n;
    const barW = Math.max(3, Math.min(slotW - 3, 16));

    let bars = "";
    series.forEach((v, i) => {
      const cx = padX + i * slotW + slotW / 2;
      const h = v === 0 ? 1.5 : Math.max(1.5, (v / maxV) * plotH);
      const y = H - padBot - h;
      const fill = v === 0 ? "rgba(0,0,0,0.10)"
                          : (i === n - 1 ? "rgba(0,0,0,0.85)" : "rgba(0,0,0,0.55)");
      bars += `<rect x="${cx - barW / 2}" y="${y}"
        width="${barW}" height="${h}" rx="1.5"
        fill="${fill}"/>`;
    });

    const firstDay = days[0];
    const lastDay = days[days.length - 1];
    const firstLbl = firstDay.weekday + " " + firstDay.date.slice(5);
    const lastLbl = lastDay.weekday + " " + lastDay.date.slice(5);

    return `
      <div class="folder-chart">
        <div class="folder-chart-title">
          <span>每日活跃时长 · 近 ${n} 天</span>
          <span><strong>${fmtMin(totalMins)}</strong> 合计</span>
        </div>
        <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${bars}</svg>
        <div class="folder-chart-axis">
          <span>${firstLbl}</span>
          <span>${lastLbl}</span>
        </div>
      </div>
    `;
  }

  // ─── Generic click-popover ───────────────────────────
  let _popoverEl = null;
  function hidePopover() {
    if (_popoverEl) { _popoverEl.remove(); _popoverEl = null; }
    document.removeEventListener("click", _popoverOutside, true);
    document.removeEventListener("keydown", _popoverEsc);
  }
  function _popoverOutside(e) {
    if (_popoverEl && !_popoverEl.contains(e.target)) hidePopover();
  }
  function _popoverEsc(e) {
    if (e.key === "Escape") hidePopover();
  }
  function showPopover(anchorEl, html) {
    hidePopover();
    const div = document.createElement("div");
    div.className = "data-popover reveal";
    div.innerHTML = `<button class="popover-close" aria-label="关闭">×</button>${html}`;
    document.body.appendChild(div);
    const r = anchorEl.getBoundingClientRect();
    const pw = div.offsetWidth, ph = div.offsetHeight;
    let left = r.left + r.width / 2 - pw / 2 + window.scrollX;
    let top = r.bottom + 10 + window.scrollY;
    // flip up if would go off bottom
    if (r.bottom + ph + 20 > window.innerHeight) {
      top = r.top + window.scrollY - ph - 10;
    }
    left = Math.max(12, Math.min(left, window.innerWidth - pw - 12));
    div.style.left = `${left}px`;
    div.style.top = `${top}px`;
    div.querySelector(".popover-close").onclick = hidePopover;
    _popoverEl = div;
    setTimeout(() => {
      document.addEventListener("click", _popoverOutside, true);
      document.addEventListener("keydown", _popoverEsc);
    }, 0);
  }

  // Build popover content for a specific hour slot on a date.
  function buildHourPopover(dateLabel, hour, byModel) {
    const hourLabel = String(hour).padStart(2, "0") + ":00";
    const total = Object.values(byModel || {}).reduce((a, b) => a + b, 0);
    const modelRows = Object.entries(byModel || {}).sort((a, b) => b[1] - a[1]).map(([m, c]) => `
      <div class="popover-row">
        <span class="popover-label">${escapeHTML(shortModel(m))}</span>
        <span class="popover-val">${fmtTok(c)} tokens <span style="color:var(--text-tertiary)">${total ? Math.round(c/total*100) : 0}%</span></span>
      </div>
    `).join("");
    const body = total === 0
      ? `<div class="popover-empty">这个时段没有活动</div>`
      : modelRows;
    return `
      <div class="popover-head">
        <span class="popover-title">${escapeHTML(dateLabel)} · ${hourLabel}</span>
        <span class="popover-sub">${fmtTok(total)} tokens</span>
      </div>
      ${body}
    `;
  }

  let _navObserver = null;
  function setupSideNav() {
    const nav = document.getElementById("side-nav");
    if (!nav) return;
    nav.style.display = "flex";
    const links = nav.querySelectorAll("a");

    // smooth-scroll on click
    links.forEach(a => {

        e.preventDefault();
        const el = document.getElementById(a.dataset.target);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      };
    });

    // active state via IntersectionObserver
    if (_navObserver) _navObserver.disconnect();
    _navObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          links.forEach(a => a.classList.remove("active"));
          const link = nav.querySelector(`a[data-target="${entry.target.id}"]`);
          if (link) link.classList.add("active");
        }
      });
    }, { rootMargin: "-30% 0px -60% 0px", threshold: 0 });

    ["hero", "activity", "trend", "projects", "sessions"].forEach(id => {
      const el = document.getElementById(id);
      if (el) _navObserver.observe(el);
    });
  }

  // ─── Live data loader ───────────────────────────────
  // Tries /api/data first (live, rebuilt every fetch by `cc-reports.py serve`),
  // falls back to static cc-reports-data.json (one-shot `cc-reports.py build`).
  async function fetchData() {
    try {
      const r = await fetch("/api/data?_t=" + Date.now(), { cache: "no-store" });
      if (r.ok) {
        const buildMs = r.headers.get("X-Build-Ms");
        const data = await r.json();
        data._source = "live";
        data._build_ms = buildMs ? parseInt(buildMs, 10) : null;
        return data;
      }
    } catch (_) { /* fall through */ }
    const r2 = await fetch("cc-reports-data.json?_t=" + Date.now(), { cache: "no-store" });
    if (!r2.ok) throw new Error("HTTP " + r2.status);
    const data = await r2.json();
    data._source = "static";
    return data;
  }

  function diffData(prev, next) {
    if (!prev || !next) return null;
    const p = prev.days[prev.days.length - 1];
    const n = next.days[next.days.length - 1];
    if (!p || !n) return null;
    const dp = n.user_msgs - p.user_msgs;
    const da = n.assistant_msgs - p.assistant_msgs;
    const ds = n.sessions - p.sessions;
    const dt = (n.tokens.output + n.tokens.cache_creation) -
               (p.tokens.output + p.tokens.cache_creation);
    if (dp === 0 && da === 0 && ds === 0 && Math.abs(dt) < 1000) {
      return { hasChange: false, label: "无新增" };
    }
    const parts = [];
    if (ds > 0) parts.push(`+${ds} session`);
    if (dp > 0) parts.push(`+${dp} prompts`);
    if (da > 0) parts.push(`+${da} 回复`);
    if (dt > 0) parts.push(`+${fmtTok(dt)} tokens`);
    return { hasChange: true, label: parts.join(" · ") };
  }

  async function loadAndRender({ silent = false } = {}) {
    const prevData = DATA;
    const btn = document.querySelector('[data-action="refresh"]');
    if (btn && !silent) {
      btn.disabled = true;
      btn.innerHTML = '刷新中… <span class="arrow">↻</span>';
    }
    try {
      const data = await fetchData();
      renderApp(data);
      if (!silent) {
        const diff = diffData(prevData, data);
        const newBtn = document.querySelector('[data-action="refresh"]');
        if (newBtn && diff) {
          const icon = diff.hasChange ? "✓" : "·";
          newBtn.innerHTML = `${icon} ${escapeHTML(diff.label)} <span class="arrow">↻</span>`;
          newBtn.disabled = true;
          newBtn.classList.add(diff.hasChange ? "btn-success" : "btn-quiet");
          setTimeout(() => {
            const b = document.querySelector('[data-action="refresh"]');
            if (b) {
              b.innerHTML = '刷新 <span class="arrow">↻</span>';
              b.disabled = false;
              b.classList.remove("btn-success", "btn-quiet");
            }
          }, 2800);
        }
      }
    } catch (err) {
      document.getElementById("app").innerHTML = `
        <div class="loading">
          数据加载失败 — ${escapeHTML(err.message)}<br><br>
          启动 live server：
          <code style="font-family:var(--font-mono); color:var(--text-primary)">python3 cc-reports.py serve</code>
        </div>
      `;
    }
  }

  window.ccReportsExport = (format) => {
    const menu = document.getElementById("export-menu");
    if (menu) menu.hidden = true;

    if (format === "pdf") {
      // tag the body so @media print rules know which tab is active
      document.body.dataset.printRange = RANGE;
      document.body.dataset.printDate = DATA.today;
      window.print();
      return;

    // default: markdown
    const agg = aggregateRange(DATA, RANGE);
    const md = exportMarkdown(agg, DATA);
    const blob = new Blob([md], { type: "text/markdown;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `cc-report-${RANGE}-${DATA.today}.md`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  function exportMarkdown(agg, data) {
    const stripHTML = s => String(s || "").replace(/<[^>]+>/g, "").replace(/\s+/g, " ").trim();
    const L = [];
    L.push(`# ${agg.title_eyebrow}`);
    L.push("");
    L.push(`_Generated ${data.generated_at} · source ~/.claude/projects_`);
    L.push("");
    L.push(stripHTML(agg.headline));
    L.push("");
    L.push("## Summary");
    L.push("");
    agg.stats.forEach(s => {
      L.push(`- **${s.label}**: ${s.value}  _(${s.sub})_`);
    });
    L.push("");
    if (agg.sessions_list.length) {
      L.push(`## ${stripHTML(agg.sessions_opts.title)}`);
      L.push("");
      const limit = agg.sessions_opts.limit || agg.sessions_list.length;
      agg.sessions_list.slice(0, limit).forEach(s => {
        const when = agg.sessions_opts.showDate
          ? `${fmtMonthDay(s.start)} ${fmtTimeHHMM(s.start)}`
          : fmtTimeHHMM(s.start);
        L.push(`- \`${when}\` **${s.title}** — ${fmtMin(s.active_min)} · ${fmtTok(s.tokens)} tokens · \`${s.cwd_label}\`${s.branch ? " · `" + s.branch + "`" : ""}`);
      });
      L.push("");
    }
    if (agg.projects.length) {
      L.push(`## ${stripHTML(agg.projects_title)}`);
      L.push("");
      agg.projects.forEach(p => {
        L.push(`- **${p.label}** — ${fmtTok(p.tokens)} tokens · ${p.sessions} session${p.sessions !== 1 ? "s" : ""} · ${fmtInt(p.msgs)} msgs`);
      });
      L.push("");
    }
    return L.join("\n");
  }

  loadAndRender({ silent: true });
</script>

</body>
</html>
