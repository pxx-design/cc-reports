<script>
  // ─── Formatters ─────────────────────────────────────
  const fmtInt = n => (n || 0).toLocaleString("en-US");
  const fmtTok = n => {
    if (!n) return "0";
    if (n >= 1e9) return (n / 1e9).toFixed(2) + "B";
    if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
    if (n >= 1e3) return (n / 1e3).toFixed(1) + "k";
    return n.toString();
  };
  const fmtMin = m => {
    if (m < 60) return m + "m";
    const h = Math.floor(m / 60), mm = m % 60;
    return mm === 0 ? `${h}h` : `${h}h ${mm}m`;
  };
  // 等效 API 成本($) —— 克制显示,给 token 一个"值多少钱"的体感;非订阅实付
  const fmtUsd = n => {
    n = n || 0;
    if (n >= 1000) return "$" + (n / 1000).toFixed(1) + "K";
    if (n >= 100) return "$" + Math.round(n);
    if (n >= 1) return "$" + n.toFixed(1);
    return "$" + n.toFixed(2);
  };
  const fmtTimeHHMM = iso => {
    if (!iso) return "—";
    const d = new Date(iso);
    return d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", hour12: false });
  };
  const weekdayLong = iso => {
    const d = new Date(iso + "T12:00:00");
    return d.toLocaleDateString("zh-CN", { weekday: "long" });
  };
  // MON / TUE … — 里程碑 sub 行统一走英文缩写(mono 更齐, 也不跟中文标签抢戏)
  const weekdayEN = iso => {
    const d = new Date(iso + "T12:00:00");
    if (isNaN(d)) return "";
    return d.toLocaleDateString("en-US", { weekday: "short" }).toUpperCase();
  };
  const dateEN = iso => `${weekdayEN(iso)} ${iso.slice(5)}`;
  const monthDay = iso => {
    const d = new Date(iso + "T12:00:00");
    return d.toLocaleDateString("zh-CN", { month: "long", day: "numeric" });
  };
  const fmtMonthDay = iso => {
    if (!iso) return "—";
    const d = new Date(iso);
    return d.toLocaleDateString("zh-CN", { month: "numeric", day: "numeric" });
  };
  const truncate = (s, n) => !s ? "" : (s.length > n ? s.slice(0, n - 1) + "…" : s);
  const formatDelta = (d, suffix, fmt) => {
    if (d === 0) return "±0 " + suffix;
    const sign = d > 0 ? "+" : "−";
    const v = fmt ? fmt(Math.abs(d)) : Math.abs(d);
    return sign + v + " " + suffix;
  };
  // tokens excluding cache_read — "real work"
  const workTokens = tk => (tk.output || 0) + (tk.cache_creation || 0);
  // cache_read / (input + cache_read + cache_creation)
  const cacheHitRate = tk => {
    const denom = (tk.input || 0) + (tk.cache_read || 0) + (tk.cache_creation || 0);
    return denom > 0 ? (tk.cache_read || 0) / denom : 0;
  };
  // 给每个项目挂上它最近一次 session 的标题 —— 项目卡上那张便签。
  // (原先还算一条 30 天 work 序列喂 sparkline,那条卡已下线,序列没人读了,一并撤掉。)
  function attachProjectTitles(projects, windowDays) {
    const latestTitle = new Map();   // project -> most-recent ai-title
    windowDays.forEach(d => {
      for (const s of (d.sessions_list || [])) {
        const proj = s.project;
        if (!proj) continue;
        // later day overrides; same day, later start time overrides
        const prev = latestTitle.get(proj);
        if (!prev || (s.start || "") > (prev.start || "")) {
          latestTitle.set(proj, { title: s.title, start: s.start });
        }
      }
    });
    return projects.map(p => ({
      ...p,
      _latest_title: (latestTitle.get(p.name) || {}).title || "",
    }));
  }

  // 今日之前的 7 天,逐时段均值 —— 日报柱状图的「常态」参照线
  function hourlyBaseline(days) {
    const past = days.slice(-8, -1).filter(d => (d.hourly_tokens || d.hourly || []).some(v => v > 0));
    if (!past.length) return { avgValues: null, avgDays: 0, avgDayTotal: 0 };
    const avg = new Array(24).fill(0);
    let sum = 0;
    past.forEach(d => {
      const h = d.hourly_tokens || d.hourly || [];
      for (let i = 0; i < 24; i++) { avg[i] += (h[i] || 0); sum += (h[i] || 0); }
    });
    return {
      avgValues: avg.map(v => v / past.length),
      avgDays: past.length,
      avgDayTotal: sum / past.length,
    };
  }

  // ─── Aggregation by range ───────────────────────────
  function aggregateRange(data, range) {
    // returns: {
    //   range, title_eyebrow, headline,
    //   stats: [{label, value, sub}, ...],
    //   activity: {values, opts},
    //   trend_days,
    //   tokens, projects, sessions_list,
    //   sessions_opts: {title, emptyText, limit, showDate}
    // }
    const today = data.days[data.days.length - 1];

    if (range === "daily") {
      const prev = data.days.length >= 2 ? data.days[data.days.length - 2] : null;
      const sessDelta = prev ? today.sessions - prev.sessions : null;

      // active span: 最早开工 → 最晚收尾(取真正最晚的 end,不是"按开始时间排最后那个 session"的 end
      // —— 后者会漏掉先开、晚收的窗口,跟里程碑里的时长对不上账)
      const sortedByStart = [...today.sessions_list]
        .filter(s => s.start)
        .sort((a, b) => a.start.localeCompare(b.start));
      const firstSession = sortedByStart[0];
      const lastSession = sortedByStart.length
        ? sortedByStart.reduce((a, b) => (new Date(b.end || b.start) > new Date(a.end || a.start) ? b : a))
        : null;
      const spanStart = firstSession ? new Date(firstSession.start) : null;
      const spanEnd = lastSession ? new Date(lastSession.end || lastSession.start) : null;
      const spanMin = spanStart && spanEnd
        ? Math.max(1, Math.round((spanEnd - spanStart) / 60000))
        : 0;

      // real-work tokens = output + cache_creation (excludes cache_read)
      const workToks = workTokens(today.tokens);
      const prevWork = prev ? workTokens(prev.tokens) : 0;
      const workDelta = prev ? workToks - prevWork : null;

      // cache hit rate
      const hit = cacheHitRate(today.tokens);
      const promptTotal = today.tokens.input + today.tokens.cache_read + today.tokens.cache_creation;

      // top 3 sessions by tokens
      const top3 = [...today.sessions_list]
        .sort((a, b) => b.tokens - a.tokens)
        .slice(0, 3);

      let headline;
      if (today.sessions === 0) {
        headline = `<span class="accent">今天还没开始 session</span>`;
      } else {
        const spanPart = spanStart && spanEnd
          ? `<span class="accent">${fmtTimeHHMM(firstSession.start)} → ${fmtTimeHHMM(lastSession.end || lastSession.start)}</span> · ${fmtMin(spanMin)} 跨度`
          : "";
        const topLine = top3.length
          ? `<div class="hero-toplist">主要: ${top3.map(s =>
              `<span class="hero-top-item">${escapeHTML(truncate(s.title, 48))}<span class="hero-top-meta"> · ${fmtMin(s.active_min)}</span></span>`
            ).join(" <span class='hero-sep'>·</span> ")}</div>`
          : "";
        headline = `${today.sessions} 个 session, ${spanPart}.${topLine}`;
      }

      return {
        range,
        title_eyebrow: `日报 · ${monthDay(today.date)} · ${weekdayEN(today.date)}`,
        headline,
        stats: computeMilestones([today], data.days, true),
        activity: {
          kind: "bar",
          values: today.hourly_tokens || today.hourly,
          opts: {
            title: "时段 token 消耗",
            metaRight: "柱 = 今日 · 灰阶 = 模型 · 斜纹 = 近 7 日同时段均值",
            byModel: today.hourly_tokens_by_model || null,
            byModelDateLabel: today.date,
            modelMsgs: today.models || null,
            fmtValue: fmtTok,
            cost: today.cost || 0,
            ...hourlyBaseline(data.days),
          }
        },
        trend_days: data.days.slice(-7),
        trend_title: "近 7 日趋势",
        tokens: today.tokens,
        costTotal: today.cost || 0,
        costByModel: today.cost_by_model || {},
        costModels: today.models || {},
        projects: attachProjectTitles(today.projects, data.days.slice(-7)),
        sessions_list: today.sessions_list,
        sessions_opts: {
          title: "今日 Sessions",
          emptyText: "今天还没有 session",
          showDate: false,
        },
        projects_title: "今日各项目用量",
      };
    }

    // weekly = last 7 days, monthly = last 30 days
    const n = range === "weekly" ? 7 : 30;
    const subset = data.days.slice(-n);
    const tokens = { input: 0, output: 0, cache_read: 0, cache_creation: 0, total: 0 };
    const projAccum = new Map();
    const allSessions = [];
    let totalSessions = 0, totalUser = 0, totalAssistant = 0, activeDays = 0;
    let costTotal = 0;
    const costByModel = {};
    const costModels = {};

    for (const d of subset) {
      totalSessions += d.sessions;
      totalUser += d.user_msgs;
      totalAssistant += d.assistant_msgs;
      if (d.sessions > 0) activeDays++;
      for (const k of Object.keys(tokens)) tokens[k] += d.tokens[k] || 0;
      costTotal += d.cost || 0;
      for (const [m, td] of Object.entries(d.cost_by_model || {})) {
        const a = costByModel[m] || (costByModel[m] = { in: 0, out: 0, cw: 0, cr: 0 });
        a.in += td.in; a.out += td.out; a.cw += td.cw; a.cr += td.cr;
      }
      for (const [m, c] of Object.entries(d.models || {})) costModels[m] = (costModels[m] || 0) + c;
      for (const p of d.projects) {
        const key = p.name || p.path || p.label;
        const cur = projAccum.get(key) || { name: key, label: p.label || key, sessions: 0, tokens: 0, output: 0, cache_creation: 0, msgs: 0, active_min: 0, fallback: !!p.fallback };
        cur.sessions += p.sessions;
        cur.tokens += p.tokens;
        cur.output += (p.output || 0);
        cur.cache_creation += (p.cache_creation || 0);
        cur.msgs += p.msgs;
        cur.active_min += (p.active_min || 0);
        projAccum.set(key, cur);
      }
      for (const s of d.sessions_list) allSessions.push(s);
    }
    // 主轴 = 活跃时长(时间 = 心思落在哪);产出保留为副指标
    const projectsRaw = [...projAccum.values()].sort((a, b) => {
      if (!!a.fallback !== !!b.fallback) return a.fallback ? 1 : -1;  // 真项目在前, 兜底桶沉底
      return (b.active_min || 0) - (a.active_min || 0);
    });
    const projects = attachProjectTitles(projectsRaw, subset);
    allSessions.sort((a, b) => b.tokens - a.tokens);

    // by-day activity: use sessions count per day (or tokens — sessions reads cleaner)
    const dailySessions = subset.map(d => d.sessions);
    const dailyTokens = subset.map(d => d.tokens.total);
    const peakIdx = dailySessions.indexOf(Math.max(...dailySessions));
    const peakDay = subset[peakIdx];

    const topProject = projects[0];
    const workToks = workTokens(tokens);
    const hit = cacheHitRate(tokens);
    const promptTotal = tokens.input + tokens.cache_read + tokens.cache_creation;

    // top 3 sessions across the range, by tokens
    const top3 = allSessions.slice(0, 3);

    const headline = totalSessions === 0
      ? `<span class="accent">过去 ${n} 天没有 session</span>`
      : `${fmtInt(totalSessions)} 个 session,
         活跃 <span class="accent">${activeDays}</span> / ${n} 天.${
           topProject ? ` 主要在 <span class="accent">${escapeHTML(topProject.label)}</span>.` : ""
         }${
           top3.length
             ? `<div class="hero-toplist">主要: ${top3.map(s =>
                 `<span class="hero-top-item">${escapeHTML(truncate(s.title, 48))}<span class="hero-top-meta"> · ${fmtMin(s.active_min)}</span></span>`
               ).join(" <span class='hero-sep'>·</span> ")}</div>`
             : ""
         }`;

    const firstDate = subset[0].date;
    const lastDate = subset[subset.length - 1].date;

    return {
      range,
      title_eyebrow: range === "weekly"
        ? `周报 · ${monthDay(firstDate)} – ${monthDay(lastDate)}`
        : `月报 · ${monthDay(firstDate)} – ${monthDay(lastDate)}`,
      headline,
      stats: computeMilestones(subset, data.days, false),
      activity: {
        kind: "heatmap",
        days: subset,  // pass full days for day×hour grid
        opts: {
          title: range === "weekly" ? "时段 token 热力图 · 近 7 天" : "时段 token 热力图 · 近 30 天",
          metaRight: "行 = 日期 · 列 = 24 时段 · 深浅 = token",
          field: "hourly_tokens",
          cost: costTotal,
        }
      },
      trend_days: subset,
      trend_title: range === "weekly" ? "近 7 日趋势" : "近 30 日趋势",
      tokens,
      costTotal,
      costByModel,
      costModels,
      projects,
      sessions_list: allSessions,
      sessions_opts: {
        title: range === "weekly" ? "本周 Top Sessions" : "本月 Top Sessions",
        emptyText: `过去 ${n} 天没有 session`,
        limit: range === "weekly" ? 10 : 15,
        showDate: true,
      },
      projects_title: range === "weekly" ? "本周各项目用量" : "本月各项目用量",
    };
  }

  // 4 个里程碑(从真实数据算 · 不评判,只如实记)
  // sub 行 = 英文 mono 事实(时刻 / 星期缩写 / 计数),不写"一路没切走"这类没验证过的旁白。
  function computeMilestones(periodDays, allDays, isDaily) {
    const sess = [];
    for (const d of periodDays) for (const s of (d.sessions_list || [])) sess.push({ ...s, _date: d.date });
    // 最长专注 = 最长的单段 session(active_min)
    let longest = null;
    for (const s of sess) if ((s.active_min || 0) > 0 && (!longest || s.active_min > longest.active_min)) longest = s;
    // 一天穿梭最多项目 = 单日不同真实项目数峰值
    let maxProj = 0, maxProjDate = null;
    for (const d of periodDays) {
      const names = new Set((d.projects || []).filter(p => !p.fallback).map(p => p.name || p.label));
      if (names.size > maxProj) { maxProj = names.size; maxProjDate = d.date; }
    }
    // 连续开工 = 末尾连续活跃天数(到今天没断)
    let streak = 0;
    for (let i = allDays.length - 1; i >= 0; i--) { if (allDays[i].sessions > 0) streak++; else break; }
    const streakFrom = streak > 0 ? allDays[allDays.length - streak].date : null;
    const streakStat = {
      label: "连续开工",
      value: `${streak} 天`,
      sub: streakFrom ? `SINCE ${streakFrom.slice(5)}` : "—",
    };
    // 只报开始时刻:active_min 已剔掉空闲,若并排写「09:37 → 16:48」读者会拿窗口去减,对不上账
    const longestSub = longest ? `FROM ${fmtTimeHHMM(longest.start)}` : "—";

    if (isDaily) {
      // 日报 = 当天内部的事实。「最晚的夜晚」在只有一天时退化成收工时刻(且跟标题的跨度重复),
      // 换成「投入时长」:跨度里真正在敲的部分。
      const invest = sess.reduce((a, s) => a + (s.active_min || 0), 0);
      const starts = sess.map(s => new Date(s.start).getTime()).filter(t => !isNaN(t));
      const ends = sess.map(s => new Date(s.end || s.start).getTime()).filter(t => !isNaN(t));
      const spanMin = starts.length ? Math.round((Math.max(...ends) - Math.min(...starts)) / 60000) : 0;
      const density = spanMin > 0 ? Math.round((invest / spanMin) * 100) : 0;
      // 切换次数 = 按开始时间排序后相邻 session 换了项目的次数
      const seq = [...sess].sort((a, b) => new Date(a.start) - new Date(b.start)).map(s => s.cwd_label || "?");
      let switches = 0;
      for (let i = 1; i < seq.length; i++) if (seq[i] !== seq[i - 1]) switches++;
      return [
        longest
          ? { label: "最长专注", value: fmtMin(longest.active_min), sub: longestSub }
          : { label: "最长专注", value: "—", sub: "NO SESSION YET" },
        invest > 0
          ? {
              label: "投入时长",
              value: fmtMin(invest),
              // 各 session 活跃时长之和。并行开窗时会超过跨度 —— 那时不报密度,如实说"重叠"
              sub: density > 100 ? `${sess.length} SESSIONS OVERLAP` : `${density}% OF ${fmtMin(spanMin)} SPAN`,
            }
          : { label: "投入时长", value: "—", sub: "NO SESSION YET" },
        {
          label: "今日穿梭",
          value: `${maxProj} 个项目`,
          sub: switches > 0 ? `${switches} SWITCHES` : (maxProj > 0 ? "NO SWITCH" : "—"),
        },
        streakStat,
      ];
    }

    // 最晚的夜晚 = 最晚的 end 时刻(凌晨算更晚)—— 只在周/月报有意义
    const nightScore = iso => { const dt = new Date(iso); if (isNaN(dt)) return -1; const h = dt.getHours() + dt.getMinutes() / 60; return h < 8 ? h + 24 : h; };
    let latest = null, latestSc = -1;
    for (const s of sess) { const t = s.end || s.start; if (!t) continue; const sc = nightScore(t); if (sc > latestSc) { latestSc = sc; latest = { t, date: s._date }; } }
    return [
      longest
        ? { label: "最长专注", value: fmtMin(longest.active_min), sub: dateEN(longest._date) }
        : { label: "最长专注", value: "—", sub: "—" },
      latest
        ? { label: "最晚的夜晚", value: fmtTimeHHMM(latest.t), sub: dateEN(latest.date) }
        : { label: "最晚的夜晚", value: "—", sub: "—" },
      { label: "一天穿梭最多", value: `${maxProj} 个项目`, sub: maxProjDate ? dateEN(maxProjDate) : "—" },
      streakStat,
    ];
  }

  // ─── Render ─────────────────────────────────────────
  // model name → grey-scale fill (Vercel DNA: no color)
  // 相邻两档拉开够远,堆叠柱里第 1/第 2 个模型才分得清;首档用炭灰不用纯黑(纯黑是正文色,图形抢戏)
  const MODEL_SHADES = ["#3a3a3a", "#a3a3a3", "#6e6e6e", "#c9c9c9", "#888888", "#e2e2e2"];
  function shortModel(m) {
    if (!m) return "?";
    if (m.startsWith("claude-fable-5"))    return "Fable 5";
    if (m.startsWith("claude-opus-4-8"))   return "Opus 4.8";
    if (m.startsWith("claude-opus-4-7"))   return "Opus 4.7";
    if (m.startsWith("claude-opus-4-6"))   return "Opus 4.6";
    if (m.startsWith("claude-opus"))       return "Opus";
    if (m.startsWith("claude-sonnet-5"))   return "Sonnet 5";
    if (m.startsWith("claude-sonnet-4-6")) return "Sonnet 4.6";
    if (m.startsWith("claude-sonnet"))     return "Sonnet";
    if (m.startsWith("claude-haiku"))      return "Haiku";
    if (m.startsWith("glm-"))              return m.replace("glm-", "GLM ");
    if (m === "<synthetic>")               return "synthetic";
    return m;
  }

  function renderActivityChart(values, opts) {
    // 日报「时段 token 消耗」——左图右析,与周/月报热力图同构。
    // 柱 = 今日(按模型分段堆叠) · 虚线阶梯 = 近 7 日同时段均值(常态参照)。
    const fmtVal = opts.fmtValue || fmtInt;
    const hourlyByModel = opts.byModel || null;
    const modelTotals = new Map();
    if (hourlyByModel) {
      hourlyByModel.forEach(h => {
        Object.entries(h || {}).forEach(([m, c]) => modelTotals.set(m, (modelTotals.get(m) || 0) + c));
      });
    }
    const orderedModels = [...modelTotals.entries()].sort((a, b) => b[1] - a[1]).map(e => e[0]);
    const modelShade = m => {
      const idx = orderedModels.indexOf(m);
      return MODEL_SHADES[Math.min(idx, MODEL_SHADES.length - 1)] || "#d4d4d4";
    };

    const n = values.length;
    const avgValues = (opts.avgValues && opts.avgValues.length === n) ? opts.avgValues : null;
    const dayMax = Math.max(0, ...values);
    const peak = values.indexOf(dayMax);
    const max = Math.max(1, dayMax, ...(avgValues || []));
    const total = values.reduce((a, b) => a + b, 0);

    // canvas — 比旧波形高一截,柱子给到实处
    const W = 600, H = 172;
    const padX = 10, padTop = 30, padBot = 26;
    const plotH = H - padTop - padBot;
    const baseY = H - padBot;
    const slotW = (W - padX * 2) / n;
    const barW = Math.max(7, Math.min(16, slotW - 8));
    const rad = Math.min(2.5, barW / 2);

    // 斜纹(素描排线)—— 只给「常态地形」用,实心面会被误读成数据,排线一看就是参照
    let body = `<defs>
      <pattern id="ridge-hatch" patternUnits="userSpaceOnUse" width="4" height="4"
        patternTransform="rotate(45)">
        <line x1="0" y1="0" x2="0" y2="4" stroke="#d8d8d5" stroke-width="1"/>
      </pattern>
    </defs>`;

    // 近 7 日同时段均值 —— 今天的柱子站在它上面,高出/塌陷一眼可读
    if (avgValues) {
      let ridge = "";
      avgValues.forEach((v, i) => {
        const y = baseY - (v / max) * plotH;
        const x0 = padX + i * slotW, x1 = x0 + slotW;
        ridge += `${i === 0 ? "M" : "L"}${x0.toFixed(1)} ${y.toFixed(1)}L${x1.toFixed(1)} ${y.toFixed(1)}`;
      });
      body += `<path d="${ridge}L${(W - padX).toFixed(1)} ${baseY}L${padX} ${baseY}Z"
        fill="url(#ridge-hatch)" stroke="none"/>`;
      body += `<path d="${ridge}" fill="none" stroke="#e0e0dd" stroke-width="1"
        vector-effect="non-scaling-stroke"/>`;
    }

    // 时段分隔(06 / 12 / 18)—— 与右侧「上午/下午/晚上/深夜」占比条对得上
    [6, 12, 18].forEach(h => {
      const x = padX + h * slotW;
      body += `<line x1="${x}" y1="${padTop - 10}" x2="${x}" y2="${baseY}"
        stroke="var(--border-strong)" stroke-width="1" stroke-dasharray="1 5"/>`;
    });

    // baseline
    body += `<line x1="${padX}" y1="${baseY}" x2="${W - padX}" y2="${baseY}"
      stroke="var(--border-strong)" stroke-width="1"/>`;

    // 24 根柱子:每根一个 <g>,内含分段 + 命中区(hover 只亮自己)
    values.forEach((v, i) => {
      const x = padX + i * slotW + (slotW - barW) / 2;
      const cx = padX + i * slotW + slotW / 2;
      const isPeak = i === peak && v > 0;
      const totalH = (v / max) * plotH;
      const barTopY = v > 0 ? baseY - totalH : baseY;

      let bar = "";
      if (v === 0) {
        bar += `<circle cx="${cx}" cy="${baseY}" r="1.5" fill="var(--g2)" class="bar-cell"/>`;
      } else {
        const clipId = `barclip-${i}`;
        const segs = (hourlyByModel && hourlyByModel[i] && Object.keys(hourlyByModel[i]).length)
          ? Object.entries(hourlyByModel[i]).sort((a, b) => orderedModels.indexOf(a[0]) - orderedModels.indexOf(b[0]))
          : null;
        bar += `<clipPath id="${clipId}"><rect x="${x}" y="${barTopY}" width="${barW}"
          height="${Math.max(totalH, 1.5)}" rx="${rad}"/></clipPath>`;
        bar += `<g clip-path="url(#${clipId})">`;
        if (segs) {
          let yCursor = baseY;
          segs.forEach(([m, c], si) => {
            const segH = (c / max) * plotH;
            if (segH <= 0) return;
            bar += `<rect x="${x}" y="${(yCursor - segH).toFixed(2)}" width="${barW}"
              height="${Math.max(segH, 0.6).toFixed(2)}" fill="${modelShade(m)}" class="bar-cell"/>`;
            // 分段之间留一道纸色发丝线,相邻灰阶不糊在一起
            if (si > 0) {
              bar += `<line x1="${x}" y1="${yCursor.toFixed(2)}" x2="${x + barW}" y2="${yCursor.toFixed(2)}"
                stroke="var(--surface)" stroke-width="1"/>`;
            }
            yCursor -= segH;
          });
        } else {
          bar += `<rect x="${x}" y="${barTopY}" width="${barW}" height="${Math.max(totalH, 1.5)}"
            fill="${isPeak ? "var(--g5)" : "var(--g4)"}" class="bar-cell"/>`;
        }
        bar += `</g>`;
      }

      // 峰值:柱顶点 + 数值
      if (isPeak) {
        const dotY = barTopY - 9;
        bar += `<circle cx="${cx}" cy="${dotY}" r="2.5" fill="var(--text-primary)"/>`;
        bar += `<text x="${cx}" y="${dotY - 7}" text-anchor="middle"
          font-family="JetBrains Mono" font-size="10" font-weight="500"
          fill="var(--text-primary)">${fmtVal(v)}</text>`;
      }

      // 整列命中区(data-top = 柱顶占 H 的比例,气泡好跟柱高)
      bar += `<rect x="${padX + i * slotW}" y="0" width="${slotW}" height="${H}"
        fill="transparent" class="bar-hit" data-idx="${i}" data-top="${(barTopY / H).toFixed(4)}"
        style="cursor:pointer"/>`;

      body += `<g class="bar-group">${bar}</g>`;
    });

    // 刻度 00 / 06 / 12 / 18 / 24
    [0, 6, 12, 18, 24].forEach(h => {
      const x = (h < 24) ? padX + h * slotW : W - padX;
      body += `<line x1="${x}" y1="${baseY + 1}" x2="${x}" y2="${baseY + 4}"
        stroke="var(--text-quaternary)" stroke-width="1"/>`;
      const anchor = h === 0 ? "start" : (h === 24 ? "end" : "middle");
      body += `<text x="${x}" y="${H - 8}" text-anchor="${anchor}"
        font-family="JetBrains Mono" font-size="10"
        fill="var(--text-tertiary)">${String(h).padStart(2, "0")}:00</text>`;
    });

    // ─── 模型拆解(灰阶 = 模型,跟柱子分段一一对应)
    let legendHTML = "";
    if (hourlyByModel && orderedModels.length > 0) {
      const modelMsgs = opts.modelMsgs || null;
      const grandTotal = orderedModels.reduce((s, m) => s + (modelTotals.get(m) || 0), 0) || 1;

      if (modelMsgs) {
        // 只留逐模型明细行 —— 占比条跟下面的 % 说同一件事,是重复
        const rows = orderedModels.map(m => {
          const tok = modelTotals.get(m) || 0;
          const msgs = modelMsgs[m] || 0;
          const share = Math.round(tok / grandTotal * 100);
          const avg = msgs > 0 ? fmtTok(Math.round(tok / msgs)) : "—";
          return `<div class="mu-row">
            <span class="mu-name"><span class="legend-sw" style="background:${modelShade(m)}"></span>${escapeHTML(shortModel(m))}</span>
            <span class="mu-tok">${fmtTok(tok)}</span>
            <span class="mu-share">${share}%</span>
            <span class="mu-meta">${fmtInt(msgs)} 次 · ${avg}/次</span>
          </div>`;
        }).join("");
        legendHTML = `<div class="model-usage">${rows}</div>`;
      } else {
        legendHTML = `<div class="bar-model-legend">${orderedModels.map(m => {
          const cnt = modelTotals.get(m);
          return `<span class="legend-pill">
            <span class="legend-sw" style="background:${modelShade(m)}"></span>
            ${escapeHTML(shortModel(m))}
            <span class="legend-pill-val">${fmtVal(cnt)}</span>
          </span>`;
        }).join("")}</div>`;
      }
    }

    // ─── 右侧解析(与热力图侧栏同一套 rhythm-* 语言)
    const activeHours = values.filter(v => v > 0).length;
    const buckets = { morning: 0, afternoon: 0, evening: 0, night: 0 };
    values.forEach((v, h) => {
      if (h >= 6 && h < 12) buckets.morning += v;
      else if (h >= 12 && h < 18) buckets.afternoon += v;
      else if (h >= 18 && h < 24) buckets.evening += v;
      else buckets.night += v;
    });
    const pct = v => total > 0 ? Math.round((v / total) * 100) : 0;
    const pMorning = pct(buckets.morning), pAfternoon = pct(buckets.afternoon);
    const pEvening = pct(buckets.evening), pNight = pct(buckets.night);
    const sorted = [["上午", pMorning], ["下午", pAfternoon], ["晚上", pEvening], ["深夜", pNight]]
      .sort((a, b) => b[1] - a[1]);
    const peakShare = total > 0 ? Math.round((dayMax / total) * 100) : 0;

    // 最长连轴 = 最长的连续活跃时段
    let run = 0, bestRun = 0, bestEnd = -1;
    values.forEach((v, i) => {
      if (v > 0) { run++; if (run > bestRun) { bestRun = run; bestEnd = i; } }
      else run = 0;
    });
    const hh = h => String(h).padStart(2, "0") + ":00";

    // 解析压到两句:一句讲时段结构,一句讲节奏 + 跟常态比。API 价折进「今日消耗」的小字里。
    let narrative;
    if (total === 0) {
      narrative = `<p>今天还没有 token 消耗。</p>`;
    } else {
      const lines = [];
      if (sorted[0][1] >= 55 && sorted[1][1] >= 15) lines.push(`<b>${sorted[0][0]}集中</b>（${sorted[0][1]}%），${sorted[1][0]}（${sorted[1][1]}%）打底。`);
      else if (sorted[0][1] >= 55) lines.push(`<b>${sorted[0][0]}集中型</b>（${sorted[0][1]}%），其余时段基本空着。`);
      else if (sorted[0][1] >= 40) lines.push(`主<b>${sorted[0][0]}</b>（${sorted[0][1]}%）+ ${sorted[1][0]}（${sorted[1][1]}%）。`);
      else lines.push(`时段分布均匀（${sorted[0][0]} ${sorted[0][1]}% / ${sorted[1][0]} ${sorted[1][1]}%）。`);

      const parts = [];
      if (bestRun > 0) parts.push(`最长连轴 <b>${bestRun} 小时</b>（${hh(bestEnd - bestRun + 1)} → ${hh(bestEnd + 1)}）`);
      if (opts.avgDayTotal > 0) {
        const ratio = total / opts.avgDayTotal;
        const cmp = ratio >= 1.15 ? "比平常猛" : (ratio <= 0.85 ? "还没到平常的量" : "与常态持平");
        parts.push(`总量是近 ${opts.avgDays} 日日均的 <b>${ratio.toFixed(1)}×</b>，${cmp}`);
      }
      if (parts.length) lines.push(parts.join("；") + "。");
      narrative = lines.map(s => `<p>${s}</p>`).join("");
    }

    const asideHTML = `
      <div class="rhythm-row">
        <div class="rhythm-stat">
          <div class="rhythm-label">今日消耗</div>
          <div class="rhythm-value">${fmtTok(total)}</div>
          ${opts.cost ? `<div class="rhythm-sub">API 价 <span class="cost-clickable">≈ ${fmtUsd(opts.cost)}</span></div>` : ""}
        </div>
        <div class="rhythm-stat">
          <div class="rhythm-label">活跃时段</div>
          <div class="rhythm-value">${activeHours}<span class="rhythm-unit"> / 24 h</span></div>
          ${dayMax > 0 ? `<div class="rhythm-sub">峰值 ${hh(peak)} · 占 ${peakShare}%</div>` : ""}
        </div>
      </div>
      <div class="rhythm-insight">
        <div class="rhythm-bar">
          <span class="rhythm-bar-seg" style="width:${pMorning}%" title="上午 ${pMorning}%"></span>
          <span class="rhythm-bar-seg rb-afternoon" style="width:${pAfternoon}%" title="下午 ${pAfternoon}%"></span>
          <span class="rhythm-bar-seg rb-evening" style="width:${pEvening}%" title="晚上 ${pEvening}%"></span>
          <span class="rhythm-bar-seg rb-night" style="width:${pNight}%" title="深夜 ${pNight}%"></span>
        </div>
        <div class="rhythm-bar-legend">
          <span>上午 <b>${pMorning}%</b></span>
          <span>下午 <b>${pAfternoon}%</b></span>
          <span>晚上 <b>${pEvening}%</b></span>
          <span>深夜 <b>${pNight}%</b></span>
        </div>
      </div>
      <div class="rhythm-narrative">${narrative}</div>
    `;

    const byModelJSON = hourlyByModel
      ? `data-by-model='${escapeAttr(JSON.stringify(hourlyByModel))}'`
      : "";
    const dateAttr = opts.byModelDateLabel ? `data-date="${opts.byModelDateLabel}"` : "";

    return `
      <div class="card section reveal" ${byModelJSON} ${dateAttr} data-chart="hourly-bar">
        <div class="card-head">
          <h2>${opts.title}</h2>
          <span class="meta">${opts.metaRight}</span>
        </div>
        <div class="chart-row">
          <div class="chart-main">
            <div class="chart-waveform">
              <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet"
                aria-label="${opts.title}">${body}</svg>
            </div>
            ${legendHTML}
          </div>
          <div class="chart-aside">${asideHTML}</div>
        </div>
      </div>
    `;
  }

  function escapeAttr(s) {
    return String(s).replace(/'/g, "&#39;").replace(/"/g, "&quot;");
  }

  function renderActivityHeatmap(days, opts) {
    // days: [{date, weekday, hourly:[24]}, ...] in chronological order
    // Remap the working `hourly` to the chosen metric (default message counts,
    // or hourly_tokens for token-consumption mode) so all logic below is unit-agnostic.
    const field = opts.field || "hourly";
    const isTok = opts.field === "hourly_tokens";
    const fmtVal = isTok ? fmtTok : fmtInt;
    const unitWord = isTok ? "tokens" : "条";
    const avgLabel = isTok ? "日均消耗" : "日均消息";
    days = days.map(d => ({ ...d, hourly: d[field] || d.hourly || [] }));
    const n = days.length;
    if (n === 0) {
      return `<div class="card section reveal">
        <div class="card-head"><h2>${opts.title}</h2><span class="meta">${opts.metaRight}</span></div>
        <div class="loading">无数据</div>
      </div>`;
    }
    const cellH = n > 14 ? 10 : 14;
    const cellW = 14;
    const gap = 2;
    const padLeft = n <= 7 ? 60 : 38;  // 周报行标签带星期缩写(MON 07-07),留够宽
    const padTop = 18;
    const padBottom = 14;
    const padRight = 4;
    const gridW = 24 * (cellW + gap) - gap;
    const W = padLeft + gridW + padRight;
    const H = padTop + n * (cellH + gap) - gap + padBottom;

    // find max for color binning
    let max = 0, totalMsgs = 0, peakCell = null;
    days.forEach((d, di) => {
      d.hourly.forEach((v, hi) => {
        totalMsgs += v;
        if (v > max) { max = v; peakCell = { di, hi, v, d }; }
      });
    });
    if (max === 0) max = 1;

    const colorFor = v => {
      if (v === 0) return "#f5f5f5";
      const pct = v / max;
      if (pct < 0.25) return "#ebebeb";
      if (pct < 0.5)  return "#d4d4d4";
      if (pct < 0.75) return "#8a8a8a";
      return "#171717";
    };

    // hour axis labels (top)
    let hAxis = "";
    [0, 6, 12, 18].forEach(h => {
      const x = padLeft + h * (cellW + gap) + cellW / 2;
      hAxis += `<text x="${x}" y="${padTop - 6}" text-anchor="middle"
        font-family="JetBrains Mono" font-size="9" fill="var(--text-tertiary)">${String(h).padStart(2,'0')}</text>`;
    });

    // day axis labels (left) — show every-other-row for monthly
    let dAxis = "";
    days.forEach((d, di) => {
      if (n > 14 && di % 2 === 1) return;  // skip every other for monthly
      const y = padTop + di * (cellH + gap) + cellH / 2 + 3;
      const label = n <= 7 ? `${(d.weekday || "").toUpperCase()} ${d.date.slice(5)}` : d.date.slice(5);
      dAxis += `<text x="${padLeft - 6}" y="${y}" text-anchor="end"
        font-family="JetBrains Mono" font-size="9" fill="var(--text-tertiary)">${label}</text>`;
    });

    // cells
    let cells = "";
    days.forEach((d, di) => {
      for (let h = 0; h < 24; h++) {
        const v = d.hourly[h] || 0;
        const x = padLeft + h * (cellW + gap);
        const y = padTop + di * (cellH + gap);
        const isPeak = peakCell && peakCell.di === di && peakCell.hi === h;
        const stroke = isPeak ? `stroke="var(--text-primary)" stroke-width="1.5"` : "";
        cells += `<rect x="${x}" y="${y}" width="${cellW}" height="${cellH}" rx="2"
          fill="${colorFor(v)}" ${stroke}
          class="heatmap-cell"
          data-hm-date="${d.date}" data-hm-hour="${h}"
          style="cursor:pointer">
          <title>${d.date} ${String(h).padStart(2,'0')}:00 · ${fmtVal(v)} ${unitWord}</title>
          </rect>`;
      }
    });

    // ─── Right-side rhythm panel — derive insights from the same heatmap data
    const activeDays = days.filter(d => d.hourly.some(v => v > 0)).length;
    const totalDays = days.length;
    const avgMsgs = activeDays > 0 ? Math.round(totalMsgs / activeDays) : 0;

    // longest consecutive active streak
    let maxStreak = 0, curStreak = 0;
    days.forEach(d => {
      const active = d.hourly.some(v => v > 0);
      if (active) { curStreak++; maxStreak = Math.max(maxStreak, curStreak); }
      else curStreak = 0;
    });

    // time-of-day buckets: morning(6-12) / afternoon(12-18) / evening(18-24) / night(0-6)
    const buckets = { morning: 0, afternoon: 0, evening: 0, night: 0 };
    days.forEach(d => {
      d.hourly.forEach((v, h) => {
        if (h >= 6 && h < 12) buckets.morning += v;
        else if (h >= 12 && h < 18) buckets.afternoon += v;
        else if (h >= 18 && h < 24) buckets.evening += v;
        else buckets.night += v;
      });
    });
    const bucketTotal = buckets.morning + buckets.afternoon + buckets.evening + buckets.night;
    const pct = v => bucketTotal > 0 ? Math.round((v / bucketTotal) * 100) : 0;
    const pMorning = pct(buckets.morning);
    const pAfternoon = pct(buckets.afternoon);
    const pEvening = pct(buckets.evening);
    const pNight = pct(buckets.night);

    const sortedBuckets = [
      ["上午", pMorning],
      ["下午", pAfternoon],
      ["晚上", pEvening],
      ["深夜", pNight],
    ].sort((a, b) => b[1] - a[1]);

    // burst vs steady
    const dayTotals = days.map(d => d.hourly.reduce((a, b) => a + b, 0));
    const dayMax = Math.max(...dayTotals);
    const dayAvg = activeDays > 0 ? totalMsgs / activeDays : 0;
    const burstRatio = dayAvg > 0 ? dayMax / dayAvg : 0;
    const inactiveDays = totalDays - activeDays;

    const isMonthly = totalDays > 14;
    const periodWord = isMonthly ? "这个月" : "这周";

    // ─── Narrative builder — sentences, story-style
    function buildNarrative() {
      if (bucketTotal === 0) return `<p>${periodWord}没有活动记录。</p>`;
      const sentences = [];

      // ── Weekly: 2 sentences total
      if (!isMonthly) {
        // sentence 1: dominant bucket + peak day (compressed)
        let line1;
        if (sortedBuckets[0][1] >= 55) {
          line1 = `<b>${sortedBuckets[0][0]}集中型</b>（${sortedBuckets[0][1]}%）`;
        } else if (sortedBuckets[0][1] >= 40) {
          line1 = `主<b>${sortedBuckets[0][0]}</b>（${sortedBuckets[0][1]}%）+ ${sortedBuckets[1][0]}（${sortedBuckets[1][1]}%）`;
        } else {
          line1 = `时段分布均匀（${sortedBuckets[0][0]} ${sortedBuckets[0][1]}% / ${sortedBuckets[1][0]} ${sortedBuckets[1][1]}%）`;
        }
        if (peakCell) {
          const peakDayShare = totalMsgs > 0 ? Math.round((dayTotals[peakCell.di] / totalMsgs) * 100) : 0;
          line1 += `，单日峰值 <b>${peakCell.d.date.slice(5)}</b>（占 ${peakDayShare}%）`;
        }
        sentences.push(line1 + "。");

        // sentence 2: burst + dry days
        let tail;
        if (burstRatio >= 3) tail = `节奏偏<b>爆发</b>`;
        else if (burstRatio >= 1.8) tail = `节奏偏波动`;
        else tail = `节奏<b>平稳</b>`;
        if (inactiveDays > 0) tail += `，其中 ${inactiveDays} 天沉寂`;
        tail += "。";
        sentences.push(tail);

        return sentences.map(s => `<p>${s}</p>`).join("");
      }

      // ── Monthly: 3 sentences total
      // sentence 1: dominant bucket
      if (sortedBuckets[0][1] >= 55) {
        sentences.push(`<b>${sortedBuckets[0][0]}集中型</b>——${sortedBuckets[0][1]}% 的活动落在${sortedBuckets[0][0]}时段。`);
      } else if (sortedBuckets[0][1] >= 40) {
        sentences.push(`主要时段是<b>${sortedBuckets[0][0]}</b>（${sortedBuckets[0][1]}%），${sortedBuckets[1][0]}是次活跃段（${sortedBuckets[1][1]}%）。`);
      } else {
        sentences.push(`时段分布相对均匀：${sortedBuckets[0][0]} ${sortedBuckets[0][1]}% / ${sortedBuckets[1][0]} ${sortedBuckets[1][1]}% / ${sortedBuckets[2][0]} ${sortedBuckets[2][1]}%。`);
      }
      // sentence 2: peak day
      if (peakCell) {
        const peakDayTotal = dayTotals[peakCell.di];
        const peakDayShare = totalMsgs > 0 ? Math.round((peakDayTotal / totalMsgs) * 100) : 0;
        sentences.push(`单日峰值在 <b>${peakCell.d.date.slice(5)}</b>（${fmtVal(peakDayTotal)}${isTok ? " tokens" : " 条"}），约占${periodWord}总活动的 ${peakDayShare}%。`);
      }
      // sentence 3: burst + streak
      if (burstRatio >= 3) {
        sentences.push(`整体偏<b>爆发型</b>，单日峰值是均值的 ${burstRatio.toFixed(1)}×；连续活跃最长 ${maxStreak} 天。`);
      } else if (burstRatio >= 1.8) {
        sentences.push(`节奏偏波动，峰值 ${burstRatio.toFixed(1)}× 日均；连续最长 ${maxStreak} 天。`);
      } else {
        sentences.push(`节奏<b>平稳</b>，单日波动小；连续最长 ${maxStreak} 天。`);
      }
      return sentences.map(s => `<p>${s}</p>`).join("");
    }
    const narrativeHTML = buildNarrative();

    // 与日报侧栏同一套排布:总量当主数字打头(日报是「今日消耗」),均值/连续性降为副数字。
    // 原先周月只报「日均消耗」,总量一次都不出现 —— 成本 ≈$1.2K 挂在那儿, 产生它的 token 总量却看不到。
    const periodTotalLabel = `${isMonthly ? "本月" : "本周"}${isTok ? "消耗" : "消息"}`;

    // ─── Stats panel content varies by period
    let statsHTML;
    if (isMonthly) {
      statsHTML = `
        <div class="rhythm-row">
          <div class="rhythm-stat">
            <div class="rhythm-label">${periodTotalLabel}</div>
            <div class="rhythm-value">${fmtVal(totalMsgs)}<span class="rhythm-unit">${isTok ? "" : " 条"}</span></div>
            <div class="rhythm-sub">${avgLabel} ${fmtVal(avgMsgs)}</div>
          </div>
          <div class="rhythm-stat">
            <div class="rhythm-label">活跃日</div>
            <div class="rhythm-value">${activeDays}<span class="rhythm-unit"> / ${totalDays}</span></div>
            <div class="rhythm-sub">最长连续 ${maxStreak} 天</div>
          </div>
        </div>
        ${peakCell ? `
          <div class="rhythm-peak-inline">
            <span class="rhythm-label">峰值</span>
            <span class="rhythm-value-mono">${peakCell.d.date.slice(5)} · ${String(peakCell.hi).padStart(2,'0')}:00</span>
            <span class="rhythm-sub">${fmtVal(peakCell.v)}${isTok ? "" : " 条"}</span>
          </div>
        ` : ""}
        <div class="rhythm-insight">
          <div class="rhythm-bar">
            <span class="rhythm-bar-seg" style="width:${pMorning}%" title="上午 ${pMorning}%"></span>
            <span class="rhythm-bar-seg rb-afternoon" style="width:${pAfternoon}%" title="下午 ${pAfternoon}%"></span>
            <span class="rhythm-bar-seg rb-evening" style="width:${pEvening}%" title="晚上 ${pEvening}%"></span>
            <span class="rhythm-bar-seg rb-night" style="width:${pNight}%" title="深夜 ${pNight}%"></span>
          </div>
          <div class="rhythm-bar-legend">
            <span>上午 <b>${pMorning}%</b></span>
            <span>下午 <b>${pAfternoon}%</b></span>
            <span>晚上 <b>${pEvening}%</b></span>
            <span>深夜 <b>${pNight}%</b></span>
          </div>
          <div class="rhythm-narrative">${narrativeHTML}</div>
        </div>
      `;
    } else {
      // Weekly — heatmap is short (~110px). Compact: 2 inline stats + narrative
      statsHTML = `
        <div class="rhythm-row">
          <div class="rhythm-stat">
            <div class="rhythm-label">${periodTotalLabel}</div>
            <div class="rhythm-value">${fmtVal(totalMsgs)}<span class="rhythm-unit">${isTok ? "" : " 条"}</span></div>
            <div class="rhythm-sub">${avgLabel} ${fmtVal(avgMsgs)}</div>
          </div>
          <div class="rhythm-stat">
            <div class="rhythm-label">活跃日</div>
            <div class="rhythm-value">${activeDays}<span class="rhythm-unit"> / ${totalDays}</span></div>
            <div class="rhythm-sub">最长连续 ${maxStreak} 天</div>
          </div>
        </div>
        ${peakCell ? `
          <div class="rhythm-peak-inline">
            <span class="rhythm-label">峰值</span>
            <span class="rhythm-value-mono">${peakCell.d.date.slice(5)} · ${String(peakCell.hi).padStart(2,'0')}:00</span>
            <span class="rhythm-sub">${fmtVal(peakCell.v)}${isTok ? "" : " 条"}</span>
          </div>
        ` : ""}
        <div class="rhythm-narrative rhythm-narrative-weekly">${narrativeHTML}</div>
      `;
    }
    if (opts.cost) {
      statsHTML += `<div class="rhythm-peak-inline"><span class="rhythm-label">API 价</span><span class="rhythm-value-mono cost-clickable">≈ ${fmtUsd(opts.cost)}</span><span class="rhythm-sub">等效 API 成本</span></div>`;
    }

    return `
      <div class="card section reveal">
        <div class="card-head">
          <h2>${opts.title}</h2>
          <span class="meta">${opts.metaRight}</span>
        </div>
        <div class="heatmap-row ${isMonthly ? 'is-monthly' : 'is-weekly'}">
          <div class="heatmap-wrap">
            <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet"
              style="width:100%; height:auto; max-width:${W}px;">
              ${hAxis}
              ${dAxis}
              ${cells}
            </svg>
            <div class="heatmap-legend">
              <span>少</span>
              <span class="sw" style="background:#f5f5f5"></span>
              <span class="sw" style="background:#ebebeb"></span>
              <span class="sw" style="background:#d4d4d4"></span>
              <span class="sw" style="background:#8a8a8a"></span>
              <span class="sw" style="background:#171717"></span>
              <span>多</span>
            </div>
          </div>
          <div class="heatmap-stats">${statsHTML}</div>
        </div>
      </div>
    `;
  }



  // 各项目时间占比 · % 在条外(依次变小)+ 项目名小字在条内;显示更多项目,长尾归"其他"
  const PPCT_SIZE = [22, 18, 16, 15, 14, 13, 12];
  const PPCT_OP   = [1, 0.82, 0.7, 0.6, 0.52, 0.46, 0.42];
  const PSUM_SHADES = ["#ededed", "#d4d4d4", "#bcbcbc", "#a2a2a2", "#8a8a8a", "#767676", "#646464"];
  const PSUM_REST = "#565656";
  function renderProjectSummaryBar(projects) {
    const real = projects.filter(p => !p.fallback);
    const src = real.length ? real : projects;
    const withWork = src.map(p => ({ p, w: (p.active_min || 0) })).filter(x => x.w > 0);
    if (withWork.length < 2) return "";
    const total = withWork.reduce((a, x) => a + x.w, 0);
    const TOPN = 7;
    let items;
    if (withWork.length <= TOPN + 1) {
      items = withWork.map((x, i) => ({ label: x.p.label, share: x.w / total, raw: x.w, i }));
    } else {
      items = withWork.slice(0, TOPN).map((x, i) => ({ label: x.p.label, share: x.w / total, raw: x.w, i }));
      const restW = withWork.slice(TOPN).reduce((a, x) => a + x.w, 0);
      items.push({ label: `其他 ${withWork.length - TOPN} 项`, share: restW / total, raw: restW, i: TOPN, rest: true });
    }
    const shadeOf = it => it.rest ? PSUM_REST : (PSUM_SHADES[it.i] || PSUM_REST);
    const pctRow = items.map(it => {
      const size = it.rest ? 12 : (PPCT_SIZE[it.i] || 12);
      const op = it.rest ? 0.4 : (PPCT_OP[it.i] || 0.4);
      return `<div class="ppct" style="width:${(it.share * 100).toFixed(2)}%"><b style="font-size:${size}px; color:rgba(255,255,255,${op})">${Math.round(it.share * 100)}%</b></div>`;
    }).join("");
    const bar = items.map(it => {
      const darkText = !it.rest && it.i < 4;   // 亮底用深字, 暗底(靠后/其他)用浅字
      const nameCol = darkText ? "#171717" : "rgba(255,255,255,0.92)";
      const name = it.share > 0.06 ? `<span class="pseg-name" style="color:${nameCol}">${escapeHTML(it.label)}</span>` : "";
      const tip = `${it.label} · ${Math.round(it.share * 100)}% · ${fmtMin(it.raw)}`;
      return `<div class="pseg" style="width:${(it.share * 100).toFixed(2)}%; background:${shadeOf(it)};" data-tip="${escapeAttr(tip)}">${name}</div>`;
    }).join("");
    return `<div class="psum"><div class="psum-cap">各项目时间占比</div><div class="ppct-row">${pctRow}</div><div class="pbar">${bar}</div></div>`;
  }

  // 占比条 tooltip · 锚定在段上方(不随鼠标移动)——挂 body,不受条的 overflow 裁剪
  (function () {
    let tip = null, cur = null;
    document.addEventListener("pointerover", e => {
      const seg = e.target.closest && e.target.closest(".pseg[data-tip]");
      if (!seg || seg === cur) return;
      cur = seg;
      if (!tip) { tip = document.createElement("div"); tip.id = "psum-tip"; document.body.appendChild(tip); }
      tip.textContent = seg.getAttribute("data-tip");
      tip.style.opacity = "1";
      const r = seg.getBoundingClientRect();
      let x = r.left + r.width / 2 - tip.offsetWidth / 2;
      x = Math.max(8, Math.min(x, window.innerWidth - tip.offsetWidth - 8));
      let y = r.top - tip.offsetHeight - 8;
      if (y < 8) y = r.bottom + 8;
      tip.style.left = x + "px"; tip.style.top = y + "px";
    });
    document.addEventListener("pointerout", e => {
      const seg = e.target.closest && e.target.closest(".pseg[data-tip]");
      if (!seg || cur !== seg) return;
      const to = e.relatedTarget;
      if (to && to.closest && to.closest(".pseg[data-tip]") === seg) return;
      cur = null; if (tip) tip.style.opacity = "0";
    });
  })();

  function renderProjects(projects, range) {
    if (!projects.length) return "";
    // 主轴 = 时间(活跃时长):真项目在前、兜底沉底,按活跃时长降序(日报也一致)
    projects = [...projects].sort((a, b) => {
      if (!!a.fallback !== !!b.fallback) return a.fallback ? 1 : -1;
      return (b.active_min || 0) - (a.active_min || 0);
    });
    const isDaily = range === "daily";
    const showStamps = !isDaily;

    const renderCard = (p, globalIdx) => {
      const latestTitle = p._latest_title || "";
      const isRanked = showStamps && globalIdx < 3 && !p.fallback;
      const rankClass = isRanked ? `is-rank-${globalIdx + 1}` : "";
      const stampHTML = isRanked ? `
        <div class="folder-stamp rank-${globalIdx + 1}" aria-hidden="true">
          <span class="folder-stamp-rank">${globalIdx + 1}</span>
          <span class="folder-stamp-label">Top</span>
        </div>
      ` : "";
      return `
        <div class="folder-card ${rankClass} ${p.fallback ? "is-fallback" : ""}" data-project="${escapeAttr(p.name || p.label)}">
          <div class="folder-thumb">
            <div class="folder-thumb-text">${escapeHTML(latestTitle || "—")}</div>
          </div>
          <div class="folder-name">${escapeHTML(p.label)}</div>
          <div class="folder-duration">${fmtMin(p.active_min || 0)} <span class="folder-unit">活跃</span></div>
          <div class="folder-meta">${p.sessions} 个 session · ${fmtTok(workTokens(p))} 产出 · ${fmtTok(p.tokens)} tok 总量</div>
          <div class="folder-corner"></div>
          ${stampHTML}
          <div class="folder-details" data-loaded="0"></div>
        </div>
      `;
    };

    const buildRow = (items, perRow, rowClass, startIdx) => {
      let cards = items.map((p, i) => renderCard(p, startIdx + i)).join("");
      const empties = (perRow - items.length) % perRow;
      for (let k = 0; k < empties; k++) {
        cards += `<div class="folder-slot-empty" aria-hidden="true"></div>`;
      }
      return `<div class="shelf-row ${rowClass}">${cards}</div>`;
    };

    let rowsHTML = "";

    if (isDaily) {
      // daily: one rhythm — 4 per row
      for (let i = 0; i < projects.length; i += 4) {
        rowsHTML += buildRow(projects.slice(i, i + 4), 4, "row-daily", i);
      }
    } else {
      // weekly / monthly: top-3 highlight row + rest 4-per-row
      const top3 = projects.slice(0, 3);
      const rest = projects.slice(3);
      if (top3.length) {
        rowsHTML += buildRow(top3, 3, "row-top3", 0);
      }
      for (let i = 0; i < rest.length; i += 4) {
        rowsHTML += buildRow(rest.slice(i, i + 4), 4, "row-normal", 3 + i);
      }
    }

    // Top-3 share insight (按活跃时长)
    let metaInsight = "按时长排序";
    const realProjects = projects.filter(p => !p.fallback);
    const totalActive = realProjects.reduce((a, p) => a + (p.active_min || 0), 0);
    if (!isDaily && realProjects.length >= 4) {
      const top3Active = realProjects.slice(0, 3).reduce((a, p) => a + (p.active_min || 0), 0);
      const share = totalActive > 0 ? Math.round((top3Active / totalActive) * 100) : 0;
      metaInsight += ` · <strong style="color:var(--text-primary)">Top 3 占 ${share}%</strong>`;
    }

    // 产出占比条 + 分布叙述,合进同一个 INSIGHT 深底面板(占比条在上、点评在下)
    const summaryBar = renderProjectSummaryBar(projects);
    const narrative = buildProjectsNarrative(projects, range);
    let insightBlock = "";
    if (narrative) {
      insightBlock = summaryBar
        ? narrative.replace('<div class="projects-insight">', `<div class="projects-insight">${summaryBar}`)
        : narrative;
    } else if (summaryBar) {
      insightBlock = `<div class="projects-insight">${summaryBar}</div>`;
    }

    return `
      <div class="card section reveal projects-section">
        <div class="card-head">
          <h2>Projects today</h2>
          <span class="meta">${metaInsight}</span>
        </div>
        ${insightBlock}
        <div class="proj-list">${rowsHTML}</div>
      </div>
    `;
  }

  function buildProjectsNarrative(projects, range) {
    const real = projects.filter(p => !p.fallback);
    const buckets = projects.filter(p => p.fallback);
    const totalTok = projects.reduce((a, p) => a + (p.active_min || 0), 0);
    const realTok = real.reduce((a, p) => a + (p.active_min || 0), 0);
    if (!real.length || realTok <= 0) return "";
    const periodWord = range === "daily" ? "今天" : (range === "weekly" ? "本周" : "本月");
    const top1 = real[0];
    const top1Work = top1.active_min || 0;
    const top1Share = top1Work / realTok;
    const top1Pct = Math.round(top1Share * 100);

    const sentences = [];

    // sentence 1: dominance / dispersion of top-1 real project (按产出 — 主指标, 兜底桶不参与)
    if (top1Share >= 0.55) {
      sentences.push(`${periodWord}主线明确——<b>${escapeHTML(top1.label)}</b> 一项就占了 <b>${top1Pct}%</b> 时间（${fmtMin(top1Work)}），其余项目都是配角。`);
    } else if (top1Share >= 0.30) {
      const top2 = real[1];
      const top2Work = top2 ? (top2.active_min || 0) : 0;
      if (top2 && top2Work > 0) {
        const gapPct = Math.round((1 - top2Work / top1Work) * 100);
        sentences.push(`主线 <b>${escapeHTML(top1.label)}</b>（${fmtMin(top1Work)}, ${top1Pct}%），跟次线 <b>${escapeHTML(top2.label)}</b>（${fmtMin(top2Work)}）拉开 ${gapPct}% 差距。`);
      } else {
        sentences.push(`${periodWord}主线 <b>${escapeHTML(top1.label)}</b>（${top1Pct}%）。`);
      }
    } else {
      sentences.push(`${periodWord}时间分散在 <b>${real.length}</b> 个项目，Top 1（${escapeHTML(top1.label)}）仅占 <b>${top1Pct}%</b>，没有强势主线。`);
    }

    // sentence 2: 活跃时长 head/tail split (≥ 3 real projects) — 跟 token 用量互补的一条
    if (real.length >= 3) {
      const totalActive = real.reduce((a, p) => a + (p.active_min || 0), 0);
      const bigProjects = real.filter(p => p.active_min >= 60);
      const smallProjects = real.filter(p => p.active_min < 60 && p.active_min > 0);
      if (bigProjects.length > 0 && smallProjects.length > 0 && totalActive > 0) {
        const bigActive = bigProjects.reduce((a, p) => a + p.active_min, 0);
        const bigShare = Math.round((bigActive / totalActive) * 100);
        sentences.push(`<b>${bigProjects.length}</b> 个项目活跃 ≥ 1h（共占 ${bigShare}% 活跃时长），其余 <b>${smallProjects.length}</b> 个是零碎触碰（< 1h）。`);
      }
    }

    // sentence 3: 诚实披露未归类占比 (兜底桶不进主线, 但要说清楚跑哪了)
    if (buckets.length && totalTok > 0) {
      const bucketTok = buckets.reduce((a, p) => a + (p.active_min || 0), 0);
      const bucketPct = Math.round((bucketTok / totalTok) * 100);
      if (bucketPct >= 5) {
        const names = buckets.slice(0, 3).map(b => escapeHTML(b.label)).join(" / ");
        sentences.push(`<span class="insight-muted">另有 <b>${bucketPct}%</b> 时间落在未归类（${names}${buckets.length > 3 ? " 等" : ""}），不计入主线。</span>`);
      }
    }

    if (!sentences.length) return "";
    return `<div class="projects-insight">${sentences.map(s => `<p>${s}</p>`).join("")}</div>`;
  }

  function renderSessions(sessions_list, opts) {
    // opts: { title, emptyText, limit, showDate }
    const limit = opts.limit || sessions_list.length;
    const sliced = sessions_list.slice(0, limit);
    if (!sliced.length) {
      return `<div class="card section reveal">
        <div class="card-head"><h2>${opts.title}</h2><span class="meta">0</span></div>
        <div class="loading">${opts.emptyText}</div>
      </div>`;
    }
    const max = Math.max(...sliced.map(s => s.tokens), 1);
    const rows = sliced.map(s => {
      const pct = (s.tokens / max) * 100;
      const branchTag = s.branch ? `<span class="tag">${escapeHTML(s.branch)}</span>` : "";
      const timeCell = opts.showDate
        ? fmtMonthDay(s.start)
        : fmtTimeHHMM(s.start);
      const timeSub = opts.showDate
        ? `<span class="sub">${fmtTimeHHMM(s.start)}</span>`
        : "";
      return `
        <div class="session-row is-drill" data-sid="${escapeHTML(s.id)}" data-date="${(s.start || '').slice(0, 10)}">
          <div class="session-time">${timeCell}${timeSub}</div>
          <div class="session-main">
            <div class="session-title">${escapeHTML(s.title)}</div>
            <div class="session-meta">
              <span>${escapeHTML(s.cwd_label)}</span>
              ${branchTag}
              <span>${fmtMin(s.active_min)}</span>
            </div>
          </div>
          <div class="session-bar-wrap">
            <div class="session-bar" style="width:${pct.toFixed(1)}%"></div>
          </div>
          <div class="session-tokens">
            ${fmtTok(s.tokens)}
            <span class="sub">tokens</span>
          </div>
        </div>
      `;
    }).join("");
    const metaCount = limit < sessions_list.length
      ? `前 ${limit} / 共 ${sessions_list.length}`
      : `${sliced.length} 个 session`;
    return `
      <div class="card section reveal">
        <div class="card-head">
          <h2>${opts.title}</h2>
          <span class="meta">${metaCount}</span>
        </div>
        ${rows}
      </div>
    `;
  }

  function escapeHTML(s) {
    return String(s || "").replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  // ─── Session drill-down: 点 session 行 → 逐轮解剖 ───
  function fmtTurnTok(v) {
    if (v >= 1e6) return (v / 1e6).toFixed(2) + "M";
    if (v >= 1e3) return Math.round(v / 1e3) + "K";
    return String(v);
  }
  function renderTurns(data) {
    const turns = data.turns || [];
    if (!turns.length) return `<div class="drill-empty">这天该 session 没有可解析的轮次</div>`;
    const max = Math.max(...turns.map(t => t.tokens), 1);
    const tier = (tk) => {
      if (!tk) return "t-faint";
      const r = tk / max;
      if (r >= 0.6) return "t-spike";
      if (r >= 0.25) return "t-mid";
      if (r >= 0.08) return "t-low";
      return "t-faint";
    };
    const rows = turns.map(t => {
      const zero = !t.tokens;
      const allTools = Object.entries(t.tools || {}).sort((a, b) => b[1] - a[1]);
      const tools = allTools.slice(0, 5).map(([k, v]) => `${escapeHTML(k)}${v > 1 ? "×" + v : ""}`).join(" ");
      const allFiles = t.files || [];
      const fileChips = allFiles.slice(0, 4).map(f => `<span class="dl-file">${escapeHTML(f)}</span>`).join("");
      const moreFiles = allFiles.length > 4 ? `<span class="dl-more">+${allFiles.length - 4}</span>` : "";
      const sub =
        (fileChips ? `<span class="dl-files">${fileChips}</span>${moreFiles}` : "")
        + (tools ? `<span class="dl-tools">${tools}</span>` : "")
        + `<span class="dl-time">${escapeHTML(t.time)}</span>`;
      return `<div class="turn${zero ? " is-quiet" : ""}">
        <div class="turn-prompt">${escapeHTML(t.prompt)}</div>
        <div class="turn-cost ${tier(t.tokens)}">${zero ? "·" : fmtTurnTok(t.tokens)}</div>
        <div class="turn-sub">${sub}</div>
      </div>`;
    }).join("");
    const cap = `${turns.length} 轮 · 当天合计 ${fmtTurnTok(data.total_tokens || 0)} · 含 cache`;
    return `<div class="drill-cap">${cap}</div>${rows}`;
  }
  async function loadDrill(row) {
    const next = row.nextElementSibling;
    if (next && next.classList.contains("session-drill")) {  // 已展开 → 收起
      next.remove();
      row.classList.remove("open");
      return;
    }
    row.classList.add("open");
    const drawer = document.createElement("div");
    drawer.className = "session-drill";
    drawer.innerHTML = `<div class="drill-loading">读取 session…</div>`;
    row.insertAdjacentElement("afterend", drawer);
    const sid = row.getAttribute("data-sid");
    const date = row.getAttribute("data-date") || "";
    try {
      const res = await fetch(`/api/session?sid=${encodeURIComponent(sid)}&date=${encodeURIComponent(date)}`);
      if (!res.ok) throw new Error("http " + res.status);
      drawer.innerHTML = renderTurns(await res.json());
    } catch (e) {
      drawer.innerHTML = `<div class="drill-empty">下钻需要 live server（<code>python3 cc-reports.py serve</code>）。当前是静态快照，点不动。</div>`;
    }
  }
  document.addEventListener("click", (e) => {
    const row = e.target.closest(".session-row.is-drill");
    if (row) loadDrill(row);
  });

  function renderHeadline(agg) {
    return `

  function setupProjectClicks() {
    document.querySelectorAll('.folder-card').forEach(card => {

  function buildFolderDetails(projectName) {
    if (!DATA) return "";
    const agg = aggregateRange(DATA, RANGE);
    const sessions = (agg.sessions_list || [])
      .filter(s => s.project === projectName);
    if (!sessions.length) {
      return `<div class="folder-empty">这个范围内没有 session 归到此项目</div>`;
    }

    // story-style summary
    const total = sessions.reduce((sum, s) => sum + s.active_min, 0);
    const longest = [...sessions].sort((a, b) => b.active_min - a.active_min)[0];
    const dateLabels = [...new Set(sessions.map(s => s.start ? s.start.slice(0, 10) : ""))]
      .filter(Boolean);
    const days = dateLabels.length;
    const summary = `<b>${sessions.length}</b> 个 session 跨 <b>${days}</b> 天，共 <b>${fmtMin(total)}</b>，最长一次「${escapeHTML(truncate(longest.title, 32))}」用了 <b>${fmtMin(longest.active_min)}</b>。`;

    // per-project daily bar chart ("in the folder")
    const chart = renderFolderChart(projectName, agg);

    // sessions list, oldest first
    const sorted = [...sessions].sort((a, b) => (a.start || "").localeCompare(b.start || ""));
    const rows = sorted.map(s => `
      <div class="folder-session">
        <span class="fs-time">${fmtMonthDay(s.start)}</span>
        <span class="fs-title">${escapeHTML(s.title)}</span>
        <span class="fs-meta">${fmtMin(s.active_min)} · ${fmtTok(s.tokens)}</span>
      </div>
    `).join("");

    return `<div class="folder-summary">${summary}</div>${chart}${rows}`;
  }

  function renderFolderChart(projectName, agg) {
    // Aggregate per-day active_min for THIS project across the current range's days.
    // Source: agg.trend_days (already in range) — each day has a projects[] array.
    const days = agg.trend_days || [];
    if (!days.length) return "";
    const series = days.map(d => {
      const found = (d.projects || []).find(p => p.name === projectName);
      return found ? (found.active_min || 0) : 0;
    });
    const maxV = Math.max(...series, 1);
    const totalMins = series.reduce((a, b) => a + b, 0);

    const W = 320, H = 56, padX = 4, padTop = 4, padBot = 4;
    const plotH = H - padTop - padBot;
    const n = series.length;
    const slotW = (W - padX * 2) / n;
    const barW = Math.max(3, Math.min(slotW - 3, 16));

    let bars = "";
    series.forEach((v, i) => {
      const cx = padX + i * slotW + slotW / 2;
      const h = v === 0 ? 1.5 : Math.max(1.5, (v / maxV) * plotH);
      const y = H - padBot - h;
      const fill = v === 0 ? "rgba(0,0,0,0.10)"
                          : (i === n - 1 ? "rgba(0,0,0,0.85)" : "rgba(0,0,0,0.55)");
      bars += `<rect x="${cx - barW / 2}" y="${y}"
        width="${barW}" height="${h}" rx="1.5"
        fill="${fill}"/>`;
    });

    const firstDay = days[0];
    const lastDay = days[days.length - 1];
    const firstLbl = firstDay.weekday + " " + firstDay.date.slice(5);
    const lastLbl = lastDay.weekday + " " + lastDay.date.slice(5);

    return `
      <div class="folder-chart">
        <div class="folder-chart-title">
          <span>每日活跃时长 · 近 ${n} 天</span>
          <span><strong>${fmtMin(totalMins)}</strong> 合计</span>
        </div>
        <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${bars}</svg>
        <div class="folder-chart-axis">
          <span>${firstLbl}</span>
          <span>${lastLbl}</span>
        </div>
      </div>
    `;
  }
