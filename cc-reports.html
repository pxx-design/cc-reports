  let DATA = null;
  let RANGE = "daily";
  let _costCtx = null;   // 当前区间的成本明细上下文, 喂 $金额点击弹层

  // ─── 区间切换 ────────────────────────────────────────
  // 页面控件条:切换 = 换了一份报表, 回到顶部从头看。
  // 导航栏停靠版:人正在页面深处比对数据, 换区间是就地换视角 —— 停在原处。
  function setRange(next, opts) {
    if (!next || next === RANGE) return;
    const y = window.scrollY;
    RANGE = next;
    rerender();
    if (opts && opts.keepScroll) {
      const maxY = Math.max(0, document.documentElement.scrollHeight - window.innerHeight);
      window.scrollTo({ top: Math.min(y, maxY) });   // 新区间页更短时夹住, 免得弹到底
    } else {
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  }

  function syncDockTabs() {
    document.querySelectorAll("#dock-tabs .dock-tab").forEach(t => {
      t.setAttribute("aria-selected", t.dataset.range === RANGE ? "true" : "false");
    });
  }

  // 停靠开关:观察控件条本身,它整个滑到导航栏底下(rootMargin 抵掉 56px 栏高)就停靠。
  // 用 IntersectionObserver 而不是 scroll 事件 —— 只切一个 class, 过渡全走 opacity/transform, 不掉帧。
  let _dockObs = null;
  function setupDockObserver() {
    const controls = document.querySelector(".controls");
    if (!controls) return;
    if (_dockObs) _dockObs.disconnect();
    _dockObs = new IntersectionObserver(([entry]) => {
      document.body.classList.toggle("is-docked", !entry.isIntersecting);
    }, { rootMargin: "-56px 0px 0px 0px", threshold: 0 });
    _dockObs.observe(controls);
  }

  document.querySelectorAll("#dock-tabs .dock-tab").forEach(t => {
    t.addEventListener("click", () => setRange(t.dataset.range, { keepScroll: true }));
  });

  function rerender() {
    const agg = aggregateRange(DATA, RANGE);
    _costCtx = { byModel: agg.costByModel || {}, total: agg.costTotal || 0, models: agg.costModels || {} };

    const projectsHTML = renderProjects(agg.projects, RANGE)
      .replace("<h2>Projects today</h2>", `<h2>${escapeHTML(agg.projects_title)}</h2>`);

    const activityHTML = agg.activity.kind === "heatmap"
      ? renderActivityHeatmap(agg.activity.days, agg.activity.opts)
      : renderActivityChart(agg.activity.values, agg.activity.opts);

    const html = [
      renderControls(RANGE),
      `<section id="hero">${renderHeadline(agg)}</section>`,
      `<section id="activity">${activityHTML}</section>`,
      `<section id="projects">${projectsHTML}</section>`,
      `<section id="sessions">${renderSessions(agg.sessions_list, agg.sessions_opts)}</section>`,
      `<div class="footnote">
        <span>cc / reports · v0.5.1</span>
        <span>source · ~/.claude/projects · ${DATA.days.length} days</span>
      </div>`,
    ].join("");

    document.getElementById("app").innerHTML = html;

    document.querySelectorAll(".tab").forEach(t => {
      t.addEventListener("click", () => setRange(t.dataset.range, { keepScroll: false }));
    });
    syncDockTabs();
    setupDockObserver();

    setupSideNav();
    setupBarClicks();
    setupHeatmapClicks();
    setupProjectClicks();
    setupCostClicks();
    hidePopover();
  }

  // ─── Generic click-popover ───────────────────────────
  let _popoverEl = null;
  function hidePopover() {
    if (_popoverEl) { _popoverEl.remove(); _popoverEl = null; }
    document.removeEventListener("click", _popoverOutside, true);
    document.removeEventListener("keydown", _popoverEsc);
  }
  function _popoverOutside(e) {
    if (_popoverEl && !_popoverEl.contains(e.target)) hidePopover();
  }
  function _popoverEsc(e) {
    if (e.key === "Escape") hidePopover();
  }
  function showPopover(anchorEl, html, opts) {
    opts = opts || {};
    hidePopover();
    const div = document.createElement("div");
    div.className = "data-popover reveal";
    div.innerHTML = `<button class="popover-close" aria-label="关闭">×</button>${html}`;
    document.body.appendChild(div);
    const r = opts.rect || anchorEl.getBoundingClientRect();
    const pw = div.offsetWidth, ph = div.offsetHeight;
    let left = r.left + r.width / 2 - pw / 2 + window.scrollX;
    let top;
    if (opts.above) {
      // 浮在锚点上方(柱顶),顶部放不下再翻到下方
      top = r.top + window.scrollY - ph - 10;
      if (r.top - ph - 20 < 0) top = r.bottom + window.scrollY + 10;
    } else {
      top = r.bottom + 10 + window.scrollY;
      if (r.bottom + ph + 20 > window.innerHeight) top = r.top + window.scrollY - ph - 10;
    }
    left = Math.max(12, Math.min(left, window.innerWidth - pw - 12));
    div.style.left = `${left}px`;
    div.style.top = `${top}px`;
    div.querySelector(".popover-close").onclick = hidePopover;
    _popoverEl = div;
    setTimeout(() => {
      document.addEventListener("click", _popoverOutside, true);
      document.addEventListener("keydown", _popoverEsc);
    }, 0);
  }

  // Build popover content for a specific hour slot on a date.
  function buildHourPopover(dateLabel, hour, byModel) {
    const hourLabel = String(hour).padStart(2, "0") + ":00";
    const total = Object.values(byModel || {}).reduce((a, b) => a + b, 0);
    const modelRows = Object.entries(byModel || {}).sort((a, b) => b[1] - a[1]).map(([m, c]) => `
      <div class="popover-row">
        <span class="popover-label">${escapeHTML(shortModel(m))}</span>
        <span class="popover-val">${fmtTok(c)} tokens <span style="color:var(--text-tertiary)">${total ? Math.round(c/total*100) : 0}%</span></span>
      </div>
    `).join("");
    const body = total === 0
      ? `<div class="popover-empty">这个时段没有活动</div>`
      : modelRows;
    return `
      <div class="popover-head">
        <span class="popover-title">${escapeHTML(dateLabel)} · ${hourLabel}</span>
        <span class="popover-sub">${fmtTok(total)} tokens</span>
      </div>
      ${body}
    `;
  }

  // Build popover for a whole day (used by sparkline dot clicks).
  function buildDayPopover(day) {
    const workToks = (day.tokens.output || 0) + (day.tokens.cache_creation || 0);
    const topProject = (day.projects || [])[0];
    const topSession = [...(day.sessions_list || [])].sort((a, b) => b.tokens - a.tokens)[0];
    const wkLong = weekdayLong(day.date);
    return `
      <div class="popover-head">
        <span class="popover-title">${escapeHTML(day.date)} · ${escapeHTML(wkLong)}</span>
        <span class="popover-sub">${day.sessions} 个 session · ${fmtInt(day.user_msgs)} prompts</span>
      </div>
      <div class="popover-row">
        <span class="popover-label">Output</span>
        <span class="popover-val">${fmtTok(workToks)}</span>
      </div>
      <div class="popover-row">
        <span class="popover-label">Cache read</span>
        <span class="popover-val">${fmtTok(day.tokens.cache_read || 0)}</span>
      </div>
      ${topProject ? `
        <div class="popover-row">
          <span class="popover-label">主要项目</span>
          <span class="popover-val">${escapeHTML(truncate(topProject.label, 22))} · ${fmtMin(topProject.active_min || 0)}</span>
        </div>
      ` : ""}
      ${topSession ? `
        <div class="popover-row">
          <span class="popover-label">Top session</span>
          <span class="popover-val">${escapeHTML(truncate(topSession.title, 26))}</span>
        </div>
      ` : ""}
    `;
  }

  // 点击 $金额 → 等效 API 成本明细. 单价读 DATA.pricing(单一源=models.py),
  // 按模型分块「四类 token 各行: 量 × 单价/M = 小计」; 用了却没登记价的模型会提示.
  function buildCostPopover(ctx) {
    const pricing = (DATA && DATA.pricing) || {};
    const byModel = ctx.byModel || {};
    const rangeLabel = RANGE === "daily" ? "今日" : (RANGE === "weekly" ? "近 7 天" : "近 30 天");

    const rows = Object.entries(byModel).map(([m, td]) => {
      const pr = pricing[m] || [0, 0, 0, 0];
      const cIn = td.in * pr[0] / 1e6, cOut = td.out * pr[1] / 1e6,
            cCw = td.cw * pr[2] / 1e6, cCr = td.cr * pr[3] / 1e6;
      return { m, td, pr, sub: cIn + cOut + cCw + cCr, cIn, cOut, cCw, cCr };
    }).sort((a, b) => b.sub - a.sub);

    const line = (label, toks, price, cost) => `
      <div class="cost-line">
        <span class="cost-l">${label}</span>
        <span class="cost-r"><span class="cost-tok">${fmtTok(toks)}</span> <span class="cost-x">× $${price}/M</span> <span class="cost-eq">${fmtUsd(cost)}</span></span>
      </div>`;

    const blocks = rows.length ? rows.map(r => `
      <div class="cost-model">
        <div class="cost-model-head"><span>${escapeHTML(shortModel(r.m))}</span><span>${fmtUsd(r.sub)}</span></div>
        ${line("输入", r.td.in, r.pr[0], r.cIn)}
        ${line("输出", r.td.out, r.pr[1], r.cOut)}
        ${line("缓存写", r.td.cw, r.pr[2], r.cCw)}
        ${line("缓存读", r.td.cr, r.pr[3], r.cCr)}
      </div>`).join("") : `<div class="popover-empty">这段时间没有计费用量</div>`;

    // 用了但没登记单价的真实 claude 模型(新模型 → 提示补价; synthetic 占位 / GLM 第三方不算)
    const usedBases = [...new Set(Object.keys(ctx.models || {}).map(x => x.split("[")[0]))];
    const uncounted = usedBases.filter(b => b.startsWith("claude-") && !pricing[b]);
    const hasGlm = usedBases.some(b => b.startsWith("glm-"));

    let foot = `按 API 价目表折算(单价源自 models.py)· 非订阅实付`;
    if (hasGlm) foot += `<br>GLM 等第三方模型不计入`;
    if (uncounted.length) foot += `<br><span class="cost-warn">⚠ ${uncounted.map(b => escapeHTML(shortModel(b))).join("、")} 未登记单价, 未计入 —— 在 models.py 补价</span>`;

    return `
      <div class="popover-head">
        <span class="popover-title">等效 API 成本 · ${rangeLabel}</span>
        <span class="popover-sub">合计 ≈ ${fmtUsd(ctx.total || 0)}</span>
      </div>
      ${blocks}
      <div class="cost-foot">${foot}</div>
    `;
  }

  function setupCostClicks() {
    document.querySelectorAll(".cost-clickable").forEach(el => {
      el.addEventListener("click", (e) => {
        e.stopPropagation();
        if (!_costCtx) return;
        showPopover(el, buildCostPopover(_costCtx));
      });
    });
  }

  function setupBarClicks() {
    const chart = document.querySelector('[data-chart="hourly-bar"]');
    if (!chart) return;
    const byModelRaw = chart.getAttribute("data-by-model");
    const dateLabel = chart.getAttribute("data-date") || "";
    let byModel = null;
    try { byModel = byModelRaw ? JSON.parse(byModelRaw) : null; } catch (_) {}
    chart.querySelectorAll(".bar-hit").forEach(hit => {
      hit.addEventListener("click", (e) => {
        e.stopPropagation();
        const i = parseInt(hit.dataset.idx, 10);
        const html = buildHourPopover(dateLabel, i, byModel?.[i] || {});
        // 锚定柱顶:hit 是全高列,按 data-top 折算柱顶 y,气泡跟柱高浮上方
        const hr = hit.getBoundingClientRect();
        const topFrac = parseFloat(hit.dataset.top || "1");
        const barTop = hr.top + hr.height * topFrac;
        showPopover(hit, html, { rect: { left: hr.left, right: hr.right, width: hr.width, top: barTop, bottom: barTop, height: 0 }, above: true });
      });
    });
  }

  function setupHeatmapClicks() {
    if (!DATA) return;
    document.querySelectorAll('.heatmap-wrap rect[data-hm-date]').forEach(rect => {
      rect.addEventListener("click", (e) => {
        e.stopPropagation();
        const date = rect.dataset.hmDate;
        const hour = parseInt(rect.dataset.hmHour, 10);
        const day = DATA.days.find(d => d.date === date);
        const byModel = day?.hourly_tokens_by_model?.[hour] || day?.hourly_by_model?.[hour] || {};
        const html = buildHourPopover(date, hour, byModel);
        showPopover(rect, html);
      });
    });
  }

  let _navObserver = null;
  function setupSideNav() {
    const nav = document.getElementById("side-nav");
    if (!nav) return;
    nav.style.display = "flex";
    const links = nav.querySelectorAll("a");

    // smooth-scroll on click
    links.forEach(a => {
      a.onclick = (e) => {
        e.preventDefault();
        const el = document.getElementById(a.dataset.target);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      };
    });

    // active state via IntersectionObserver
    if (_navObserver) _navObserver.disconnect();
    _navObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          links.forEach(a => a.classList.remove("active"));
          const link = nav.querySelector(`a[data-target="${entry.target.id}"]`);
          if (link) link.classList.add("active");
        }
      });
    }, { rootMargin: "-30% 0px -60% 0px", threshold: 0 });

    ["hero", "activity", "trend", "projects", "sessions"].forEach(id => {
      const el = document.getElementById(id);
      if (el) _navObserver.observe(el);
    });
  }

  function renderApp(data) {
    DATA = data;
    const today = data.days[data.days.length - 1];
    const stamp = new Date(data.generated_at).toLocaleString("en-GB", {
      year: "numeric", month: "short", day: "2-digit",
      hour: "2-digit", minute: "2-digit", hour12: false
    });
    const sourceTag = data._source === "live"
      ? `实时 · ${data._build_ms ?? "—"}ms`
      : "静态 · 需重跑 cc-reports.py build";
    document.getElementById("stamp").innerHTML =
      `<span>${escapeHTML(stamp)}</span><span style="margin-left:10px;opacity:0.6;">${escapeHTML(sourceTag)}</span>`;
    // 顶栏用户名/头像 = 运行者本机系统用户名(后端注入),谁跑就是谁
    const uname = (data.user || "you").trim() || "you";
    const ue = document.getElementById("crumb-user");
    if (ue) ue.textContent = uname;
    const av = document.getElementById("avatar");
    if (av) av.textContent = (uname[0] || "·").toUpperCase();
    document.title = `cc / reports · ${today.date} · ${today.sessions} 个 session`;
    rerender();
  }

  // ─── Live data loader ───────────────────────────────
  // Tries /api/data first (live, rebuilt every fetch by `cc-reports.py serve`),
  // falls back to static cc-reports-data.json (one-shot `cc-reports.py build`).
  async function fetchData() {
    try {
      const r = await fetch("/api/data?_t=" + Date.now(), { cache: "no-store" });
      if (r.ok) {
        const buildMs = r.headers.get("X-Build-Ms");
        const data = await r.json();
        data._source = "live";
        data._build_ms = buildMs ? parseInt(buildMs, 10) : null;
        return data;
      }
    } catch (_) { /* fall through */ }
    const r2 = await fetch("cc-reports-data.json?_t=" + Date.now(), { cache: "no-store" });
    if (!r2.ok) throw new Error("HTTP " + r2.status);
    const data = await r2.json();
    data._source = "static";
    return data;
  }

  function diffData(prev, next) {
    if (!prev || !next) return null;
    const p = prev.days[prev.days.length - 1];
    const n = next.days[next.days.length - 1];
    if (!p || !n) return null;
    const dp = n.user_msgs - p.user_msgs;
    const da = n.assistant_msgs - p.assistant_msgs;
    const ds = n.sessions - p.sessions;
    const dt = (n.tokens.output + n.tokens.cache_creation) -
               (p.tokens.output + p.tokens.cache_creation);
    if (dp === 0 && da === 0 && ds === 0 && Math.abs(dt) < 1000) {
      return { hasChange: false, label: "无新增" };
    }
    const parts = [];
    if (ds > 0) parts.push(`+${ds} session`);
    if (dp > 0) parts.push(`+${dp} prompts`);
    if (da > 0) parts.push(`+${da} 回复`);
    if (dt > 0) parts.push(`+${fmtTok(dt)} tokens`);
    return { hasChange: true, label: parts.join(" · ") };
  }

  async function loadAndRender({ silent = false } = {}) {
    const prevData = DATA;
    const btn = document.querySelector('[data-action="refresh"]');
    if (btn && !silent) {
      btn.disabled = true;
      btn.innerHTML = '刷新中… <span class="arrow">↻</span>';
    }
    try {
      const data = await fetchData();
      renderApp(data);
      if (!silent) {
        const diff = diffData(prevData, data);
        const newBtn = document.querySelector('[data-action="refresh"]');
        if (newBtn && diff) {
          const icon = diff.hasChange ? "✓" : "·";
          newBtn.innerHTML = `${icon} ${escapeHTML(diff.label)} <span class="arrow">↻</span>`;
          newBtn.disabled = true;
          newBtn.classList.add(diff.hasChange ? "btn-success" : "btn-quiet");
          setTimeout(() => {
            const b = document.querySelector('[data-action="refresh"]');
            if (b) {
              b.innerHTML = '刷新 <span class="arrow">↻</span>';
              b.disabled = false;
              b.classList.remove("btn-success", "btn-quiet");
            }
          }, 2800);
        }
      }
    } catch (err) {
      document.getElementById("app").innerHTML = `
        <div class="loading">
          数据加载失败 — ${escapeHTML(err.message)}<br><br>
          启动 live server：
          <code style="font-family:var(--font-mono); color:var(--text-primary)">python3 cc-reports.py serve</code>
        </div>
      `;
    }
  }

  // expose for button onclick handlers
  window.ccReportsRefresh = () => loadAndRender();

  window.ccReportsToggleExportMenu = (e) => {
    e.stopPropagation();
    const menu = document.getElementById("export-menu");
    if (!menu) return;
    const open = !menu.hidden;
    menu.hidden = open;  // toggle
    if (!open) {
      const close = (ev) => {
        if (!menu.contains(ev.target) && !ev.target.closest('[data-action="export"]')) {
          menu.hidden = true;
          document.removeEventListener("click", close, true);
        }
      };
      setTimeout(() => document.addEventListener("click", close, true), 0);
    }
  };

  window.ccReportsExport = (format) => {
    const menu = document.getElementById("export-menu");
    if (menu) menu.hidden = true;
    if (!DATA) return;

    if (format === "pdf") {
      // tag the body so @media print rules know which tab is active
      document.body.dataset.printRange = RANGE;
      document.body.dataset.printDate = DATA.today;
      window.print();
      return;
    }

    // default: markdown
    const agg = aggregateRange(DATA, RANGE);
    const md = exportMarkdown(agg, DATA);
    const blob = new Blob([md], { type: "text/markdown;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `cc-report-${RANGE}-${DATA.today}.md`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  function exportMarkdown(agg, data) {
    const stripHTML = s => String(s || "").replace(/<[^>]+>/g, "").replace(/\s+/g, " ").trim();
    const L = [];
    L.push(`# ${agg.title_eyebrow}`);
    L.push("");
    L.push(`_Generated ${data.generated_at} · source ~/.claude/projects_`);
    L.push("");
    L.push(stripHTML(agg.headline));
    L.push("");
    L.push("## Summary");
    L.push("");
    agg.stats.forEach(s => {
      L.push(`- **${s.label}**: ${s.value}  _(${s.sub})_`);
    });
    L.push("");
    if (agg.sessions_list.length) {
      L.push(`## ${stripHTML(agg.sessions_opts.title)}`);
      L.push("");
      const limit = agg.sessions_opts.limit || agg.sessions_list.length;
      agg.sessions_list.slice(0, limit).forEach(s => {
        const when = agg.sessions_opts.showDate
          ? `${fmtMonthDay(s.start)} ${fmtTimeHHMM(s.start)}`
          : fmtTimeHHMM(s.start);
        L.push(`- \`${when}\` **${s.title}** — ${fmtMin(s.active_min)} · ${fmtTok(s.tokens)} tokens · \`${s.cwd_label}\`${s.branch ? " · `" + s.branch + "`" : ""}`);
      });
      L.push("");
    }
    if (agg.projects.length) {
      L.push(`## ${stripHTML(agg.projects_title)}`);
      L.push("");
      agg.projects.forEach(p => {
        L.push(`- **${p.label}** — ${fmtTok(p.tokens)} tokens · ${p.sessions} session${p.sessions !== 1 ? "s" : ""} · ${fmtInt(p.msgs)} msgs`);
      });
      L.push("");
    }
    return L.join("\n");
  }

  loadAndRender({ silent: true });
</script>

</body>
