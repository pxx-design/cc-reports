<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>cc / reports — Claude Code journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --page-bg:        #fafafa;
    --surface:        #ffffff;
    --surface-alt:    #f5f5f5;
    --text-primary:   #171717;
    --text-secondary: #4d4d4d;
    --text-tertiary:  #8a8a8a;
    --text-quaternary:#b8b8b8;
    --border:         rgba(0, 0, 0, 0.08);
    --border-strong:  rgba(0, 0, 0, 0.14);
    --shadow-card:    rgba(0, 0, 0, 0.08) 0px 0px 0px 1px,
                      rgba(0, 0, 0, 0.04) 0px 2px 2px 0px;
    --font-sans:      "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --font-mono:      "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --radius-sm:      6px;
    --radius-md:      8px;
    --radius-pill:    9999px;

    /* greyscale ramp for chart fills */
    --g1: #ebebeb;
    --g2: #d4d4d4;
    --g3: #8a8a8a;
    --g4: #4d4d4d;
    --g5: #171717;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--page-bg);
    color: var(--text-primary);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }

  /* ─── Topbar ──────────────────────────────────────── */
  .topbar {
    height: 56px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    /* 必须压过 .controls(z-30)/.export-wrap(z-31)/.folder-card.is-open(z-30),
       否则滚动时它们会从导航栏上面漂过去 */
    position: sticky; top: 0; z-index: 60;
  }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; }
  .brand-mark {
    width: 22px; height: 22px;
    background: var(--text-primary);
    border-radius: 4px;
    display: inline-flex; align-items: center; justify-content: center;
    color: #fff;
    font-family: var(--font-mono);
    font-size: 12px; font-weight: 500;
  }
  .crumbs {
    display: flex; align-items: center; gap: 8px;
    color: var(--text-tertiary);
    font-family: var(--font-mono);
    font-size: 13px;
  }
  .crumbs .sep { opacity: 0.5; }
  .crumbs .here { color: var(--text-primary); }

  /* ─── 停靠版区间切换 ────────────────────────────────
     不照搬页面上那套 pill 分段控件(灰槽+白块+阴影)——那个密度进 56px 导航栏太笨重。
     这里降级成导航栏自己的文字语言:mono 小字、选中项一块无阴影浅底 chip,
     跟面包屑同族, 读起来像面包屑长出来的一节。
     常驻占位(只动 opacity/transform), 停靠时不触发导航栏重排。 */
  .dock-tabs {
    display: flex;
    align-items: center;
    gap: 2px;
    margin-left: 12px;
    padding-left: 14px;
    border-left: 1px solid var(--border);
    opacity: 0;
    transform: translateY(-5px);
    pointer-events: none;
    transition: opacity 180ms ease-out, transform 180ms ease-out;
  }
  body.is-docked .dock-tabs {
    opacity: 1;
    transform: none;
    pointer-events: auto;
    transition-delay: 60ms;   /* 让页面控件条先退场, 不同框两份 tab */
  }
  .dock-tab {
    border: 0;
    background: transparent;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: -0.1px;
    color: var(--text-tertiary);
    padding: 4px 9px;
    border-radius: 5px;
    transition: color 140ms ease-out, background 140ms ease-out;
  }
  .dock-tab:hover { color: var(--text-primary); }
  .dock-tab[aria-selected="true"] {
    color: var(--text-primary);
    background: var(--surface-alt);
  }

  /* 页面控件条不做淡出:停靠恰好发生在它整个滑进导航栏底下之时(topbar 不透明且 z-60),
     它是被遮住的,再叠一层 opacity 动画既看不见、又会跟 .reveal 的 keyframes 打架。 */
  .topbar-spacer { flex: 1; }
  .meta-stamp {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-tertiary);
  }
  .avatar {
    width: 28px; height: 28px;
    border-radius: 9999px;
    background: var(--text-primary);
    color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--font-mono);
    font-size: 11px; font-weight: 500;
  }

  /* ─── Page header ─────────────────────────────────── */
  .page {
    max-width: 1120px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* hero summary */
  .hero {
    background: var(--surface);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-card);
    padding: 32px 36px;
    margin-bottom: 32px;
  }
  .hero-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-tertiary);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .hero-eyebrow .dot {
    width: 6px; height: 6px; border-radius: 9999px;
    background: var(--text-primary);
  }
  .hero-headline {
    margin: 0 0 22px;
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -1.4px;
    line-height: 1.2;
    color: var(--text-primary);
    max-width: 720px;
  }
  .hero-headline .accent { color: var(--text-tertiary); font-weight: 500; }
  .hero-toplist {
    margin-top: 12px;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: -0.2px;
    line-height: 1.55;
    color: var(--text-secondary);
  }
  .hero-toplist .hero-top-item {
    color: var(--text-primary);
  }
  .hero-toplist .hero-top-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-tertiary);
  }
  .hero-toplist .hero-sep {
    color: var(--text-quaternary);
    margin: 0 4px;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border-top: 1px solid var(--border);
    padding-top: 22px;
  }
  .stat {
    padding: 0 28px;
    border-right: 1px solid var(--border);
    cursor: pointer;
    transition: opacity 150ms ease-out;
  }
  .stat:first-child { padding-left: 0; }
  .stat:last-child { padding-right: 0; border-right: 0; }
  .stat:hover .stat-label { color: var(--text-secondary); }
  .stat:hover .stat-info {
    background: var(--text-primary);
    color: #fff;
    border-color: var(--text-primary);
  }
  .stat-info {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 13px;
    height: 13px;
    border-radius: 9999px;
    border: 1px solid var(--border-strong);
    color: var(--text-tertiary);
    font-size: 9px;
    font-weight: 500;
    margin-left: 4px;
    vertical-align: middle;
    transition: background 150ms ease-out, color 150ms ease-out, border-color 150ms ease-out;
  }
  .stat-label {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-tertiary);
    margin-bottom: 8px;
  }
  .stat-value {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -1.2px;
    color: var(--text-primary);
    line-height: 1;
  }
  .stat-sub {
    margin-top: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-tertiary);
  }

  /* ─── Controls row ────────────────────────────────── */
  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
    position: relative;
    z-index: 30;
  }
  .tabs {
    display: inline-flex;
    padding: 3px;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
  }
  .tab {
    border: 0; background: transparent;
    color: var(--text-secondary);
    padding: 6px 14px;
    border-radius: 4px;
    font-size: 13px; font-weight: 500;
    letter-spacing: -0.1px;
    transition: color 150ms ease-out, background 150ms ease-out;
  }
  .tab:hover { color: var(--text-primary); }
  .tab[aria-selected="true"] {
    background: var(--surface);
    color: var(--text-primary);
    box-shadow: var(--shadow-card);
  }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 16px;
    border-radius: var(--radius-pill);
    font-size: 13px; font-weight: 500;
    letter-spacing: -0.1px;
    transition: opacity 150ms ease-out, background 150ms ease-out;
  }
  .btn-primary {
    background: var(--text-primary); color: #fff;
    border: 1px solid var(--text-primary);
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-secondary {
    background: var(--surface);
    color: var(--text-primary);
    border: 1px solid var(--border-strong);
  }
  .btn-secondary:hover { background: var(--surface-alt); }
  .btn-success {
    background: var(--text-primary) !important;
    color: #fff !important;
    border-color: var(--text-primary) !important;
  }
  .btn-quiet {
    color: var(--text-tertiary) !important;
    border-color: var(--border) !important;
    background: var(--surface-alt) !important;
  }
  .btn:disabled { cursor: default; }
  .arrow { font-family: var(--font-mono); font-size: 12px; opacity: 0.7; }

  /* ─── Export dropdown ────────────────────────────────── */
  .export-wrap { position: relative; z-index: 31; }
  .export-menu {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    min-width: 280px;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-md);
    box-shadow: rgba(0,0,0,0.08) 0 0 0 1px,
                rgba(0,0,0,0.12) 0 8px 24px 0;
    padding: 6px;
    z-index: 999;
    animation: fadeUp 180ms ease-out;
  }
  .export-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    width: 100%;
    padding: 10px 12px;
    border: 0;
    background: transparent;
    border-radius: var(--radius-sm);
    text-align: left;
    cursor: pointer;
    color: var(--text-primary);
    transition: background 120ms ease-out;
  }
  .export-item:hover { background: var(--surface-alt); }
  .export-item-icon {
    width: 22px;
    height: 22px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--text-primary);
    color: #fff;
    border-radius: 5px;
    font-family: var(--font-mono);
    font-size: 12px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .export-item strong {
    display: block;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: -0.1px;
    color: var(--text-primary);
    margin-bottom: 2px;
  }
  .export-item-desc {
    display: block;
    font-size: 11px;
    color: var(--text-tertiary);
    line-height: 1.4;
  }

  /* ─── Print: PDF export via window.print() ───────────── */
  @media print {
    @page { size: A4; margin: 12mm; }

    /* Force every element to keep its colors / backgrounds when printed.
       Without this Chrome's "economy mode" strips background-color so all
       the sparkline dots, token mix bars, stat backgrounds turn invisible. */
    *, *::before, *::after {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color-adjust: exact !important;
    }

    body {
      background: #fff !important;
      color: var(--text-primary) !important;
    }
    .topbar,
    .side-nav,
    .controls,
    .data-popover,
    .footnote { display: none !important; }

    /* Keep the on-screen layout exactly — row-2 stays grid, charts stay sized.
       Just shrink the whole page so 1120px max-width fits A4 portrait. */
    .page {
      padding: 0 !important;
      max-width: none !important;
      zoom: 0.62;
    }

    .card,
    .hero { box-shadow: none !important; border: 1px solid #d0d0d0 !important; break-inside: avoid; page-break-inside: avoid; }
    .hero { padding: 24px 28px !important; }
    .stat-info { display: none !important; }
    .reveal { animation: none !important; }
    .session-row:hover { background: transparent !important; }

    /* Ensure SVG fills (used in sparkline area, mix bars) render */
    svg, svg * { print-color-adjust: exact !important; -webkit-print-color-adjust: exact !important; }

    /* add a print-only title at the very top */
    body::before {
      content: "cc / reports · " attr(data-print-range) " · " attr(data-print-date);
      display: block;
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      padding-bottom: 10px;
      margin-bottom: 14px;
      border-bottom: 1px solid #d0d0d0;
    }
  }

  /* ─── Card primitive ──────────────────────────────── */
  .card {
    background: var(--surface);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-card);
  }
  .card-head {
    padding: 18px 22px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .card-head h2 {
    margin: 0;
    font-size: 15px; font-weight: 600;
    letter-spacing: -0.3px;
  }
  .card-head .meta {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-tertiary);
  }

  /* sections layout */
  .section { margin-bottom: 28px; }
  .row-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  /* ─── Hourly bar chart ────────────────────────────── */
  .chart-hourly {
    padding: 22px 24px 14px;
  }
  .chart-hourly svg { display: block; width: 100%; height: 200px; }

  /* hourly bar chart — 左图右析 */
  .chart-row {
    display: grid;
    grid-template-columns: minmax(0, 1.6fr) minmax(240px, 1fr);
    gap: 24px;
    padding: 20px 24px 12px;
  }
  .chart-main { min-width: 0; }
  .chart-waveform svg {
    display: block;
    width: 100%;
    height: auto;
  }
  /* hover 不压暗其它柱子 —— 只有命中列的指针反馈,数据一直看得清 */
  .chart-row .model-usage { padding: 14px 0 0; }

  /* 右侧解析 — 与热力图侧栏同一套 rhythm-* 语言 */
  .chart-aside {
    display: flex;
    flex-direction: column;
    gap: 12px;
    border-left: 1px solid var(--border);
    padding-left: 22px;
  }
  /* 三行:统计 / 时段占比 / 解析 */
  .chart-aside .rhythm-row { display: flex; gap: 26px; }
  .chart-aside .rhythm-value { font-size: 19px; }
  .chart-aside .rhythm-sub { margin-top: 5px; }
  .chart-aside .rhythm-insight { margin-top: 0; }
  .chart-aside > .rhythm-narrative {
    margin-top: 0;
    padding-top: 12px;
    border-top: 1px dashed var(--border);
  }

  @media (max-width: 760px) {
    .chart-row { grid-template-columns: 1fr; }
    .chart-aside {
      border-left: 0;
      padding-left: 0;
      border-top: 1px solid var(--border);
      padding-top: 18px;
    }
  }
  .axis-row {
    margin-top: 6px;
    display: grid;
    grid-template-columns: repeat(24, 1fr);
    column-gap: 2px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-quaternary);
  }
  .axis-row span {
    text-align: center;
    padding-top: 4px;
  }
  .axis-row span.peak { color: var(--text-primary); font-weight: 500; }

  /* ─── Heatmap ───────────────────────────────────────── */
  .heatmap-row {
    display: grid;
    grid-template-columns: minmax(0, 1.6fr) minmax(220px, 1fr);
    gap: 24px;
    padding: 18px 24px 8px;
  }
  .heatmap-wrap {
    min-width: 0;
    overflow-x: auto;
  }
  .heatmap-wrap svg { display: block; }
  .heatmap-cell { transition: opacity 120ms ease-out; }
  .heatmap-cell:hover { opacity: 0.7; }
  .heatmap-legend {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-tertiary);
    justify-content: flex-end;
  }
  .heatmap-legend .sw {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    border: 1px solid var(--border);
  }
  .heatmap-legend span:first-child { margin-right: 4px; }
  .heatmap-legend span:last-child { margin-left: 4px; }

  /* Right-side rhythm summary */
  .heatmap-stats {
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 4px 0 0;
    border-left: 1px solid var(--border);
    padding-left: 22px;
  }
  .rhythm-stat {
    line-height: 1.2;
  }
  .rhythm-label {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-tertiary);
    margin-bottom: 4px;
  }
  .rhythm-value {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.6px;
    color: var(--text-primary);
  }
  .rhythm-value-mono {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: -0.2px;
  }
  .rhythm-unit {
    font-size: 12px;
    color: var(--text-tertiary);
    font-weight: 400;
    letter-spacing: 0;
    margin-left: 2px;
  }
  .rhythm-sub {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-tertiary);
    margin-top: 2px;
  }
  .rhythm-insight {
    margin-top: 6px;
    padding-top: 12px;
    border-top: 1px dashed var(--border);
  }
  .rhythm-bar {
    display: flex;
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
    background: var(--surface-alt);
    margin-bottom: 6px;
  }
  /* 四段等距拉开,首段炭灰不用纯黑 —— 与 MODEL_SHADES 同一套灰阶语言 */
  .rhythm-bar-seg {
    background: #3a3a3a;
    transition: opacity 150ms;
  }
  .rhythm-bar-seg.rb-afternoon { background: #7a7a7a; }
  .rhythm-bar-seg.rb-evening   { background: #adadad; }
  .rhythm-bar-seg.rb-night     { background: #dadada; }
  .rhythm-bar-legend {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px 8px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-tertiary);
    letter-spacing: -0.05px;
    margin-bottom: 10px;
  }
  .rhythm-bar-legend b { color: var(--text-primary); font-weight: 500; }
  .rhythm-narrative {
    font-size: 12.5px;
    line-height: 1.65;
    color: var(--text-secondary);
    margin-top: 6px;
  }
  .rhythm-narrative b { color: var(--text-primary); font-weight: 500; }
  .rhythm-narrative p { margin: 0; }
  .rhythm-narrative p + p { margin-top: 6px; }

  /* 周月共用:统计行(总量 + 活跃日)与峰值行 */
  .heatmap-stats .rhythm-row {
    display: flex;
    gap: 28px;
  }
  .heatmap-stats .rhythm-peak-inline {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
  }
  .heatmap-stats .rhythm-peak-inline .rhythm-label {
    margin-bottom: 0;
  }

  /* Weekly compact variant — heatmap is only ~110px tall, side panel must match */
  .heatmap-row.is-weekly .heatmap-stats {
    justify-content: flex-start;
    gap: 12px;
    padding-top: 0;
  }
  .heatmap-row.is-weekly .rhythm-narrative-weekly {
    padding-top: 10px;
    border-top: 1px dashed var(--border);
    margin-top: 0;
  }
  .heatmap-row.is-weekly .rhythm-value {
    font-size: 19px;
  }

  @media (max-width: 760px) {
    .heatmap-row { grid-template-columns: 1fr; }
    .heatmap-stats { border-left: 0; padding-left: 0; border-top: 1px solid var(--border); padding-top: 18px; }
  }



  /* ─── Sessions list ───────────────────────────────── */
  .session-row {
    display: grid;
    grid-template-columns: 64px 1fr 130px 110px;
    gap: 16px;
    align-items: center;
    padding: 14px 22px;
    border-bottom: 1px solid var(--border);
    transition: background 150ms ease-out;
  }
  .session-row:last-child { border-bottom: 0; }
  .session-row:hover { background: var(--surface-alt); }
  .session-time {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-primary);
  }
  .session-time .sub {
    display: block;
    color: var(--text-tertiary);
    font-size: 10px;
    margin-top: 2px;
  }
  .session-main { min-width: 0; }
  .session-title {
    font-size: 13.5px;
    font-weight: 500;
    letter-spacing: -0.15px;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .session-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-tertiary);
    display: flex; gap: 10px;
  }
  .session-meta .tag {
    padding: 1px 7px;
    border: 1px solid var(--border);
    border-radius: var(--radius-pill);
    background: var(--page-bg);
    color: var(--text-secondary);
    text-transform: lowercase;
  }
  .session-bar-wrap {
    height: 6px; width: 100%;
    background: var(--surface-alt);
    border-radius: 9999px;
    overflow: hidden;
  }
  .session-bar {
    height: 100%;
    background: var(--text-primary);
    border-radius: 9999px;
  }
  .session-tokens {
    text-align: right;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-primary);
  }
  .session-tokens .sub {
    color: var(--text-tertiary);
    font-size: 11px;
    display: block;
    margin-top: 2px;
  }

  /* Projects card — dark-callout narrative below the card head */
  .projects-section .projects-insight {
    margin: 16px 24px 0;
    padding: 16px 20px 18px;
    background: var(--text-primary);
    color: rgba(255, 255, 255, 0.86);
    border-radius: 8px;
    font-size: 12.5px;
    line-height: 1.7;
    letter-spacing: -0.05px;
    position: relative;
  }
  .projects-section .projects-insight p { margin: 0; }
  .projects-section .projects-insight p + p { margin-top: 6px; }
  .projects-section .projects-insight b {
    color: #ffffff;
    font-weight: 500;
  }
  .projects-section .projects-insight::before {
    content: "INSIGHT";
    display: block;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: rgba(255, 255, 255, 0.45);
    margin-bottom: 8px;
  }
  /* Push the bookshelf area down to leave room for the callout above */
  .projects-section .proj-list {
    margin-top: 20px;
  }

  /* Dark trend-side callout sitting at the bottom of the Token mix card */
  .mix-side-insight {
    margin-top: auto;
    padding: 16px 18px 18px;
    background: var(--text-primary);
    color: rgba(255, 255, 255, 0.85);
    border-radius: 0 0 var(--radius-md) var(--radius-md);
    font-size: 12.5px;
    line-height: 1.65;
    letter-spacing: -0.05px;
  }
  .mix-side-insight .msi-label {
    display: block;
    margin-bottom: 8px;
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: rgba(255, 255, 255, 0.5);
  }
  .mix-side-insight p { margin: 0; }
  .mix-side-insight p + p { margin-top: 6px; }
  .mix-side-insight b {
    color: #ffffff;
    font-weight: 500;
  }
  /* Ensure card containing side-insight allows mix to expand and msi to sit at bottom */
  .row-2 > .card { display: flex; flex-direction: column; }
  .row-2 > .card > .mix { flex: 0 0 auto; }
  .row-2 > .card > .mix-side-insight { margin-top: auto; }

  /* ─── Projects: white acrylic shelf + manila folder cards ─ */
  :root {
    --paper:         #ffffff;       /* 纯白前页 */
    --paper-back:    #e5e5e3;       /* 后盖深一档 */
    --paper-tab:     #f1f1ef;       /* tab 略灰白 */
    --paper-edge:    #d8d8d4;       /* 折角 / 描边灰 */
    --desk:          #f6f6f3;       /* 桌面极淡冷灰 */
    --shelf-top:     #ffffff;
    --shelf-mid:     #e8e8e5;
    --shelf-bot:     #c2c2bf;
  }
  /* 各项目时间占比 · % 在条外(依次变小的排版)+ 项目名小字在条内 */
  .projects-insight .psum { margin: 6px 0 18px; }
  .projects-insight .psum-cap {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em;
    color: rgba(255,255,255,0.4); margin-bottom: 10px;
  }
  .projects-insight .ppct-row { display: flex; align-items: flex-end; margin-bottom: 7px; }
  .projects-insight .ppct { display: flex; justify-content: center; align-items: flex-end; min-width: 0; }
  .projects-insight .ppct b { font-family: var(--font-mono); font-weight: 600; letter-spacing: -0.02em; line-height: 1; white-space: nowrap; }
  .projects-insight .pbar { display: flex; height: 26px; border-radius: 5px; overflow: hidden; }
  .projects-insight .pseg {
    height: 100%; display: flex; align-items: center; justify-content: center;
    padding: 0 4px; overflow: hidden; color: #171717;
    box-shadow: inset -1px 0 0 var(--text-primary);
  }
  .projects-insight .pseg:last-child { box-shadow: none; }
  .projects-insight .pseg-name { font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  #psum-tip {
    position: fixed; z-index: 9999; pointer-events: none; opacity: 0;
    background: #fff; color: #171717; border-radius: 6px; padding: 5px 9px;
    font-family: var(--font-mono); font-size: 11px; white-space: nowrap;
    box-shadow: rgba(0,0,0,0.08) 0 0 0 1px, rgba(0,0,0,0.18) 0 6px 16px;
    transition: opacity .1s ease-out;
  }
  .projects-section .proj-list {
    background: var(--desk);
    padding: 40px 32px 16px;
    border-top: 1px solid var(--border);
    border-radius: 0 0 var(--radius-md) var(--radius-md);
  }
  .shelf-row {
    display: grid;
    gap: 32px 18px;
    margin-bottom: 56px;
    position: relative;
    padding-bottom: 38px;
    align-items: start;
  }
  /* Top-3 highlight row — 3 columns, bigger cards */
  .shelf-row.row-top3 {
    grid-template-columns: repeat(3, 1fr);
    gap: 36px 22px;
  }
  /* Regular ranks — 4 per row */
  .shelf-row.row-normal {
    grid-template-columns: repeat(4, 1fr);
  }
  /* Daily view (no stamps) — 4 per row, all normal */
  .shelf-row.row-daily {
    grid-template-columns: repeat(4, 1fr);
  }
  .shelf-row:last-child { margin-bottom: 14px; }
  .shelf-row::after {
    /* white shelf — thick but minimal */
    content: "";
    position: absolute;
    bottom: 4px;
    left: -8px;
    right: -8px;
    height: 18px;
    background: linear-gradient(180deg, #ffffff 0%, #ececea 100%);
    border-radius: 2px;
    border: 1px solid rgba(0, 0, 0, 0.06);
    box-shadow: 0 4px 8px -2px rgba(0, 0, 0, 0.10);
  }
  .shelf-row::before {
    content: "";
    position: absolute;
    bottom: -4px;
    left: 6px;
    right: 6px;
    height: 6px;
    background: rgba(0, 0, 0, 0.05);
    filter: blur(4px);
    z-index: -1;
  }

  @media (max-width: 1180px) {
    .shelf-row.row-normal,
    .shelf-row.row-daily { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 880px) {
    .shelf-row.row-top3,
    .shelf-row.row-normal,
    .shelf-row.row-daily { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 560px) {
    .shelf-row.row-top3,
    .shelf-row.row-normal,
    .shelf-row.row-daily { grid-template-columns: 1fr; }
  }

  /* Manila folder · Tobias-style — envelope with content peeking from top-right */
  .folder-card {
    position: relative;
    background: #ffffff;
    border-radius: 12px;
    padding: 96px 16px 18px;
    margin-top: 12px;
    cursor: pointer;
    transition:
      transform 240ms cubic-bezier(0.2, 0, 0.2, 1),
      box-shadow 240ms ease-out;
    box-shadow:
      0 1px 0 0 rgba(0, 0, 0, 0.04),
      0 1px 3px 0 rgba(0, 0, 0, 0.06),
      0 10px 22px -4px rgba(0, 0, 0, 0.08);
    min-height: 210px;
  }
  /* Top-3 cards are larger — bigger duration, taller card, larger thumb */
  .row-top3 .folder-card {
    min-height: 240px;
    padding: 110px 20px 22px;
  }
  .row-top3 .folder-thumb {
    height: 100px;
    width: 48%;
    right: 20px;
  }
  .row-top3 .folder-duration {
    font-size: 28px;
    letter-spacing: -1px;
  }
  .row-top3 .folder-name {
    font-size: 14px;
  }

  /* slight rotation per slot — "not laid out too tidily" */
  .shelf-row .folder-card:nth-child(3n+1) { transform: rotate(-0.6deg); }
  .shelf-row .folder-card:nth-child(3n+2) { transform: rotate(0.4deg); }
  .shelf-row .folder-card:nth-child(3n+3) { transform: rotate(-0.3deg); }

  .folder-card:hover {
    transform: rotate(0deg) translateY(-4px);
    box-shadow:
      0 1px 0 0 rgba(0, 0, 0, 0.05),
      0 3px 8px 0 rgba(0, 0, 0, 0.09),
      0 22px 40px -8px rgba(0, 0, 0, 0.14);
    z-index: 2;
  }
  .folder-card.is-open {
    transform: rotate(0deg) translateY(-4px);
    box-shadow:
      0 1px 0 0 rgba(0, 0, 0, 0.06),
      0 4px 10px 0 rgba(0, 0, 0, 0.10),
      0 24px 44px -10px rgba(0, 0, 0, 0.16);
    z-index: 3;
  }

  /* Open pill removed — folder-card hover affordance carries the click hint */
  .folder-tab { display: none; }

  /* Content thumbnail peeking from top-right — the heart of manila-folder look.
     A small "card" tucked into the folder, sticking up above its top edge. */
  .folder-thumb {
    position: absolute;
    top: -10px;
    right: 16px;
    width: 50%;
    height: 86px;
    background:
      linear-gradient(135deg, #fafafa 0%, #ececea 100%);
    border-radius: 4px;
    box-shadow:
      0 1px 0 rgba(0, 0, 0, 0.04),
      -3px 4px 12px rgba(0, 0, 0, 0.14);
    overflow: hidden;
    padding: 10px 12px;
    z-index: 1;
    display: flex;
    align-items: flex-end;
  }
  .folder-thumb::before {
    /* horizontal "writing lines" on the inner thumbnail — subtle paper-like */
    content: "";
    position: absolute;
    top: 10px;
    left: 12px;
    right: 12px;
    height: 48px;
    background:
      repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 7px,
        rgba(0, 0, 0, 0.05) 7px,
        rgba(0, 0, 0, 0.05) 8px
      );
    border-radius: 1px;
  }
  .folder-thumb-text {
    position: relative;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-secondary);
    line-height: 1.4;
    letter-spacing: -0.1px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    max-height: 28px;
    width: 100%;
  }

  /* Inner data — bottom-left of the folder face */
  .folder-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: -0.15px;
    margin-bottom: 8px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .folder-staples { display: none; }

  /* Top-3 stamp — circular weathered seal, appears on weekly/monthly ranks 1-3 */
  .folder-stamp {
    position: absolute;
    bottom: 18px;
    right: 16px;
    width: 56px;
    height: 56px;
    border: 1.8px solid rgba(40, 40, 40, 0.55);
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 4;
    background: transparent;
    opacity: 0.78;
  }
  .folder-stamp::before {
    content: "";
    position: absolute;
    inset: 4px;
    border: 1px dashed rgba(40, 40, 40, 0.4);
    border-radius: 50%;
  }
  .folder-stamp-rank {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 700;
    color: rgba(40, 40, 40, 0.7);
    line-height: 1;
    letter-spacing: -0.04em;
  }
  .folder-stamp-label {
    font-family: var(--font-mono);
    font-size: 7px;
    font-weight: 700;
    color: rgba(40, 40, 40, 0.6);
    letter-spacing: 0.18em;
    margin-top: 2px;
    text-transform: uppercase;
  }
  .folder-stamp.rank-1 { transform: rotate(-12deg); }
  .folder-stamp.rank-2 { transform: rotate(-6deg); }
  .folder-stamp.rank-3 { transform: rotate(8deg); }

  /* Top-3 muted metallic accents — low-saturation gold / silver / bronze.
     Restrained: stamp only, folder body stays white. */
  .folder-stamp.rank-1 {
    border-color: rgba(165, 130, 50, 0.62);
  }
  .folder-stamp.rank-1::before {
    border-color: rgba(165, 130, 50, 0.42);
  }
  .folder-stamp.rank-1 .folder-stamp-rank,
  .folder-stamp.rank-1 .folder-stamp-label {
    color: rgba(140, 105, 35, 0.78);
  }

  .folder-stamp.rank-2 {
    border-color: rgba(75, 105, 135, 0.62);    /* cool slate-blue silver */
  }
  .folder-stamp.rank-2::before {
    border-color: rgba(75, 105, 135, 0.42);
  }
  .folder-stamp.rank-2 .folder-stamp-rank,
  .folder-stamp.rank-2 .folder-stamp-label {
    color: rgba(58, 88, 118, 0.80);
  }

  .folder-stamp.rank-3 {
    border-color: rgba(140, 88, 56, 0.58);
  }
  .folder-stamp.rank-3::before {
    border-color: rgba(140, 88, 56, 0.40);
  }
  .folder-stamp.rank-3 .folder-stamp-rank,
  .folder-stamp.rank-3 .folder-stamp-label {
    color: rgba(115, 72, 46, 0.75);
  }

  /* Same metallic accent re-used as a tiny dot before the project name —
     a second, persistent anchor for rank (the stamp is sort of decorative;
     this dot makes the rank visible even at-a-glance). */
  .folder-card.is-rank-1 .folder-name::before,
  .folder-card.is-rank-2 .folder-name::before,
  .folder-card.is-rank-3 .folder-name::before {
    content: "";
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: 1px;
  }
  .folder-card.is-rank-1 .folder-name::before { background: #b18a3c; }
  .folder-card.is-rank-2 .folder-name::before { background: #4b6985; }
  .folder-card.is-rank-3 .folder-name::before { background: #a8694a; }

  .folder-duration {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.8px;
    color: var(--text-primary);
    line-height: 1.1;
    margin: 0 0 6px;
  }
  .folder-unit {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0;
    color: var(--text-muted, #9a9a9a);
  }
  /* 兜底桶(root files / lab 等非真项目): 视觉降权, 不抢真项目的注意力 */
  .folder-card.is-fallback { opacity: 0.6; }
  .folder-card.is-fallback .folder-duration { color: var(--text-muted, #9a9a9a); font-weight: 400; }
  .insight-muted { color: var(--text-muted, #9a9a9a); }
  .folder-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-tertiary);
    margin-bottom: 14px;
  }
  .folder-spark {
    display: block;
    width: 100%;
    height: 24px;
  }

  .folder-corner {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 16px;
    height: 16px;
    background: linear-gradient(135deg, transparent 50%, var(--paper-edge) 50%);
    border-bottom-right-radius: 8px;
    transition: width 240ms ease-out, height 240ms ease-out;
    pointer-events: none;
    box-shadow: inset -1px -1px 2px rgba(0, 0, 0, 0.05);
  }
  .folder-card:hover .folder-corner {
    width: 24px;
    height: 24px;
  }

  /* Expanded session list — inline, expands the clicked card downward.
     Other cards in the same row don't stretch (align-items: start on the row),
     so they stay their original height while the open card grows. */
  .folder-details {
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    margin-top: 0;
    transition:
      max-height 340ms cubic-bezier(0.2, 0, 0.2, 1),
      opacity 200ms ease-out,
      margin-top 340ms cubic-bezier(0.2, 0, 0.2, 1);
  }
  .folder-card.is-open .folder-details {
    max-height: 800px;
    opacity: 1;
    margin-top: 16px;
  }
  /* Keep the open card on top so its shadow/lift renders above siblings */
  .folder-card.is-open { z-index: 30; }
  /* Belt-and-suspenders: explicit align-self on cards so grid can't stretch them */
  .folder-card { align-self: start; }
  .folder-summary {
    font-size: 12.5px;
    line-height: 1.6;
    color: var(--text-secondary);
    padding: 10px 12px;
    background: rgba(0, 0, 0, 0.035);
    border-radius: 4px;
    margin-bottom: 10px;
    letter-spacing: -0.05px;
  }
  .folder-summary b { color: var(--text-primary); font-weight: 500; }
  .folder-session {
    display: grid;
    grid-template-columns: 56px 1fr auto;
    gap: 10px;
    padding: 6px 0;
    align-items: baseline;
    font-size: 12px;
    border-bottom: 1px dashed rgba(0, 0, 0, 0.10);
  }
  .folder-session:last-child { border-bottom: 0; }
  .folder-session .fs-time {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-tertiary);
    white-space: nowrap;
  }
  .folder-session .fs-title {
    color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: -0.1px;
  }
  .folder-session .fs-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-tertiary);
    white-space: nowrap;
  }
  .folder-empty {
    padding: 14px 0;
    text-align: center;
    color: var(--text-tertiary);
    font-style: italic;
    font-size: 12px;
  }

  /* ─── Session drill-down: 点 session 看逐轮解剖 ─── */
  .session-row.is-drill, .folder-session.is-drill { cursor: pointer; }
  .session-row.is-drill .session-title::before {
    content: "\25B8";   /* ▸ */
    display: inline-block;
    margin-right: 7px;
    color: var(--text-tertiary);
    font-size: 9px;
    transition: transform 0.15s ease;
  }
  .session-row.is-drill.open .session-title::before { transform: rotate(90deg); }
  /* open 的行 + drawer 连成一块"被打开"的凹陷面板, 区别于白列表 */
  .session-row.is-drill.open { background: var(--surface-alt); }
  .session-drill {
    background: var(--surface-alt);
    padding: 4px 22px 14px 42px;   /* 左缩进进 row 内容栏, 不贴边 */
    border-bottom: 1px solid var(--border);
    animation: drillIn 0.18s ease;
  }
  @keyframes drillIn { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: none; } }
  .drill-cap, .drill-loading, .drill-empty {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-tertiary);
    padding: 8px 0 10px;
    letter-spacing: 0.02em;
  }
  /* 一轮 = 一条: 提问(主体, 左) + token(量级图, 右) / 下方一行 dateline */
  .turn {
    display: grid;
    grid-template-columns: 1fr 90px;
    column-gap: 18px;
    row-gap: 3px;
    padding: 10px 0;
    border-top: 1px solid var(--border);
    align-items: baseline;
  }
  .turn:first-of-type { border-top: 0; }
  .turn.is-quiet { opacity: 0.4; }
  /* 提问 = 阅读主体 */
  .turn-prompt {
    grid-row: 1; grid-column: 1;
    font-size: 13.5px; color: var(--text-primary); line-height: 1.45;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  /* token = 信息本身: 量级靠字重/字色编码, 不靠装饰条; 越烧越黑越重 */
  .turn-cost {
    grid-row: 1; grid-column: 2;
    text-align: right; font-family: var(--font-mono); white-space: nowrap;
  }
  .turn-cost.t-spike { font-size: 14px;   font-weight: 700; color: var(--text-primary); }
  .turn-cost.t-mid   { font-size: 13px;   font-weight: 600; color: var(--text-primary); }
  .turn-cost.t-low   { font-size: 12.5px; font-weight: 500; color: var(--text-secondary); }
  .turn-cost.t-faint { font-size: 12.5px; font-weight: 400; color: var(--text-tertiary); }
  /* dateline: 文件=chip(领读, 凸起白片) / 工具=纯文字(退一层) / 时间=最右淡 */
  .turn-sub {
    grid-row: 2; grid-column: 1 / -1;
    display: flex; flex-wrap: nowrap; gap: 12px; align-items: center;
    font-family: var(--font-mono); font-size: 10.5px; line-height: 1.4; overflow: hidden;
  }
  .dl-files { display: flex; gap: 5px; flex: 0 1 auto; min-width: 0; overflow: hidden; }
  .dl-file {
    flex: 0 0 auto;

    border: 1px solid var(--border);

  .dl-time  { color: var(--text-quaternary); flex: 0 0 auto; margin-left: auto; white-space: nowrap; }

  /* Per-project bar chart shown when folder is expanded — no container, naked */

    margin: 14px 0 18px;
    padding: 0;

  }
  .folder-chart-title {

  /* footnote */
  .footnote {
    margin-top: 36px;
    padding-top: 18px;

    font-family: var(--font-mono);

  /* ─── Bar-chart model legend ────────────────────────── */
  .bar-model-legend {
    display: flex;

    padding: 4px 24px 8px;

  .legend-pill {
    display: inline-flex;

  /* ─── Daily per-model token breakdown ─────────────── */
  .model-usage { padding: 2px 24px 10px; }
  .mu-row {

  /* ─── Generic click popover ──────────────────────────── */
  .data-popover {

  .popover-head {

  /* $金额可点提示 —— 虚线下划线, Vercel 克制 */

  /* 成本明细弹层 —— 每模型一块, 四类 token 各行「量 × 单价 = 小计」 */
  .cost-model + .cost-model { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .cost-model-head {

  .cost-line .cost-r { font-family: var(--font-mono); font-size: 11px; }

  .popover-body p {

  .popover-section {

  /* 弹层 body 首个 section 紧贴 head 底边框会形成双线——去掉它自己的顶边框 */
  .popover-body > .popover-section:first-child {

    margin-bottom: 6px;
    font-weight: 500;
  }
  .data-popover { max-width: 380px; }

  /* ─── Side nav ────────────────────────────────────── */
  .side-nav {
    position: fixed;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 14px;

    background: rgba(255, 255, 255, 0.7);

    transition: background 200ms ease-out;
  }
  .side-nav:hover { background: var(--surface); }
  .side-nav a {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-mono);
    font-size: 11px;

    color: var(--text-tertiary);
    transition: color 150ms ease-out;

  .side-nav a:hover { color: var(--text-primary); }
  .side-nav .nav-dot {
    width: 6px;
    height: 6px;
    border-radius: 9999px;

  }

  /* loading / empty states */

  /* fade-in */

</style>
